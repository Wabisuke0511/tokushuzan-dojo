<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>算数道場</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="算数道場">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4a90d9;
      --primary-dark: #2d6fb0;
      --accent: #f5a623;
      --success: #27ae60;
      --error: #e74c3c;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --locked: #b0bec5;
      --radius: 16px;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ===== TOP SCREEN ===== */
    #top-screen { padding: 0 0 40px; }

    .top-header {
      background: var(--primary);
      color: white;
      padding: 48px 24px 32px;
      text-align: center;
    }

    .top-header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .top-header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .categories-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px 16px;
    }

    .category-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .category-card:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-icon { font-size: 2.4rem; flex-shrink: 0; }

    .cat-info { flex: 1; }

    .cat-name {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .cat-desc {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .cat-arrow {
      font-size: 1.2rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ===== SECTION SCREEN ===== */
    #section-screen { padding: 0 0 40px; }

    .section-header {
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-header h2 { font-size: 1.25rem; font-weight: 800; }

    /* ===== MODULE GRID (shared by section screen) ===== */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 24px 16px 8px;
    }

    .module-tile {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 12px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .module-tile:active:not(.locked) {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .module-tile.unlocked { border-color: var(--primary); }
    .module-tile.locked { cursor: default; opacity: 0.65; }

    .tile-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    .tile-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tile-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .badge-open { background: #e8f4fd; color: var(--primary-dark); }
    .badge-soon { background: #eceff1; color: var(--locked); }

    .tile-ref-btn {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e8f4fd;
      color: var(--primary-dark);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HOME ACTIONS ===== */
    .home-actions {
      padding: 0 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-action-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .home-action-btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-graph { background: #2d6fb0; color: white; }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { padding: 0 0 48px; }

    .quiz-header {
      background: var(--primary);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.7; }

    .quiz-header h2 { font-size: 1.25rem; font-weight: 800; }

    .quiz-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .question-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 1.2rem;
      line-height: 1.75;
      font-weight: 600;
    }

    .question-text span.num {
      color: var(--primary-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .answer-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .answer-row:last-of-type { margin-bottom: 0; }

    .answer-label {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .answer-input {
      flex: 1;
      min-width: 0;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      padding: 12px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .answer-input:focus { border-color: var(--primary); }

    .answer-unit {
      font-size: 1rem;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .submit-btn:active { transform: scale(0.97); background: var(--primary-dark); }

    /* ===== RESULT ===== */
    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
    .result-label { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .result-label.correct { color: var(--success); }
    .result-label.wrong { color: var(--error); }
    .result-answer { font-size: 0.95rem; color: var(--muted); line-height: 1.7; }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .next-btn:active { transform: scale(0.97); opacity: 0.85; }

    .hidden { display: none !important; }

    /* ===== LEVEL SWITCHER ===== */
    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .level-btn {
      flex: 1 1 calc(50% - 9px);
      min-width: 0;
      padding: 9px 4px;
      font-size: 0.82rem;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .level-switcher.three-col .level-btn { flex: 1 1 0; }

    .level-btn.active { background: var(--primary); color: white; }
    .level-btn.active.gosanke { background: #9b2c2c; }

    /* ===== EXPLANATION ===== */
    .explanation-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .explanation-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .area-diagram {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
    }

    .steps-list { display: flex; flex-direction: column; gap: 10px; }

    .step-row { display: flex; gap: 12px; align-items: flex-start; }

    .step-num {
      background: var(--primary);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text { font-size: 1rem; line-height: 1.65; font-weight: 600; }
    .step-text em { font-style: normal; color: var(--primary-dark); font-weight: 900; }
    .step-text .red { color: #e24b4a; font-weight: 900; }
    .step-text .green { color: #639922; font-weight: 900; }

    /* ===== GRAPH SCREEN ===== */
    #graph-screen { padding: 0 0 48px; }

    .graph-header {
      background: #2d6fb0;
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .graph-header h2 { font-size: 1.25rem; font-weight: 800; }

    .graph-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .stat-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .graph-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .graph-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .dots-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .result-dot { font-size: 1.4rem; line-height: 1; }
    .no-records { font-size: 0.9rem; color: var(--muted); }

    .reset-btn {
      width: 100%;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      border: 2px solid var(--error);
      border-radius: var(--radius);
      background: white;
      color: var(--error);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { background: #fdf0f0; }

    /* ===== REFERENCE SCREEN ===== */
    #ref-screen { padding: 0 0 48px; }

    .ref-header {
      background: var(--accent);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-header h2 { font-size: 1.15rem; font-weight: 800; }

    .ref-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ref-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ref-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .ref-concept-text { font-size: 1.05rem; line-height: 1.8; font-weight: 600; }

    .ref-method-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
      background: #eef6ff;
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      border-radius: 0 10px 10px 0;
    }

    .ref-example-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .ref-q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.75;
      margin-bottom: 14px;
    }

    /* ===== FACTOR VISUAL (GCD / LCM) ===== */
    .factor-visual {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .factor-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .factor-row:last-of-type { margin-bottom: 0; }

    .factor-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 4px;
      min-width: 64px;
    }

    .factor-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .factor-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      background: #e9edf1;
      color: var(--muted);
    }

    .factor-chip.common { background: #d4edff; color: var(--primary-dark); }
    .factor-chip.factor-max { background: var(--primary); color: white; }
    .factor-chip.lcm-match { background: #27ae60; color: white; }

    .factor-answer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #dde3ea;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .factor-answer strong { color: var(--primary); font-size: 1.2rem; }

    /* ===== SEQUENCE VISUAL (等差数列) ===== */
    .seq-visual {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .seq-item { text-align: center; }

    .seq-val {
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seq-idx {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
    }

    .seq-arrow {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      padding-bottom: 16px;
    }

    .seq-ellipsis {
      font-size: 1.2rem;
      color: var(--muted);
      padding-bottom: 14px;
    }

    /* ===== NICKNAME ===== */
    .nickname-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px 0;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }

    .nickname-name {
      font-weight: 800;
      color: white;
    }

    .nickname-change-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .nickname-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 24px;
    }

    .nickname-overlay.hidden { display: none; }

    .nickname-modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .nickname-modal h3 {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .nickname-modal p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .nickname-input {
      width: 100%;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      padding: 14px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .nickname-input:focus { border-color: var(--primary); }

    .nickname-ok-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    /* ===== TOP ACTIONS ===== */
    .top-actions {
      padding: 0 16px 32px;
    }

    /* ===== QUESTION COUNT SELECTOR ===== */
    .qcount-section {
      padding: 0 16px 4px;
    }

    .qcount-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .qcount-bar {
      display: flex;
      gap: 8px;
    }

    .qcount-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 0.95rem;
      font-weight: 800;
      border: 2px solid #dde3ea;
      border-radius: 10px;
      background: white;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .qcount-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .qcount-btn:active { opacity: 0.8; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .progress-track {
      background: #dde3ea;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* ===== SESSION RESULT CARD ===== */
    .session-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 20px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .session-icon { font-size: 3.5rem; margin-bottom: 12px; }

  </style>
</head>

<script>
// ============================================================
//  SESSION STATE
// ============================================================
let qCount = 5;
let sessionAnswered = 0;
let sessionCorrect  = 0;

// ============================================================
//  UTILS
// ============================================================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gcdCalc(a, b) {
  while (b) { const t = b; b = a % b; a = t; }
  return a;
}

function lcmCalc(a, b) {
  return a / gcdCalc(a, b) * b;
}

function getFactors(n) {
  const f = [];
  for (let i = 1; i <= n; i++) { if (n % i === 0) f.push(i); }
  return f;
}

// ============================================================
//  MODULE REGISTRY
// ============================================================
const modules = [];
function registerModule(mod) { modules.push(mod); }

// ============================================================
//  和差算 MODULE
// ============================================================
registerModule({
  id: 'wassan',
  name: '和差算',
  icon: '⚖️',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')   return this._genJuken();
    if (this._level === 'gosanke') return this._genGosanke();
    return this._level === 'basic' ? this._genBasic() : this._genApplied();
  },

  _makeValid(sumMin, sumMax, diffMin, diffMax) {
    let sum, diff;
    do {
      sum  = randInt(sumMin, sumMax);
      diff = randInt(diffMin, diffMax);
    } while ((sum + diff) % 2 !== 0 || diff >= sum);
    const big   = (sum + diff) / 2;
    const small = (sum - diff) / 2;
    return { sum, diff, big, small };
  },

  _genBasic() {
    const { sum, diff, big, small } = this._makeValid(10, 30, 2, 12);
    this._current = { sum, diff, big, small, nameA: '大きい数', nameB: '小さい数', unitA: '', unitB: '' };
    return {
      text: `2つの数の 和は <span class="num">${sum}</span>、<br>差は <span class="num">${diff}</span> です。<br>それぞれの数は？`,
      inputs: [
        { id: 'ans-A', label: '大きい数', unit: '' },
        { id: 'ans-B', label: '小さい数', unit: '' },
      ],
    };
  },

  _genApplied() {
    const tpls = [this._tplAllowance, this._tplRibbon, this._tplAge, this._tplCards];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplAllowance() {
    const { sum, diff, big, small } = this._makeValid(400, 1200, 50, 400);
    this._current = { sum, diff, big, small, nameA: '兄', nameB: '弟', unitA: '円', unitB: '円' };
    return {
      text: `兄と弟のおこづかいを あわせると <span class="num">${sum}</span>円。<br>兄の方が <span class="num">${diff}</span>円 多い。<br>それぞれ 何円？`,
      inputs: [
        { id: 'ans-A', label: '兄のおこづかい', unit: '円' },
        { id: 'ans-B', label: '弟のおこづかい', unit: '円' },
      ],
    };
  },

  _tplRibbon() {
    const { sum, diff, big, small } = this._makeValid(20, 80, 4, 20);
    this._current = { sum, diff, big, small, nameA: '赤', nameB: '青', unitA: 'cm', unitB: 'cm' };
    return {
      text: `赤と青のリボンをつなぐと <span class="num">${sum}</span>cm。<br>赤の方が <span class="num">${diff}</span>cm 長い。<br>それぞれ 何cm？`,
      inputs: [
        { id: 'ans-A', label: '赤のリボン', unit: 'cm' },
        { id: 'ans-B', label: '青のリボン', unit: 'cm' },
      ],
    };
  },

  _tplAge() {
    const { sum, diff, big, small } = this._makeValid(20, 60, 2, 16);
    this._current = { sum, diff, big, small, nameA: '父', nameB: '子', unitA: '歳', unitB: '歳' };
    return {
      text: `父と子の年れいの和は <span class="num">${sum}</span>歳。<br>父の方が <span class="num">${diff}</span>歳 年上。<br>それぞれ 何歳？`,
      inputs: [
        { id: 'ans-A', label: '父の年れい', unit: '歳' },
        { id: 'ans-B', label: '子の年れい', unit: '歳' },
      ],
    };
  },

  _tplCards() {
    const { sum, diff, big, small } = this._makeValid(20, 60, 2, 20);
    this._current = { sum, diff, big, small, nameA: 'A', nameB: 'B', unitA: 'まい', unitB: 'まい' };
    return {
      text: `AとBのカードをあわせると <span class="num">${sum}</span>まい。<br>Aの方が <span class="num">${diff}</span>まい 多い。<br>それぞれ 何まい？`,
      inputs: [
        { id: 'ans-A', label: 'Aのカード', unit: 'まい' },
        { id: 'ans-B', label: 'Bのカード', unit: 'まい' },
      ],
    };
  },

  _genJuken() {
    const tpls = [this._jTplChain, this._jTplDistribute, this._jTplKafusoku, this._jTplBaibai];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【中学受験】倍数差の連鎖（A=kB-r, B=C+d, 合計S）
  _jTplChain() {
    let k, r, d, C, B, A, S;
    do {
      k = randInt(2, 3);
      d = randInt(1, 5) * 200;
      r = randInt(1, 4) * 200;
      C = randInt(2, 8) * 200;
      B = C + d;
      A = k * B - r;
      S = A + B + C;
    } while (A <= 0 || S > 20000 || S % 200 !== 0);
    const pairs = [['A','B','C','円'], ['太郎','次郎','三郎','円'], ['兄','弟','妹','円']];
    const [nA, nB, nC, unit] = pairs[randInt(0, pairs.length - 1)];
    this._current = { nA: A, nB: B, nC: C, nameA: nA, nameB: nB, nameC: nC, unitA: unit, unitB: unit, unitC: unit };
    return {
      text: `${nA}・${nB}・${nC} 3人の所持金の合計は <span class="num">${S}</span>${unit}。<br>${nA}は${nB}の <span class="num">${k}</span>倍より <span class="num">${r}</span>${unit} 少なく、<br>${nB}は${nC}より <span class="num">${d}</span>${unit} 多い。<br>それぞれ 何${unit}？`,
      inputs: [
        { id: 'ans-A', label: `${nA}の所持金`, unit },
        { id: 'ans-B', label: `${nB}の所持金`, unit },
        { id: 'ans-C', label: `${nC}の所持金`, unit },
      ],
    };
  },

  // 【中学受験】分配＋比の和差（CはAとBの合計の1/n）
  _jTplDistribute() {
    let A, B, C, S, d, n, m;
    do {
      n = randInt(2, 4);
      m = randInt(3, 12) * 200;
      d = randInt(1, 5) * 200;
      if ((m * n + d) % 2 !== 0) continue;
      A = (m * n + d) / 2;
      B = A - d;
      C = m;
      S = A + B + C;
    } while (B <= 0 || C <= 0 || S > 40000 || S % 200 !== 0);
    this._current = { nA: A, nB: B, nC: C, nameA: '長男', nameB: '次男', nameC: '三男', unitA: '円', unitB: '円', unitC: '円' };
    return {
      text: `<span class="num">${S}</span>円を長男・次男・三男の3人で分ける。<br>長男は次男より <span class="num">${d}</span>円 多く、<br>三男は長男と次男の合計の <span class="num">1/${n}</span>。<br>それぞれ 何円？`,
      inputs: [
        { id: 'ans-A', label: '長男の金額', unit: '円' },
        { id: 'ans-B', label: '次男の金額', unit: '円' },
        { id: 'ans-C', label: '三男の金額', unit: '円' },
      ],
    };
  },

  // 【中学受験】過不足算（最後の1人が少ない型）
  // a個ずつ→r1個余り、b個ずつ→最後の1人だけr2個（他はb個）→ N=(b+r1-r2)/(b-a)
  _jTplKafusoku() {
    let a, b, r1, r2, N, M;
    do {
      a  = randInt(3, 7);
      b  = a + randInt(2, 4);
      r1 = randInt(2, 10);
      r2 = randInt(1, b - 1);
      if ((b + r1 - r2) % (b - a) !== 0) continue;
      N = (b + r1 - r2) / (b - a);
      M = a * N + r1;
    } while (N < 5 || N > 30 || M > 250);
    this._current = { nA: N, nB: M, nameA: '子供の人数', nameB: 'お菓子の数', unitA: '人', unitB: '個' };
    return {
      text: `子供にお菓子を配る。<br>1人に <span class="num">${a}</span>個ずつ配ると <span class="num">${r1}</span>個 余る。<br>1人に <span class="num">${b}</span>個ずつ配ると<br>最後の1人だけ <span class="num">${r2}</span>個 になる。<br>子供の人数とお菓子の数は？`,
      inputs: [
        { id: 'ans-A', label: '子供の人数', unit: '人' },
        { id: 'ans-B', label: 'お菓子の数', unit: '個' },
      ],
    };
  },

  // 【中学受験】売買和差（定価×割引×合計金額）
  // A品定価vA、B品定価vBを2割引で購入。合計N個、合計S円。
  _jTplBaibai() {
    let vA, vB, nA, nB, N, S;
    do {
      vA = randInt(4, 10) * 100;
      vB = randInt(3, 8) * 100;
      if (vA === vB) continue;
      nA = randInt(3, 10); nB = randInt(3, 10);
      N = nA + nB;
      S = vA * nA + vB * 0.8 * nB;
    } while (!Number.isInteger(S) || S > 20000 || N > 20);
    this._current = { N, nA, nB, valA: vA, valB: vB, S,
      nameA: 'A品', unitA: '個', nameB: 'B品', unitB: '個' };
    return {
      text: `定価 <span class="num">${vA}</span>円のA品と<br>定価 <span class="num">${vB}</span>円のB品を合わせて <span class="num">${N}</span>個 買った。<br>B品を2割引きで買ったら合計 <span class="num">${S}</span>円。<br>A品とB品は それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A品の個数', unit: '個' },
        { id: 'ans-B', label: 'B品の個数', unit: '個' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const b = parseInt(document.getElementById('ans-B').value, 10);
    const cur = this._current;
    if (cur.nC !== undefined) {
      const c = parseInt(document.getElementById('ans-C')?.value, 10);
      return {
        correct: a === cur.nA && b === cur.nB && c === cur.nC,
        explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}、${cur.nameC} ${cur.nC}${cur.unitC}`,
      };
    }
    if (cur.futureA !== undefined) {
      return {
        correct: a === cur.futureA && b === cur.futureB,
        explanation: `${cur.nameA} ${cur.futureA}${cur.unitA}、${cur.nameB} ${cur.futureB}${cur.unitB}`,
      };
    }
    const ansA = cur.nA !== undefined ? cur.nA : cur.big;
    const ansB = cur.nB !== undefined ? cur.nB : cur.small;
    return {
      correct: a === ansA && b === ansB,
      explanation: `${cur.nameA} ${ansA}${cur.unitA}、${cur.nameB} ${ansB}${cur.unitB}`,
    };
  },

  _genGosanke() {
    const tpls = [this._gWAgeRatio, this._gWOverUnder, this._gWDivision, this._gWCirculate];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【御三家】比の変化（年齢算）: 現在 p:q、y年後 r:1 → A=pk, k=y(r-1)/(p-rq)
  _gWAgeRatio() {
    const combos = [
      {p:7,q:2,r:3,y:4},{p:5,q:2,r:2,y:6},{p:4,q:1,r:3,y:3},
      {p:8,q:3,r:2,y:6},{p:9,q:4,r:2,y:4},{p:5,q:1,r:4,y:5},
      {p:7,q:3,r:2,y:3},{p:11,q:4,r:3,y:8},{p:6,q:1,r:5,y:4},
    ];
    const {p, q, r, y} = combos[randInt(0, combos.length - 1)];
    const k = y * (r - 1) / (p - r * q);
    const A = p * k, B = q * k;
    const pairs = [['父','子'],['兄','弟'],['姉','妹']];
    const [nA, nB] = pairs[randInt(0, pairs.length - 1)];
    this._current = { nA: A, nB: B, nameA: nA, nameB: nB, unitA: '歳', unitB: '歳' };
    return {
      text: `現在、${nA}と${nB}の年齢の比は <span class="num">${p}</span>：<span class="num">${q}</span>。<br><span class="num">${y}</span>年後の比は <span class="num">${r}</span>：1 になる。<br>現在の${nA}と${nB}の年齢は？`,
      inputs: [

        { id: 'ans-B', label: `${nB}の年齢`, unit: '歳' },
      ],
    };
  },

  // 【御三家】過不足算: N人にa冊→b冊余り、c冊→d冊不足 → N=(b+d)/(c-a)
  _gWOverUnder() {
    let a, c, b, d, N, total;
    do {
      a = randInt(3, 7); c = a + randInt(2, 4);
      b = randInt(2, 8); d = randInt(2, 10);
      N = (b + d) / (c - a);
      total = a * N + b;
    } while (!Number.isInteger(N) || N < 5 || N > 30 || total > 250);
    this._current = { nA: N, nB: total, nameA: '生徒の人数', nameB: 'ノートの冊数', unitA: '人', unitB: '冊' };
    return {
      text: `生徒にノートを配る。<br>1人に <span class="num">${a}</span>冊ずつ配ると <span class="num">${b}</span>冊 余り、<br>1人に <span class="num">${c}</span>冊ずつ配ると <span class="num">${d}</span>冊 足りない。<br>生徒の人数とノートの冊数は？`,
      inputs: [
        { id: 'ans-A', label: '生徒の人数', unit: '人' },
        { id: 'ans-B', label: 'ノートの冊数', unit: '冊' },
      ],
    };
  },

  // 【御三家】割り算の商と余り: big=Q*small+R, big+small=S → small=(S-R)/(Q+1)
  _gWDivision() {
    let Q, R, small, big, S;
    do {
      Q = randInt(2, 5); R = randInt(1, Q - 1);
      small = randInt(R + 2, 18);
      big = Q * small + R; S = big + small;
    } while (S > 180 || big > 130);
    this._current = { nA: big, nB: small, nameA: '大きい数', nameB: '小さい数', unitA: '', unitB: '' };
    return {
      text: `2つの整数がある。<br>大きい方を小さい方で割ると<br>商 <span class="num">${Q}</span>、余り <span class="num">${R}</span>。<br>2つの数の和は <span class="num">${S}</span>。<br>2つの数はそれぞれ いくつ？`,
      inputs: [
        { id: 'ans-A', label: '大きい数', unit: '' },
        { id: 'ans-B', label: '小さい数', unit: '' },
      ],
    };
  },

  // 【御三家】3人の循環移動で全員等額: A=11k, B=7k, C=6k (total=24k)
  // AがBに「Bの持っている額と同じだけ」→ BがCに → CがAに → 全員 total/3
  _gWCirculate() {
    const k = randInt(1, 4) * 100;
    const total = 24 * k;
    const A = 11 * k, B = 7 * k, C = 6 * k;
    this._current = {
      nA: A, nB: B, nC: C,
      nameA: 'A', nameB: 'B', nameC: 'C',
      unitA: '円', unitB: '円', unitC: '円',
    };
    return {
      text: `A・B・Cの3人がお金を持っている。<br>①AがBに「Bの持っている額と同じだけ」渡した。<br>②BがCに「Cの持っている額と同じだけ」渡した。<br>③CがAに「Aの持っている額と同じだけ」渡したら<br>3人とも <span class="num">${total / 3}</span>円 になった。<br>はじめ それぞれ 何円だったか？`,
      inputs: [
        { id: 'ans-A', label: 'A のはじめの額', unit: '円' },
        { id: 'ans-B', label: 'B のはじめの額', unit: '円' },
        { id: 'ans-C', label: 'C のはじめの額', unit: '円' },
      ],
    };
  },

  explain() { return { type: 'wassan', ...this._current }; },
});

registerModule({
  id: 'tsurukame',
  name: '鶴亀算',
  icon: '🐢',
  unlocked: true,
  _level: 'basic',

  generate() {

  _genBasic() {

    const valA = 2, valB = 4, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,

      text: `つると かめが あわせて <span class="num">${N}</span>ひき、<br>あしは あわせて <span class="num">${S}</span>本。<br>それぞれ 何びき？`,
      inputs: [
        { id: 'ans-A', label: 'つるの数', unit: 'わ' },

  _genApplied() {

  _tplBike() {

  _tplCoins() {

    const N = randInt(5, 12), nA = randInt(1, N - 1), nB = N - nA;
    const S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'えんぴつ', unitA: '本', nameB: '消しゴム', unitB: 'こ', unitS: '円' };
    return {
      text: `1本 <span class="num">${valA}</span>円の えんぴつと、<br>1こ <span class="num">${valB}</span>円の 消しゴムを<br>あわせて <span class="num">${N}</span>こ かって <span class="num">${S}</span>円。<br>それぞれ 何こ？`,
      inputs: [
        { id: 'ans-A', label: 'えんぴつ', unit: '本' },
        { id: 'ans-B', label: '消しゴム', unit: 'こ' },

  _genJuken() {
    const tpls = [this._jTplSpeed, this._jTpl3Diff, this._jTplKaten, this._jTplAddChange];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【中学受験】速さの鶴亀（距離を2分割、時間合計から各距離を求める）
  _jTplSpeed() {
    let vW, vR, dW, dR, D, T;
    do {
      vW = randInt(4, 8) * 10;
      vR = (vW / 10 + randInt(3, 7)) * 10;
      dW = randInt(3, 12) * 100;
      dR = randInt(2, 10) * 100;
      D  = dW + dR;
      T  = dW / vW + dR / vR;
    } while (!Number.isInteger(T) || T > 60 || T < 8 || D > 3000);
    this._current = { N: D, nA: dW, nB: dR,
      nameA: '歩いた道のり', unitA: 'm', nameB: '走った道のり', unitB: 'm' };
    return {
      text: `分速 <span class="num">${vW}</span>m で歩き、<br>分速 <span class="num">${vR}</span>m で走って学校に着いた。<br>学校までの道のりは <span class="num">${D}</span>m、<br>かかった時間は <span class="num">${T}</span>分。<br>歩いた道のりと走った道のりは それぞれ 何m？`,
      inputs: [
        { id: 'ans-A', label: '歩いた道のり', unit: 'm' },
        { id: 'ans-B', label: '走った道のり', unit: 'm' },
      ],
    };
  },

  // 【中学受験】3種類+差の条件（AはBよりd個多い）→ 消去して鶴亀
  _jTpl3Diff() {
    let nA, nB, nC, N, S, vA, vB, vC, d;
    for (let i = 0; i < 300; i++) {
      vA = randInt(5, 14) * 10;
      vB = randInt(3, 10) * 10;
      vC = randInt(8, 18) * 10;
      if (vA === vB || vA === vC || vB === vC) continue;
      d  = randInt(1, 5);
      nB = randInt(2, 8); nC = randInt(2, 8);
      nA = nB + d;
      N  = nA + nB + nC;
      S  = vA * nA + vB * nB + vC * nC;
      if (N < 8 || N > 25 || S > 5000 || S % 10 !== 0) continue;
      break;
    }
    this._current = { nA, nB, nC, N, S,
      nameA: 'りんご', unitA: '個', nameB: 'みかん', unitB: '個', nameC: 'かき', unitC: '個' };
    return {
      text: `<span class="num">${vA}</span>円のりんご、<span class="num">${vB}</span>円のみかん、<span class="num">${vC}</span>円のかきを<br>合わせて <span class="num">${N}</span>個 買うと <span class="num">${S}</span>円。<br>りんごはみかんより <span class="num">${d}</span>個 多い。<br>りんご・みかん・かき それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'りんごの個数', unit: '個' },
        { id: 'ans-B', label: 'みかんの個数', unit: '個' },
        { id: 'ans-C', label: 'かきの個数', unit: '個' },
      ],
    };
  },

  // 【中学受験】仮定算・得点型（正解+p点、不正解-q点）
  _jTplKaten() {
    let N, p, q, correct, wrong, T;
    do {
      N       = randInt(10, 20);
      p       = randInt(2, 5);
      q       = randInt(1, 3);
      correct = randInt(Math.ceil(N * 0.55), N - 2);
      wrong   = N - correct;
      T       = p * correct - q * wrong;
    } while (T <= 0 || T > N * p - 10);
    this._current = { N, nA: correct, nB: wrong,
      nameA: '正解', unitA: '問', nameB: '不正解', unitB: '問' };
    return {
      text: `<span class="num">${N}</span>問のテスト。<br>正解は1問 <span class="num">${p}</span>点、<br>不正解は1問 <span class="num">${q}</span>点 引かれる。<br>合計 <span class="num">${T}</span>点 だったとき、<br>正解と不正解は それぞれ 何問？`,
      inputs: [
        { id: 'ans-A', label: '正解の問数', unit: '問' },
        { id: 'ans-B', label: '不正解の問数', unit: '問' },
      ],
    };
  },

  // 【中学受験】個数変化型（M個追加するとAはBのk倍になる）
  _jTplAddChange() {
    let N, M, k, nA, nB;
    do {
      k = randInt(2, 4);
      M = randInt(2, 12);
      N = randInt(10, 35);
      if ((k * N - M) % (k + 1) !== 0) continue;
      nA = (k * N - M) / (k + 1);
      nB = N - nA;
    } while (nA <= 0 || nB <= 0 || nA + M > N * k);
    this._current = { N, nA, nB, nameA: 'A', unitA: '個', nameB: 'B', unitB: '個' };
    return {
      text: `AとBが合わせて <span class="num">${N}</span>個 ある。<br>Aを <span class="num">${M}</span>個 追加すると、<br>AはBの <span class="num">${k}</span>倍 になった。<br>はじめ、AとBは それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A の個数', unit: '個' },
        { id: 'ans-B', label: 'B の個数', unit: '個' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const b = parseInt(document.getElementById('ans-B').value, 10);
    const cur = this._current;
    if (cur.nC !== undefined && document.getElementById('ans-C')) {
      const c = parseInt(document.getElementById('ans-C').value, 10);
      return {
        correct: a === cur.nA && b === cur.nB && c === cur.nC,
        explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}、${cur.nameC} ${cur.nC}${cur.unitC}`,
      };
    }
    if (cur.nAC !== undefined) {
      return {
        correct: a === cur.nA && b === cur.nC,
        explanation: `自転車 ${cur.nA}台、三輪車 ${cur.nB}台、自動車 ${cur.nC}台`,
      };
    }
    return {
      correct: a === cur.nA && b === cur.nB,
      explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}`,
    };
  },

  _genGosanke() {
    const tpls = [this._gTSpeed, this._gTAlligation, this._gTProfit2, this._gTEliminate];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【御三家】速さへの応用（旅人算×鶴亀）
  // 歩きvW m/分 + 走りvR m/分、合計T分、距離D m → 各時間を求める
  _gTSpeed() {
    let vW, vR, tW, tR, T, D;
    do {
      vW = randInt(5, 9) * 10;
      vR = (vW / 10 + randInt(3, 6)) * 10;
      tW = randInt(5, 20); tR = randInt(3, 15);
      T = tW + tR; D = vW * tW + vR * tR;
    } while (D % 10 !== 0 || D > 4000 || T > 40);
    this._current = { N: T, nA: tW, nB: tR, valA: vW, valB: vR, S: D,
      nameA: '歩き', unitA: '分', nameB: '走り', unitB: '分', unitS: 'm' };
    return {
      text: `太郎は分速 <span class="num">${vW}</span>m で歩き、<br>分速 <span class="num">${vR}</span>m で走って学校へ行った。<br>合計 <span class="num">${T}</span>分 かかり、距離は <span class="num">${D}</span>m。<br>歩いた時間と走った時間は それぞれ 何分？`,
      inputs: [
        { id: 'ans-A', label: '歩いた時間', unit: '分' },
        { id: 'ans-B', label: '走った時間', unit: '分' },
      ],
    };
  },

  // 【御三家】混合平均（アレガション）
  // A組平均Ma、B組平均Mb、合計N人の全体平均M → 各クラスの人数
  // nA*(Ma-M) = nB*(M-Mb) かつ nA+nB=N
  _gTAlligation() {
    let Ma, Mb, M, N, nA, nB;
    for (let i = 0; i < 200; i++) {
      Mb = randInt(5, 8) * 10;
      Ma = Mb + randInt(1, 4) * 10;
      const p = randInt(1, 4), q = randInt(1, 4);
      const Mc = (Ma * p + Mb * q) / (p + q);
      if (!Number.isInteger(Mc)) continue;
      M = Mc;
      const base = randInt(2, 6);
      nA = p * base; nB = q * base; N = nA + nB;
      if (N < 6 || N > 50 || nA < 2 || nB < 2) continue;
      break;
    }
    this._current = { N, nA, nB, valA: Ma, valB: Mb, S: M * N,
      nameA: 'A組', unitA: '人', nameB: 'B組', unitB: '人', unitS: '点' };
    return {
      text: `A組とB組が合同でテストを受けた。<br>A組の平均は <span class="num">${Ma}</span>点、B組の平均は <span class="num">${Mb}</span>点。<br>2組合わせた平均は <span class="num">${M}</span>点、合計 <span class="num">${N}</span>人。<br>A組と B組は それぞれ 何人？`,
      inputs: [
        { id: 'ans-A', label: 'A組の人数', unit: '人' },
        { id: 'ans-B', label: 'B組の人数', unit: '人' },
      ],
    };
  },

  // 【御三家】損益算（利益率と損失率の組み合わせ）
  // A品: 原価vA、rA%利益; B品: 原価vB、rB%損失; nA+nB=N
  // 全体の利益 P = vA*(rA/100)*nA - vB*(rB/100)*nB
  // → nA = (P*100 + vB*rB*N) / (vA*rA + vB*rB)
  _gTProfit2() {
    let nA, nB, vA, vB, rA, rB, N, P;
    for (let i = 0; i < 200; i++) {
      rA = randInt(1, 4) * 10; rB = randInt(1, 3) * 10;
      vA = randInt(2, 8) * 100; vB = randInt(2, 8) * 100;
      nA = randInt(3, 12); nB = randInt(3, 12); N = nA + nB;
      P = vA * rA * nA / 100 - vB * rB * nB / 100;
      if (!Number.isInteger(P) || Math.abs(P) > 20000 || Math.abs(P) < 100) continue;
      const check = (P * 100 + vB * rB * N) / (vA * rA + vB * rB);
      if (!Number.isInteger(check) || check !== nA) continue;
      break;
    }
    const profitLabel = P >= 0
      ? `<span class="num">${P}</span>円 の 利益`
      : `<span class="num">${-P}</span>円 の 損失`;
    this._current = { N, nA, nB, valA: vA, valB: vB, S: 0,
      nameA: 'A商品', unitA: '個', nameB: 'B商品', unitB: '個', unitS: '円' };
    return {
      text: `原価 <span class="num">${vA}</span>円の A品に <span class="num">${rA}</span>% の利益を乗せ、<br>原価 <span class="num">${vB}</span>円の B品を <span class="num">${rB}</span>% 引きで 売った。<br>合わせて <span class="num">${N}</span>個 売り、全体で ${profitLabel}。<br>A品と B品は それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A品の個数', unit: '個' },
        { id: 'ans-B', label: 'B品の個数', unit: '個' },
      ],
    };
  },

  // 【御三家】3種類の消去（2段階推論）
  // A(vA円)、B(vB円)、C(vC円)、合計N個でS円、A+B=Q個
  // → まずC=N-Qと決め、残りをA・Bで鶴亀
  _gTEliminate() {
    let nA, nB, nC, N, Q, vA, vB, vC, S;
    for (let i = 0; i < 300; i++) {
      vA = randInt(3, 9) * 10; vB = randInt(2, 7) * 10; vC = randInt(5, 15) * 10;
      if (vA === vB) continue;
      nA = randInt(3, 10); nB = randInt(3, 10); nC = randInt(2, 8);
      N = nA + nB + nC; Q = nA + nB;
      S = vA * nA + vB * nB + vC * nC;
      if (S > 6000 || S % 10 !== 0 || N > 25) continue;
      const rem = S - vC * nC;
      const check = (rem - vB * Q) / (vA - vB);
      if (!Number.isInteger(check) || check !== nA || check <= 0) continue;
      break;
    }
    this._current = {
      nA, nB, nC, N, S,
      nameA: 'A', unitA: '個', nameB: 'B', unitB: '個', nameC: 'C', unitC: '個',
    };
    return {
      text: `1個 <span class="num">${vA}</span>円 の A、<span class="num">${vB}</span>円 の B、<span class="num">${vC}</span>円 の C を<br>合わせて <span class="num">${N}</span>個 買うと <span class="num">${S}</span>円。<br>A と B を合わせると <span class="num">${Q}</span>個 だった。<br>A・B・C それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A の個数', unit: '個' },
        { id: 'ans-B', label: 'B の個数', unit: '個' },
        { id: 'ans-C', label: 'C の個数', unit: '個' },
      ],
    };
  },

  explain() { return { type: 'area', ...this._current }; },
});

    const coprimes = [[1,2],[1,3],[2,3],[1,4],[3,4],[1,5],[2,5],[3,5],[1,6],[5,6],[2,7],[3,7]];

registerModule({
  id: 'arithmetic',
  name: '等差数列',
  icon: '📈',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const a = randInt(1, 15), d = randInt(2, 8), n = randInt(4, 10);
    const answer = a + (n - 1) * d;
    this._current = { a, d, n, answer, subtype: 'nth' };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br>第 <span class="num">${n}</span> 項はいくつですか？`,
      inputs: [{ id: 'ans-A', label: `第${n}項`, unit: '' }],
    };
  },

  _genApplied() {
    return randInt(0, 1) === 0 ? this._tplCount() : this._tplSum();
  },

  _tplCount() {
    const a = randInt(1, 10), d = randInt(2, 7), count = randInt(4, 10);
    const last = a + (count - 1) * d;
    this._current = { a, d, n: count, answer: count, subtype: 'count', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br><span class="num">${last}</span> は第何項ですか？`,
      inputs: [{ id: 'ans-A', label: '何項め', unit: '項め' }],
    };
  },

  _tplSum() {
    const a = randInt(1, 10), d = randInt(2, 6), n = randInt(4, 8);
    const last = a + (n - 1) * d;
    const answer = n * (a + last) / 2;
    this._current = { a, d, n, answer, subtype: 'sum', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列の、第 <span class="num">${n}</span> 項までの<br>合計はいくつですか？`,
      inputs: [{ id: 'ans-A', label: '合計', unit: '' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    return { correct: a === this._current.answer, explanation: `こたえ = ${this._current.answer}` };
  },

  explain() { return { type: 'arithmetic', ...this._current }; },
});

function loadQuestion() {
  updateProgress();
  const q = activeModule.generate();
  document.getElementById('question-text').innerHTML = q.text;

  const card = document.getElementById('answer-card');
  card.innerHTML = '';
  q.inputs.forEach(inp => {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `
      <span class="answer-label">${inp.label}</span>
      <input id="${inp.id}" class="answer-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="?">
      <span class="answer-unit">${inp.unit}</span>`;
    card.appendChild(row);
  });
  setTimeout(() => { const f = card.querySelector('input'); if (f) f.focus(); }, 300);

  document.getElementById('submit-btn').classList.remove('hidden');
  document.getElementById('result-card').classList.add('hidden');
  document.getElementById('explanation-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
}

function checkAnswer() {
  const result = activeModule.checkAnswer();

  const icon  = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const ans   = document.getElementById('result-answer');

  if (result.correct) {
    icon.textContent  = '⭕';
    label.textContent = 'せいかい！';
    label.className   = 'result-label correct';
    ans.textContent   = result.explanation;
  } else {
    icon.textContent  = '❌';
    label.textContent = 'もういちど！';
    label.className   = 'result-label wrong';
    ans.textContent   = 'こたえ：' + result.explanation;
  }

  sessionAnswered++;
  if (result.correct) sessionCorrect++;
  updateProgress();

  document.getElementById('submit-btn').classList.add('hidden');
  document.getElementById('result-card').classList.remove('hidden');

  if (activeModule.explain) {
    const expData = activeModule.explain();
    renderExplanation(expData, 'area-diagram', 'steps-list', 'explanation-title');
    document.getElementById('explanation-card').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('explanation-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  }

  if (sessionAnswered >= qCount) {
    saveSessionRecord(activeModule.id, activeModule._level || 'basic', qCount, sessionCorrect);
    setTimeout(showSessionResult, 500);
  } else {
    document.getElementById('next-btn').classList.remove('hidden');
  }
}

function showSessionResult() {
  const pct = Math.round(sessionCorrect / qCount * 100);
  const icon  = pct === 100 ? '🎉' : pct >= 70 ? '😊' : '💪';

  document.getElementById('session-icon').textContent  = icon;
  const titleEl = document.getElementById('session-title');

// ---- Save / Load ----
function loadLocalRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}

function parseTheme(theme) {
  // "sansu:gcd:basic" → { moduleId: 'gcd', level: 'basic' }
  const parts = theme.replace(THEME_PREFIX, '').split(':');
  return { moduleId: parts[0] || '', level: parts[1] || 'basic' };
}

async function loadRecords() {
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      const { data, error } = await sbClient
        .from('drill_records')
        .select('played_at, score, theme, total_q')
        .eq('user_id', nickname)
        .like('theme', THEME_PREFIX + '%')
        .order('played_at', { ascending: true });
      if (!error && data && data.length > 0) {
        const recs = data.map(r => {
          const { moduleId, level } = parseTheme(r.theme);
          const total   = r.total_q || 1;
          const correct = Math.round((r.score / 100) * total);
          return { date: r.played_at, moduleId, level, total, correct, score: r.score };
        });
        try { localStorage.setItem(RECORDS_KEY, JSON.stringify(recs)); } catch(e) {}
        return { data: recs, fallback: false };
      }
    } catch(e) { console.warn('Supabase load failed', e); }
  }
  return { data: loadLocalRecords(), fallback: true };
}

async function saveSessionRecord(moduleId, level, total, correct) {
  const score = Math.round(correct / total * 100);
  const date  = new Date().toISOString();
  const rec   = { date, moduleId, level, total, correct, score };

  // update localStorage cache immediately
  const local = loadLocalRecords();
  local.push(rec);
  try { localStorage.setItem(RECORDS_KEY, JSON.stringify(local)); } catch(e) {}

  // push to Supabase
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      await sbClient.from('drill_records').insert({
        user_id:   nickname,
        score,
        theme:     THEME_PREFIX + moduleId + ':' + level,
        played_at: date,
        total_q:   total,
      });
    } catch(e) { console.warn('Supabase save failed', e); }
  }
}

// compute total/correct handling both legacy (boolean) and new (number) records
function recStats(recs) {
  let total = 0, correct = 0;
  recs.forEach(r => {
    if (typeof r.total === 'number') {
      total   += r.total;
      correct += r.correct;
    } else {
      total   += 1;
      correct += r.correct ? 1 : 0;
    }
  });
  return { total, correct, pct: total ? Math.round(correct / total * 100) : null };
}

function recScore(r) {
  if (typeof r.score === 'number') return r.score;
  if (typeof r.total === 'number') return Math.round(r.correct / r.total * 100);
  return r.correct ? 100 : 0;
}

async function renderGraph() {
  // show loading state
  document.getElementById('g-total').textContent    = '…';
  document.getElementById('g-accuracy').textContent = '…';
  document.getElementById('g-streak').textContent   = '…';

  const sectionModuleIds = activeSection ? new Set(activeSection.moduleIds) : null;
  const { data: allRecs, fallback } = await loadRecords();
  let recs = sectionModuleIds ? allRecs.filter(r => sectionModuleIds.has(r.moduleId)) : allRecs;
  if (sectionModuleIds) recs = recs.filter(r => sectionModuleIds.has(r.moduleId));

  const { total, correct, pct } = recStats(recs);

  // streak: consecutive sessions with 100%
  let streak = 0;
  for (let i = recs.length - 1; i >= 0; i--) {
    if (recScore(recs[i]) === 100) streak++; else break;
  }

  document.getElementById('g-total').textContent    = total + '問';
  document.getElementById('g-accuracy').textContent = pct !== null ? pct + '%' : '-%';
  document.getElementById('g-streak').textContent   = streak + '回';

  // recent dots (per session, newest first, up to 20)
  const recent = recs.slice(-20).reverse();
  const dotsEl = document.getElementById('g-dots');
  dotsEl.innerHTML = recent.length
    ? recent.map(r => {
        const s = recScore(r);
        return `<span class="result-dot">${s === 100 ? '🎉' : s >= 70 ? '⭕' : '❌'}</span>`;
      }).join('')
    : '<span class="no-records">まだ きろくがありません</span>';

  // per-module stats
  const sectionMods = (activeSection ? activeSection.moduleIds : modules.map(m => m.id))
    .map(id => modules.find(m => m.id === id))
    .filter(m => m && m.unlocked);

  const modLabels = sectionMods.map(m => m.name);
  const COLORS = ['rgba(74,144,217,0.85)', 'rgba(39,174,96,0.85)', 'rgba(245,166,35,0.85)',
                  'rgba(231,76,60,0.85)', 'rgba(142,68,173,0.85)', 'rgba(52,152,219,0.85)'];
  const colors = sectionMods.map((_, i) => COLORS[i % COLORS.length]);

  const modAcc    = sectionMods.map(m => { const s = recStats(recs.filter(r => r.moduleId === m.id)); return s.pct; });
  const modCounts = sectionMods.map(m => recStats(recs.filter(r => r.moduleId === m.id)).total);

  destroyCharts();

  const accEmptyEl  = document.getElementById('g-acc-empty');
  const cntEmptyEl  = document.getElementById('g-cnt-empty');
  const lineEmptyEl = document.getElementById('g-line-empty');
  const accCanvas   = document.getElementById('g-acc-chart');
  const cntCanvas   = document.getElementById('g-cnt-chart');
  const lineCanvas  = document.getElementById('g-line-chart');

  // history table
  const tbody = document.getElementById('g-history-body');
  const histEmpty = document.getElementById('g-history-empty');
  if (recs.length === 0) {
    accEmptyEl.classList.remove('hidden');  accCanvas.style.display  = 'none';
    cntEmptyEl.classList.remove('hidden');  cntCanvas.style.display  = 'none';
    lineEmptyEl.classList.remove('hidden'); lineCanvas.style.display = 'none';
    tbody.innerHTML = '';
    histEmpty.classList.remove('hidden');
    document.getElementById('g-history-table').style.display = 'none';
    return;
  }

  document.getElementById('g-history-table').style.display = '';
  histEmpty.classList.add('hidden');
  tbody.innerHTML = recs.slice().reverse().slice(0, 20).map(r => {
    const d  = new Date(r.date);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const tot = typeof r.total === 'number' ? r.total : 1;
    const cor = typeof r.total === 'number' ? r.correct : (r.correct ? 1 : 0);
    const sc  = recScore(r);
    const cls = sc >= 80 ? 'hist-high' : sc >= 60 ? 'hist-mid' : 'hist-low';
    const mod = modules.find(m => m.id === r.moduleId);
    return `<tr>
      <td>${ds}</td>
      <td>${mod ? mod.name : r.moduleId}</td>
      <td>${tot}問中 <strong>${cor}問</strong></td>
      <td class="${cls}">${sc}%</td>
    </tr>`;
  }).join('');

  // accuracy bar chart
  accEmptyEl.classList.add('hidden'); accCanvas.style.display = '';
  accChart = new Chart(accCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: modLabels,
      datasets: [{ data: modAcc.map(v => v ?? 0), backgroundColor: colors, borderRadius: 10, borderSkipped: false }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { stepSize: 20, callback: v => v + '%' }, grid: { color: '#eee' } },
        x: { grid: { display: false }, ticks: { font: { size: 12, weight: 'bold' } } },
      },
    },
  });

  // question count bar chart
  cntEmptyEl.classList.add('hidden'); cntCanvas.style.display = '';
  cntChart = new Chart(cntCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: modLabels,
      datasets: [{ data: modCounts, backgroundColor: colors, borderRadius: 10, borderSkipped: false }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0, stepSize: 1 }, grid: { color: '#eee' },
             title: { display: true, text: '問題数', font: { size: 11 }, color: '#888' } },
        x: { grid: { display: false }, ticks: { font: { size: 12, weight: 'bold' } } },
      },
    },
  });

  // line chart (score per session)
  lineEmptyEl.classList.add('hidden'); lineCanvas.style.display = '';
  const lineLabels = recs.map((r, i) => {
    const d = new Date(r.date);
    return `${d.getMonth()+1}/${d.getDate()} (${i+1})`;
  });
  const lineData = recs.map(r => recScore(r));
  const pointColors = lineData.map(v => v === 100 ? '#27ae60' : v >= 70 ? '#f5a623' : '#e74c3c');
  lineChart = new Chart(lineCanvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: lineLabels,
      datasets: [{
        data: lineData,
        borderColor: '#4a90d9',
        backgroundColor: 'rgba(74,144,217,0.10)',
        borderWidth: 2.5,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: 6,
        pointHoverRadius: 8,
        tension: 0.3,
        fill: true,
      }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#eee' } },
        x: { ticks: { maxRotation: 45, font: { size: 10 } }, grid: { display: false } },
      },
    },
  });
}

async function clearRecords() {
  if (!confirm('きろくをぜんぶ けしますか？')) return;
  localStorage.removeItem(RECORDS_KEY);
  if (sbClient && getNickname()) {
    try {
      await sbClient.from('drill_records').delete()
        .eq('user_id', getNickname())
        .like('theme', THEME_PREFIX + '%');
    } catch(e) { console.warn('Supabase delete failed', e); }
  }
  await renderGraph();
}

// --- Area diagram (鶴亀算) ---
function buildSVGDiagram({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff   = N * valB - S;
  const spread = valB - valA;

  const PAD_L = 58, PAD_R = 12, PAD_T = 14, PAD_B = 42;
  const W = 300, H = 120;
  const vbW = PAD_L + W + PAD_R, vbH = PAD_T + H + PAD_B;
  const unitW = W / N, unitH = H / valB;
  const x0 = PAD_L, y0 = PAD_T;
  const aW = nA * unitW, bW = nB * unitW;
  const aX = x0, bX = x0 + aW;

  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_RED = '#E24B4A';
  const COL_GRID = '#dde3ea', COL_TEXT = '#2c3e50', COL_MUTED = '#7f8c8d';

  const aFillH = valA * unitH, aFillY = y0 + H - aFillH;
  const redH = spread * unitH, redY = y0;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">
  <defs><pattern id="dp" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#fde8e8"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="${COL_RED}" stroke-width="0.8" opacity="0.5"/>
  </pattern></defs>`;

  svg += `<rect x="${bX}" y="${y0}" width="${bW}" height="${H}" fill="${COL_B}" opacity="0.75" rx="2"/>`;
  svg += `<rect x="${aX}" y="${aFillY}" width="${aW}" height="${aFillH}" fill="${COL_A}" opacity="0.82" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="url(#dp)" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="none" stroke="${COL_RED}" stroke-width="1.5" stroke-dasharray="4 3" rx="2"/>`;

  [0, valA, valB].forEach(v => {
    const gy = y0 + H - v * unitH;
    svg += `<line x1="${x0}" y1="${gy}" x2="${x0+W}" y2="${gy}" stroke="${COL_GRID}" stroke-width="${v===0||v===valB?1.5:0.7}"/>`;
  });
  svg += `<line x1="${bX}" y1="${y0}" x2="${bX}" y2="${y0+H}" stroke="${COL_GRID}" stroke-width="1.2" stroke-dasharray="3 2"/>`;
  svg += `<line x1="${x0}" y1="${y0}" x2="${x0}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `<text x="${x0-5}" y="${y0+H}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">0</text>`;
  svg += `<text x="${x0-5}" y="${y0+H-aFillH}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valA}${unitS}</text>`;
  svg += `<text x="${x0-5}" y="${y0}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valB}${unitS}</text>`;

  if (aW > 22) svg += `<text x="${aX+aW/2}" y="${aFillY+aFillH/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameA}</text>`;
  if (bW > 22) svg += `<text x="${bX+bW/2}" y="${y0+H/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameB}</text>`;
  if (aW > 30) svg += `<text x="${aX+aW/2}" y="${redY+redH/2}" text-anchor="middle" font-size="10" font-weight="bold" fill="${COL_RED}" dominant-baseline="middle">${diff}${unitS}へらす</text>`;

  const labelY = y0 + H + 16;
  svg += `<text x="${aX+aW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_A}" font-weight="bold">${nameA} ${nA}${unitA}</text>`;
  svg += `<text x="${bX+bW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_B}" font-weight="bold">${nameB} ${nB}${unitB}</text>`;
  svg += `<line x1="${x0}" y1="${y0+H}" x2="${x0+W}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `</svg>`;
  return svg;
}

function buildStepItems({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff = N * valB - S, allB = N * valB, spread = valB - valA;
  return [
    `ぜんぶ <span class="green">${nameB}</span> だとすると…<br><em>${N}</em> × <em>${valB}</em> = <em>${allB}</em>${unitS}`,
    `じっさいは <em>${S}</em>${unitS}。ちがいは<br><em>${allB}</em> − <em>${S}</em> = <span class="red">${diff}</span>${unitS}`,
    `${nameA}1つで <em>${spread}</em>${unitS}へる<br><span class="red">${diff}</span> ÷ <em>${spread}</em> = <em>${nA}</em>　→　${nameA} <em>${nA}</em>${unitA}`,
    `${nameB}は <em>${N}</em> − <em>${nA}</em> = <em>${nB}</em>　→　${nameB} <em>${nB}</em>${unitB}`,
  ];
}

// --- GCD visual ---
function buildGCDVisual(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const commonSet = new Set(fA.filter(f => fB.includes(f)));
  function chips(factors) {
    return factors.map(f => {
      let cls = 'factor-chip';
      if (f === g) cls += ' factor-max';
      else if (commonSet.has(f)) cls += ' common';
      return `<span class="${cls}">${f}</span>`;
    }).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の約数</span><div class="factor-chips">${chips(fA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の約数</span><div class="factor-chips">${chips(fB)}</div></div>
    <div class="factor-answer">最大公約数 → <strong>${g}</strong></div>
  </div>`;
}

function buildGCDSteps(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const common = fA.filter(f => fB.includes(f));
  return [
    `<em>${a}</em> の約数：${fA.join('、')}`,
    `<em>${b}</em> の約数：${fB.join('、')}`,
    `共通の約数：<em>${common.join('、')}</em>`,
    `いちばん大きい共通の約数 = <em>${g}</em>`,
  ];
}

// --- LCM visual ---
function buildLCMVisual(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  function chips(mults) {
    return mults.map(m => `<span class="factor-chip${m === l ? ' lcm-match' : ''}">${m}</span>`).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の倍数</span><div class="factor-chips">${chips(mA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の倍数</span><div class="factor-chips">${chips(mB)}</div></div>
    <div class="factor-answer">最小公倍数 → <strong>${l}</strong></div>
  </div>`;
}

function buildLCMSteps(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  return [
    `<em>${a}</em> の倍数：${mA.join('、')}、…`,
    `<em>${b}</em> の倍数：${mB.join('、')}、…`,
    `最初に共通する数 = <em>${l}</em>`,
    `<em>${l}</em> ÷ <em>${a}</em> = <em>${l/a}</em>、<em>${l}</em> ÷ <em>${b}</em> = <em>${l/b}</em>（割り切れる ✓）`,
  ];
}

// --- Arithmetic visual ---
function buildSeqVisual(a, d, n) {
  const count = Math.min(n, 6);
  const terms = Array.from({ length: count }, (_, i) => a + i * d);
  let html = '<div class="seq-visual">';
  terms.forEach((t, i) => {
    html += `<div class="seq-item"><div class="seq-val">${t}</div><div class="seq-idx">第${i+1}項</div></div>`;
    if (i < count - 1) html += `<div class="seq-arrow">+${d}</div>`;
  });
  if (n > count) html += `<div class="seq-ellipsis">…</div>`;
  html += '</div>';
  return html;
}

function buildArithmeticSteps({ a, d, n, answer, subtype, last }) {
  if (subtype === 'nth') {
    return [
      `初項（はじめの数） = <em>${a}</em>、公差（増え方） = <em>${d}</em>`,
      `第 <em>${n}</em> 項 = 初項 + (項数 − 1) × 公差`,
      `= <em>${a}</em> + (<em>${n}</em> − 1) × <em>${d}</em>`,
      `= <em>${a}</em> + <em>${(n-1)*d}</em> = <em>${answer}</em>`,
    ];
  } else if (subtype === 'count') {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>`,
      `<em>${last}</em> は第何項か → (末項 − 初項) ÷ 公差 + 1`,
      `= (<em>${last}</em> − <em>${a}</em>) ÷ <em>${d}</em> + 1`,
      `= <em>${last - a}</em> ÷ <em>${d}</em> + 1 = <em>${answer}</em>項め`,
    ];
  } else {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>、<em>${n}</em> 項まで`,
      `末項（第${n}項） = <em>${a}</em> + (<em>${n}</em>−1) × <em>${d}</em> = <em>${last}</em>`,
      `合計 = (初項 + 末項) × 項数 ÷ 2`,
      `= (<em>${a}</em> + <em>${last}</em>) × <em>${n}</em> ÷ 2 = <em>${answer}</em>`,
    ];
  }
}

// --- Dispatcher ---
function buildWassanVisual({ sum, diff, big, small, nameA, nameB, unitA, unitB }) {
  const W = 280, PAD_L = 52, PAD_R = 20, PAD_T = 16, PAD_B = 16;
  const ROW_H = 34, GAP = 18;
  const vbW = PAD_L + W + PAD_R;
  const vbH = PAD_T + ROW_H + GAP + ROW_H + PAD_B + 40;
  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_DIFF = '#E24B4A';
  const x0 = PAD_L, y0 = PAD_T;
  const bigW  = W;
  const smallW = Math.round(W * small / big);
  const diffW  = bigW - smallW;
  const yA = y0, yB = y0 + ROW_H + GAP;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">`;

  // Row A (big)
  svg += `<rect x="${x0}" y="${yA}" width="${bigW}" height="${ROW_H}" fill="${COL_A}" opacity="0.8" rx="4"/>`;
  svg += `<text x="${x0 + smallW/2}" y="${yA + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="white">${nameA}（${big}${unitA}）</text>`;

  // Row B (small) — same left edge
  svg += `<rect x="${x0}" y="${yB}" width="${smallW}" height="${ROW_H}" fill="${COL_B}" opacity="0.8" rx="4"/>`;
  svg += `<text x="${x0 + smallW/2}" y="${yB + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="white">${nameB}（${small}${unitB}）</text>`;

  // Diff bracket on Row A
  svg += `<rect x="${x0 + smallW}" y="${yA}" width="${diffW}" height="${ROW_H}" fill="${COL_DIFF}" opacity="0.18" rx="0"/>`;
  svg += `<rect x="${x0 + smallW}" y="${yA}" width="${diffW}" height="${ROW_H}" fill="none" stroke="${COL_DIFF}" stroke-width="2" stroke-dasharray="5 3" rx="0"/>`;
  if (diffW > 18) svg += `<text x="${x0 + smallW + diffW/2}" y="${yA + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="bold" fill="${COL_DIFF}">差${diff}${unitA}</text>`;

  // Sum brace under Row A
  const braceY = yA + ROW_H + 6;
  svg += `<line x1="${x0}" y1="${braceY}" x2="${x0+bigW}" y2="${braceY}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<line x1="${x0}" y1="${braceY}" x2="${x0}" y2="${braceY+5}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<line x1="${x0+bigW}" y1="${braceY}" x2="${x0+bigW}" y2="${braceY+5}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<text x="${x0 + bigW/2}" y="${braceY + 14}" text-anchor="middle" font-size="10" fill="#555">和 = ${sum}${unitA}</text>`;

  // Left labels
  svg += `<text x="${x0-4}" y="${yA + ROW_H/2}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="${COL_A}" font-weight="bold">${nameA}</text>`;
  svg += `<text x="${x0-4}" y="${yB + ROW_H/2}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="${COL_B}" font-weight="bold">${nameB}</text>`;

  // Align tick on right of B
  svg += `<line x1="${x0+smallW}" y1="${yB}" x2="${x0+smallW}" y2="${yB+ROW_H}" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2"/>`;

  svg += `</svg>`;
  return svg;
}

function buildWassanSteps({ sum, diff, big, small, nameA, nameB, unitA }) {
  const sumPlusDiff = sum + diff;
  const sumMinusDiff = sum - diff;
  return [
    `和と差をたす：<em>${sum}</em> + <em>${diff}</em> = <em>${sumPlusDiff}</em>`,
    `大きい数 = <em>${sumPlusDiff}</em> ÷ 2 = <span class="green">${big}${unitA}</span>`,
    `和と差をひく：<em>${sum}</em> − <em>${diff}</em> = <em>${sumMinusDiff}</em>`,
    `小さい数 = <em>${sumMinusDiff}</em> ÷ 2 = <span class="green">${small}${unitA}</span>`,
  ];
}

function renderExplanation(data, diagramId, stepsId, titleId) {
  const diagramEl = document.getElementById(diagramId);
  const stepsEl   = document.getElementById(stepsId);
  const titleEl   = titleId ? document.getElementById(titleId) : null;

  let diagramHTML = '';
  let steps = [];
  let title = 'かいせつ';

  if (data.type === 'area') {
    title = 'かいせつ（面積図）';
    diagramHTML = buildSVGDiagram(data);
    steps = buildStepItems(data);
  } else if (data.type === 'gcd') {
    title = 'かいせつ（約数をしらべよう）';
    diagramHTML = buildGCDVisual(data.a, data.b, data.g);
    steps = buildGCDSteps(data.a, data.b, data.g);
  } else if (data.type === 'lcm') {
    title = 'かいせつ（倍数をしらべよう）';
    diagramHTML = buildLCMVisual(data.a, data.b, data.l);
    steps = buildLCMSteps(data.a, data.b, data.l);
  } else if (data.type === 'arithmetic') {
    title = 'かいせつ（等差数列）';
    diagramHTML = buildSeqVisual(data.a, data.d, data.n);
    steps = buildArithmeticSteps(data);
  } else if (data.type === 'wassan') {
    title = 'かいせつ（線分図）';
    diagramHTML = buildWassanVisual(data);
    steps = buildWassanSteps(data);
  }

  if (titleEl) titleEl.textContent = title;
  if (diagramEl) diagramEl.innerHTML = diagramHTML;
  if (stepsEl) {
    stepsEl.innerHTML = '';
    steps.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<div class="step-num">${i+1}</div><div class="step-text">${s}</div>`;
      stepsEl.appendChild(row);
    });
  }
}

renderTop();
updateNicknameBar();
if (!getNickname()) showNicknameModal(false);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
  // SW が更新されたらページをリロードして最新版を表示する
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'SW_UPDATED') location.reload();
  });
  // SW の制御が切り替わったとき（別タブで更新済みの場合など）もリロード
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    location.reload();
  });
}
