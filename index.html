<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>算数道場</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="算数道場">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4a90d9;
      --primary-dark: #2d6fb0;
      --accent: #f5a623;
      --success: #27ae60;
      --error: #e74c3c;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --locked: #b0bec5;
      --radius: 16px;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ===== TOP SCREEN ===== */
    #top-screen { padding: 0 0 40px; }

    .top-header {
      background: var(--primary);
      color: white;
      padding: 48px 24px 32px;
      text-align: center;
    }

    .top-header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .top-header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .categories-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px 16px;
    }

    .category-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .category-card:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-icon { font-size: 2.4rem; flex-shrink: 0; }

    .cat-info { flex: 1; }

    .cat-name {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .cat-desc {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .cat-arrow {
      font-size: 1.2rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ===== SECTION SCREEN ===== */
    #section-screen { padding: 0 0 40px; }

    .section-header {
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-header h2 { font-size: 1.25rem; font-weight: 800; }

    /* ===== MODULE GRID (shared by section screen) ===== */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 24px 16px 8px;
    }

    .module-tile {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 12px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .module-tile:active:not(.locked) {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .module-tile.unlocked { border-color: var(--primary); }
    .module-tile.locked { cursor: default; opacity: 0.65; }

    .tile-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    .tile-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tile-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .badge-open { background: #e8f4fd; color: var(--primary-dark); }
    .badge-soon { background: #eceff1; color: var(--locked); }

    .tile-ref-btn {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e8f4fd;
      color: var(--primary-dark);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HOME ACTIONS ===== */
    .home-actions {
      padding: 0 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-action-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .home-action-btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-graph { background: #2d6fb0; color: white; }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { padding: 0 0 48px; }

    .quiz-header {
      background: var(--primary);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.7; }

    .quiz-header h2 { font-size: 1.25rem; font-weight: 800; }

    .quiz-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .question-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 1.2rem;
      line-height: 1.75;
      font-weight: 600;
    }

    .question-text span.num {
      color: var(--primary-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .answer-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .answer-row:last-of-type { margin-bottom: 0; }

    .answer-label {
      font-size: 1rem;
      font-weight: 700;
      width: 90px;
      flex-shrink: 0;
    }

    .answer-input {
      flex: 1;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      padding: 12px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      -webkit-appearance: none;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .answer-input:focus { border-color: var(--primary); }

    .answer-unit {
      font-size: 1rem;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .submit-btn:active { transform: scale(0.97); background: var(--primary-dark); }

    /* ===== RESULT ===== */
    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
    .result-label { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .result-label.correct { color: var(--success); }
    .result-label.wrong { color: var(--error); }
    .result-answer { font-size: 0.95rem; color: var(--muted); line-height: 1.7; }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .next-btn:active { transform: scale(0.97); opacity: 0.85; }

    .hidden { display: none !important; }

    /* ===== LEVEL SWITCHER ===== */
    .level-switcher {
      display: flex;
      gap: 8px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .level-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .level-btn.active { background: var(--primary); color: white; }

    /* ===== EXPLANATION ===== */
    .explanation-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .explanation-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .area-diagram {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
    }

    .steps-list { display: flex; flex-direction: column; gap: 10px; }

    .step-row { display: flex; gap: 12px; align-items: flex-start; }

    .step-num {
      background: var(--primary);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text { font-size: 1rem; line-height: 1.65; font-weight: 600; }
    .step-text em { font-style: normal; color: var(--primary-dark); font-weight: 900; }
    .step-text .red { color: #e24b4a; font-weight: 900; }
    .step-text .green { color: #639922; font-weight: 900; }

    /* ===== GRAPH SCREEN ===== */
    #graph-screen { padding: 0 0 48px; }

    .graph-header {
      background: #2d6fb0;
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .graph-header h2 { font-size: 1.25rem; font-weight: 800; }

    .graph-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .stat-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .graph-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .graph-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .dots-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .result-dot { font-size: 1.4rem; line-height: 1; }
    .no-records { font-size: 0.9rem; color: var(--muted); }

    .reset-btn {
      width: 100%;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      border: 2px solid var(--error);
      border-radius: var(--radius);
      background: white;
      color: var(--error);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { background: #fdf0f0; }

    /* ===== REFERENCE SCREEN ===== */
    #ref-screen { padding: 0 0 48px; }

    .ref-header {
      background: var(--accent);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-header h2 { font-size: 1.15rem; font-weight: 800; }

    .ref-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ref-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ref-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .ref-concept-text { font-size: 1.05rem; line-height: 1.8; font-weight: 600; }

    .ref-method-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
      background: #eef6ff;
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      border-radius: 0 10px 10px 0;
    }

    .ref-example-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .ref-q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.75;
      margin-bottom: 14px;
    }

    /* ===== FACTOR VISUAL (GCD / LCM) ===== */
    .factor-visual {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .factor-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .factor-row:last-of-type { margin-bottom: 0; }

    .factor-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 4px;
      min-width: 64px;
    }

    .factor-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .factor-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      background: #e9edf1;
      color: var(--muted);
    }

    .factor-chip.common { background: #d4edff; color: var(--primary-dark); }
    .factor-chip.factor-max { background: var(--primary); color: white; }
    .factor-chip.lcm-match { background: #27ae60; color: white; }

    .factor-answer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #dde3ea;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .factor-answer strong { color: var(--primary); font-size: 1.2rem; }

    /* ===== SEQUENCE VISUAL (等差数列) ===== */
    .seq-visual {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .seq-item { text-align: center; }

    .seq-val {
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seq-idx {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
    }

    .seq-arrow {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      padding-bottom: 16px;
    }

    .seq-ellipsis {
      font-size: 1.2rem;
      color: var(--muted);
      padding-bottom: 14px;
    }
  </style>
</head>
<body>

<!-- ===== TOP ===== -->
<div id="top-screen" class="screen active">
  <div class="top-header">
    <h1>算数道場</h1>
    <p>算数をトレーニング！</p>
  </div>
  <div class="categories-list" id="categories-list"></div>
</div>

<!-- ===== SECTION ===== -->
<div id="section-screen" class="screen">
  <div class="section-header" id="section-header">
    <button class="back-btn" onclick="goTop()">← もどる</button>
    <h2 id="section-title"></h2>
  </div>
  <div class="modules-grid" id="modules-grid"></div>
  <div class="home-actions">
    <button class="home-action-btn btn-graph" onclick="showGraph()">📊 きろく（グラフ）を見る</button>
  </div>
</div>

<!-- ===== GRAPH ===== -->
<div id="graph-screen" class="screen">
  <div class="graph-header">
    <button class="back-btn" onclick="goSection()">← もどる</button>
    <h2 id="graph-title">きろく</h2>
  </div>
  <div class="graph-body">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="g-total">0</div><div class="stat-lbl">合計問題数</div></div>
      <div class="stat-box"><div class="stat-val" id="g-accuracy">-%</div><div class="stat-lbl">正答率</div></div>
      <div class="stat-box"><div class="stat-val" id="g-streak">0</div><div class="stat-lbl">連続正解中</div></div>
    </div>

    <div class="graph-card">
      <div class="graph-card-title">レベル別 正答率</div>
      <canvas id="g-chart" height="160"></canvas>
      <div id="g-chart-empty" class="no-records hidden">まだ きろくがありません</div>
    </div>

    <div class="graph-card">
      <div class="graph-card-title">さいきんの 問題（あたらしい順）</div>
      <div class="dots-row" id="g-dots"></div>
    </div>

    <button class="reset-btn" onclick="clearRecords()">きろくを リセットする</button>
  </div>
</div>

<!-- ===== REFERENCE ===== -->
<div id="ref-screen" class="screen">
  <div class="ref-header">
    <button class="back-btn" onclick="goSection()">← もどる</button>
    <h2 id="ref-title"></h2>
  </div>
  <div class="ref-body">
    <div class="ref-card">
      <div class="ref-card-title">どんな問題？</div>
      <div class="ref-concept-text" id="ref-concept"></div>
    </div>
    <div class="ref-card">
      <div class="ref-card-title">かんがえかた</div>
      <div class="ref-method-text" id="ref-method"></div>
    </div>
    <div class="ref-card">
      <div class="ref-example-label">📝 れいだい</div>
      <div class="ref-q-text" id="ref-q"></div>
      <div class="area-diagram" id="ref-diagram"></div>
      <div class="steps-list" id="ref-steps"></div>
    </div>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz-screen" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goSection()">← もどる</button>
    <h2 id="quiz-title"></h2>
  </div>
  <div class="quiz-body">
    <div class="level-switcher">
      <button class="level-btn active" id="btn-basic"   onclick="setLevel('basic')">きほん 🐢</button>
      <button class="level-btn"        id="btn-applied" onclick="setLevel('applied')">おうよう ⭐</button>
    </div>

    <div class="question-card">
      <div class="question-label">もんだい</div>
      <div class="question-text" id="question-text"></div>
    </div>

    <div class="answer-card" id="answer-card"></div>

    <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">こたえあわせ</button>

    <div class="result-card hidden" id="result-card">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-label" id="result-label"></div>
      <div class="result-answer" id="result-answer"></div>
    </div>

    <div class="explanation-card hidden" id="explanation-card">
      <div class="explanation-title" id="explanation-title">かいせつ</div>
      <div class="area-diagram" id="area-diagram"></div>
      <div class="steps-list" id="steps-list"></div>
    </div>

    <button class="next-btn hidden" id="next-btn" onclick="nextQuestion()">つぎのもんだい →</button>
  </div>
</div>

<script>
// ============================================================
//  UTILS
// ============================================================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gcdCalc(a, b) {
  while (b) { const t = b; b = a % b; a = t; }
  return a;
}

function lcmCalc(a, b) {
  return a / gcdCalc(a, b) * b;
}

function getFactors(n) {
  const f = [];
  for (let i = 1; i <= n; i++) { if (n % i === 0) f.push(i); }
  return f;
}

registerModule({
  id: 'arithmetic',
  name: '等差数列',
  icon: '📈',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const a = randInt(1, 15), d = randInt(2, 8), n = randInt(4, 10);
    const answer = a + (n - 1) * d;
    this._current = { a, d, n, answer, subtype: 'nth' };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br>第 <span class="num">${n}</span> 項はいくつですか？`,
      inputs: [{ id: 'ans-A', label: `第${n}項`, unit: '' }],
    };
  },

  _genApplied() {
    return randInt(0, 1) === 0 ? this._tplCount() : this._tplSum();
  },

  _tplCount() {
    const a = randInt(1, 10), d = randInt(2, 7), count = randInt(4, 10);
    const last = a + (count - 1) * d;
    this._current = { a, d, n: count, answer: count, subtype: 'count', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br><span class="num">${last}</span> は第何項ですか？`,
      inputs: [{ id: 'ans-A', label: '何項め', unit: '項め' }],
    };
  },

  _tplSum() {
    const a = randInt(1, 10), d = randInt(2, 6), n = randInt(4, 8);
    const last = a + (n - 1) * d;
    const answer = n * (a + last) / 2;
    this._current = { a, d, n, answer, subtype: 'sum', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列の、第 <span class="num">${n}</span> 項までの<br>合計はいくつですか？`,
      inputs: [{ id: 'ans-A', label: '合計', unit: '' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    return { correct: a === this._current.answer, explanation: `こたえ = ${this._current.answer}` };
  },

  explain() { return { type: 'arithmetic', ...this._current }; },
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goTop() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  activeModule = null;
  activeSection = null;
  showScreen('top-screen');
}

function goSection() {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  activeModule = null;
  if (activeSection) {
    showScreen('section-screen');
  } else {
    goTop();
  }
}

function showSection(sectionId) {
  activeSection = sections.find(s => s.id === sectionId);
  if (!activeSection) return;
  renderSection();
  showScreen('section-screen');
}

function renderTop() {
  const list = document.getElementById('categories-list');
  list.innerHTML = '';
  sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.borderLeftColor = sec.color;
    card.innerHTML = `
      <div class="cat-icon">${sec.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${sec.name}</div>
        <div class="cat-desc">${sec.desc}</div>
      </div>
      <div class="cat-arrow">›</div>`;
    card.onclick = () => showSection(sec.id);
    list.appendChild(card);
  });
}

function renderSection() {
  if (!activeSection) return;

  // header color
  const header = document.getElementById('section-header');
  header.style.background = activeSection.color;
  document.getElementById('section-title').textContent = activeSection.name;

  const sectionModules = activeSection.moduleIds.map(id => modules.find(m => m.id === id)).filter(Boolean);
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';
  sectionModules.forEach(mod => {
    const tile = document.createElement('div');
    tile.className = 'module-tile ' + (mod.unlocked ? 'unlocked' : 'locked');
    const hasRef = !!REF_CONTENT[mod.id];
    tile.innerHTML = `
      <span class="tile-icon">${mod.icon}</span>
      <div class="tile-name">${mod.name}</div>
      <span class="tile-badge ${mod.unlocked ? 'badge-open' : 'badge-soon'}">
        ${mod.unlocked ? 'れんしゅうする' : 'きんじつ公開'}
      </span>
      ${mod.unlocked && hasRef ? `<div class="tile-ref-btn" data-id="${mod.id}">📖 きほんをかくにん</div>` : ''}`;
    if (mod.unlocked) {
      tile.onclick = e => {
        if (e.target.closest('.tile-ref-btn')) return;
        startModule(mod.id);
      };
      const refBtn = tile.querySelector('.tile-ref-btn');
      if (refBtn) refBtn.onclick = e => { e.stopPropagation(); showReference(mod.id); };
    }
    grid.appendChild(tile);
  });
}

function startModule(id) {
  activeModule = modules.find(m => m.id === id);
  if (!activeModule) return;
  document.getElementById('quiz-title').textContent = activeModule.name;
  if (activeModule._level !== undefined) activeModule._level = 'basic';
  document.getElementById('btn-basic').classList.add('active');
  document.getElementById('btn-applied').classList.remove('active');
  showScreen('quiz-screen');
  loadQuestion();
}

function setLevel(level) {
  if (!activeModule) return;
  activeModule._level = level;
  document.getElementById('btn-basic').classList.toggle('active', level === 'basic');
  document.getElementById('btn-applied').classList.toggle('active', level === 'applied');
  loadQuestion();
}

// ============================================================
//  QUIZ FLOW
// ============================================================
function loadQuestion() {
  const q = activeModule.generate();
  document.getElementById('question-text').innerHTML = q.text;

  const card = document.getElementById('answer-card');
  card.innerHTML = '';
  q.inputs.forEach(inp => {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `
      <span class="answer-label">${inp.label}</span>
      <input id="${inp.id}" class="answer-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="?">
      <span class="answer-unit">${inp.unit}</span>`;
    card.appendChild(row);
  });
  setTimeout(() => { const f = card.querySelector('input'); if (f) f.focus(); }, 300);

  document.getElementById('submit-btn').classList.remove('hidden');
  document.getElementById('result-card').classList.add('hidden');
  document.getElementById('explanation-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
}

function checkAnswer() {
  const result = activeModule.checkAnswer();

  const icon  = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const ans   = document.getElementById('result-answer');

  if (result.correct) {
    icon.textContent  = '⭕';
    label.textContent = 'せいかい！';
    label.className   = 'result-label correct';
    ans.textContent   = result.explanation;
  } else {
    icon.textContent  = '❌';
    label.textContent = 'もういちど！';
    label.className   = 'result-label wrong';
    ans.textContent   = 'こたえ：' + result.explanation;
  }

  saveRecord(activeModule.id, activeModule._level || 'basic', result.correct);

  document.getElementById('submit-btn').classList.add('hidden');
  document.getElementById('result-card').classList.remove('hidden');

  if (activeModule.explain) {
    const expData = activeModule.explain();
    renderExplanation(expData, 'area-diagram', 'steps-list', 'explanation-title');
    document.getElementById('explanation-card').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('explanation-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  }

  document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() { loadQuestion(); }

const RECORDS_KEY = 'tokushuzan_records';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}

function saveRecord(moduleId, level, correct) {
  const recs = loadRecords();
  recs.push({ date: new Date().toISOString(), moduleId, level, correct });
  localStorage.setItem(RECORDS_KEY, JSON.stringify(recs));
}

// ============================================================
//  GRAPH SCREEN
// ============================================================
let chartInstance = null;

function showGraph() {
  const title = activeSection ? activeSection.name + ' のきろく' : 'きろく';
  document.getElementById('graph-title').textContent = title;
  showScreen('graph-screen');
  renderGraph();
}

function renderGraph() {
  const sectionModuleIds = activeSection ? new Set(activeSection.moduleIds) : null;
  let recs = loadRecords();
  if (sectionModuleIds) recs = recs.filter(r => sectionModuleIds.has(r.moduleId));

  const total   = recs.length;
  const correct = recs.filter(r => r.correct).length;
  const pct     = total ? Math.round(correct / total * 100) : null;

  let streak = 0;
  for (let i = recs.length - 1; i >= 0; i--) {
    if (recs[i].correct) streak++; else break;
  }

  document.getElementById('g-total').textContent    = total + '問';
  document.getElementById('g-accuracy').textContent = pct !== null ? pct + '%' : '-%';
  document.getElementById('g-streak').textContent   = streak + '問';

  const recent = recs.slice(-20).reverse();
  const dotsEl = document.getElementById('g-dots');
  dotsEl.innerHTML = recent.length
    ? recent.map(r => `<span class="result-dot">${r.correct ? '⭕' : '❌'}</span>`).join('')
    : '<span class="no-records">まだ きろくがありません</span>';

  const basic   = recs.filter(r => r.level === 'basic');
  const applied = recs.filter(r => r.level === 'applied');
  const bAcc    = basic.length   ? Math.round(basic.filter(r=>r.correct).length   / basic.length   * 100) : null;
  const aAcc    = applied.length ? Math.round(applied.filter(r=>r.correct).length / applied.length * 100) : null;

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  const emptyEl = document.getElementById('g-chart-empty');
  if (bAcc === null && aAcc === null) {
    emptyEl.classList.remove('hidden');
    document.getElementById('g-chart').style.display = 'none';
  } else {
    emptyEl.classList.add('hidden');
    document.getElementById('g-chart').style.display = '';
    const ctx = document.getElementById('g-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['きほん 🐢', 'おうよう ⭐'],
        datasets: [{
          data: [bAcc ?? 0, aAcc ?? 0],
          backgroundColor: ['rgba(74,144,217,0.85)', 'rgba(245,166,35,0.85)'],
          borderRadius: 10,
          borderSkipped: false,
        }],
      },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          y: {
            min: 0, max: 100,
            ticks: { stepSize: 20, callback: v => v + '%' },
            grid: { color: '#eee' },
          },
          x: { grid: { display: false } },
        },
      },
    });
  }
}

function clearRecords() {
  if (!confirm('このセクションのきろくを ぜんぶ けしますか？')) return;
  if (activeSection) {
    const ids = new Set(activeSection.moduleIds);
    const kept = loadRecords().filter(r => !ids.has(r.moduleId));
    localStorage.setItem(RECORDS_KEY, JSON.stringify(kept));
  } else {
    localStorage.removeItem(RECORDS_KEY);
  }
  renderGraph();
}

// --- Area diagram (鶴亀算) ---
function buildSVGDiagram({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff   = N * valB - S;
  const spread = valB - valA;

  const PAD_L = 58, PAD_R = 12, PAD_T = 14, PAD_B = 42;
  const W = 300, H = 120;
  const vbW = PAD_L + W + PAD_R, vbH = PAD_T + H + PAD_B;
  const unitW = W / N, unitH = H / valB;
  const x0 = PAD_L, y0 = PAD_T;
  const aW = nA * unitW, bW = nB * unitW;
  const aX = x0, bX = x0 + aW;

  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_RED = '#E24B4A';
  const COL_GRID = '#dde3ea', COL_TEXT = '#2c3e50', COL_MUTED = '#7f8c8d';

  const aFillH = valA * unitH, aFillY = y0 + H - aFillH;
  const redH = spread * unitH, redY = y0;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">
  <defs><pattern id="dp" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#fde8e8"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="${COL_RED}" stroke-width="0.8" opacity="0.5"/>
  </pattern></defs>`;

  svg += `<rect x="${bX}" y="${y0}" width="${bW}" height="${H}" fill="${COL_B}" opacity="0.75" rx="2"/>`;
  svg += `<rect x="${aX}" y="${aFillY}" width="${aW}" height="${aFillH}" fill="${COL_A}" opacity="0.82" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="url(#dp)" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="none" stroke="${COL_RED}" stroke-width="1.5" stroke-dasharray="4 3" rx="2"/>`;

  [0, valA, valB].forEach(v => {
    const gy = y0 + H - v * unitH;
    svg += `<line x1="${x0}" y1="${gy}" x2="${x0+W}" y2="${gy}" stroke="${COL_GRID}" stroke-width="${v===0||v===valB?1.5:0.7}"/>`;
  });
  svg += `<line x1="${bX}" y1="${y0}" x2="${bX}" y2="${y0+H}" stroke="${COL_GRID}" stroke-width="1.2" stroke-dasharray="3 2"/>`;
  svg += `<line x1="${x0}" y1="${y0}" x2="${x0}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `<text x="${x0-5}" y="${y0+H}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">0</text>`;
  svg += `<text x="${x0-5}" y="${y0+H-aFillH}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valA}${unitS}</text>`;
  svg += `<text x="${x0-5}" y="${y0}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valB}${unitS}</text>`;

  if (aW > 22) svg += `<text x="${aX+aW/2}" y="${aFillY+aFillH/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameA}</text>`;
  if (bW > 22) svg += `<text x="${bX+bW/2}" y="${y0+H/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameB}</text>`;
  if (aW > 30) svg += `<text x="${aX+aW/2}" y="${redY+redH/2}" text-anchor="middle" font-size="10" font-weight="bold" fill="${COL_RED}" dominant-baseline="middle">${diff}${unitS}へらす</text>`;

  const labelY = y0 + H + 16;
  svg += `<text x="${aX+aW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_A}" font-weight="bold">${nameA} ${nA}${unitA}</text>`;
  svg += `<text x="${bX+bW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_B}" font-weight="bold">${nameB} ${nB}${unitB}</text>`;
  svg += `<line x1="${x0}" y1="${y0+H}" x2="${x0+W}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `</svg>`;
  return svg;
}

function buildStepItems({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff = N * valB - S, allB = N * valB, spread = valB - valA;
  return [
    `ぜんぶ <span class="green">${nameB}</span> だとすると…<br><em>${N}</em> × <em>${valB}</em> = <em>${allB}</em>${unitS}`,
    `じっさいは <em>${S}</em>${unitS}。ちがいは<br><em>${allB}</em> − <em>${S}</em> = <span class="red">${diff}</span>${unitS}`,
    `${nameA}1つで <em>${spread}</em>${unitS}へる<br><span class="red">${diff}</span> ÷ <em>${spread}</em> = <em>${nA}</em>　→　${nameA} <em>${nA}</em>${unitA}`,
    `${nameB}は <em>${N}</em> − <em>${nA}</em> = <em>${nB}</em>　→　${nameB} <em>${nB}</em>${unitB}`,
  ];
}

// --- GCD visual ---
function buildGCDVisual(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const commonSet = new Set(fA.filter(f => fB.includes(f)));
  function chips(factors) {
    return factors.map(f => {
      let cls = 'factor-chip';
      if (f === g) cls += ' factor-max';
      else if (commonSet.has(f)) cls += ' common';
      return `<span class="${cls}">${f}</span>`;
    }).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の約数</span><div class="factor-chips">${chips(fA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の約数</span><div class="factor-chips">${chips(fB)}</div></div>
    <div class="factor-answer">最大公約数 → <strong>${g}</strong></div>
  </div>`;
}

function buildGCDSteps(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const common = fA.filter(f => fB.includes(f));
  return [
    `<em>${a}</em> の約数：${fA.join('、')}`,
    `<em>${b}</em> の約数：${fB.join('、')}`,
    `共通の約数：<em>${common.join('、')}</em>`,
    `いちばん大きい共通の約数 = <em>${g}</em>`,
  ];
}

// --- LCM visual ---
function buildLCMVisual(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  function chips(mults) {
    return mults.map(m => `<span class="factor-chip${m === l ? ' lcm-match' : ''}">${m}</span>`).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の倍数</span><div class="factor-chips">${chips(mA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の倍数</span><div class="factor-chips">${chips(mB)}</div></div>
    <div class="factor-answer">最小公倍数 → <strong>${l}</strong></div>
  </div>`;
}

function buildLCMSteps(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  return [
    `<em>${a}</em> の倍数：${mA.join('、')}、…`,
    `<em>${b}</em> の倍数：${mB.join('、')}、…`,
    `最初に共通する数 = <em>${l}</em>`,
    `<em>${l}</em> ÷ <em>${a}</em> = <em>${l/a}</em>、<em>${l}</em> ÷ <em>${b}</em> = <em>${l/b}</em>（割り切れる ✓）`,
  ];
}

// --- Arithmetic visual ---
function buildSeqVisual(a, d, n) {
  const count = Math.min(n, 6);
  const terms = Array.from({ length: count }, (_, i) => a + i * d);
  let html = '<div class="seq-visual">';
  terms.forEach((t, i) => {
    html += `<div class="seq-item"><div class="seq-val">${t}</div><div class="seq-idx">第${i+1}項</div></div>`;
    if (i < count - 1) html += `<div class="seq-arrow">+${d}</div>`;
  });
  if (n > count) html += `<div class="seq-ellipsis">…</div>`;
  html += '</div>';
  return html;
}

function buildArithmeticSteps({ a, d, n, answer, subtype, last }) {
  if (subtype === 'nth') {
    return [
      `初項（はじめの数） = <em>${a}</em>、公差（増え方） = <em>${d}</em>`,
      `第 <em>${n}</em> 項 = 初項 + (項数 − 1) × 公差`,
      `= <em>${a}</em> + (<em>${n}</em> − 1) × <em>${d}</em>`,
      `= <em>${a}</em> + <em>${(n-1)*d}</em> = <em>${answer}</em>`,
    ];
  } else if (subtype === 'count') {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>`,
      `<em>${last}</em> は第何項か → (末項 − 初項) ÷ 公差 + 1`,
      `= (<em>${last}</em> − <em>${a}</em>) ÷ <em>${d}</em> + 1`,
      `= <em>${last - a}</em> ÷ <em>${d}</em> + 1 = <em>${answer}</em>項め`,
    ];
  } else {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>、<em>${n}</em> 項まで`,
      `末項（第${n}項） = <em>${a}</em> + (<em>${n}</em>−1) × <em>${d}</em> = <em>${last}</em>`,
      `合計 = (初項 + 末項) × 項数 ÷ 2`,
      `= (<em>${a}</em> + <em>${last}</em>) × <em>${n}</em> ÷ 2 = <em>${answer}</em>`,
    ];
  }
}

// --- Dispatcher ---
function renderExplanation(data, diagramId, stepsId, titleId) {
  const diagramEl = document.getElementById(diagramId);
  const stepsEl   = document.getElementById(stepsId);
  const titleEl   = titleId ? document.getElementById(titleId) : null;

  let diagramHTML = '';
  let steps = [];
  let title = 'かいせつ';

  if (data.type === 'area') {
    title = 'かいせつ（面積図）';
    diagramHTML = buildSVGDiagram(data);
    steps = buildStepItems(data);
  } else if (data.type === 'gcd') {
    title = 'かいせつ（約数をしらべよう）';
    diagramHTML = buildGCDVisual(data.a, data.b, data.g);
    steps = buildGCDSteps(data.a, data.b, data.g);
  } else if (data.type === 'lcm') {
    title = 'かいせつ（倍数をしらべよう）';
    diagramHTML = buildLCMVisual(data.a, data.b, data.l);
    steps = buildLCMSteps(data.a, data.b, data.l);
  } else if (data.type === 'arithmetic') {
    title = 'かいせつ（等差数列）';
    diagramHTML = buildSeqVisual(data.a, data.d, data.n);
    steps = buildArithmeticSteps(data);
  }

  if (titleEl) titleEl.textContent = title;
  if (diagramEl) diagramEl.innerHTML = diagramHTML;
  if (stepsEl) {
    stepsEl.innerHTML = '';
    steps.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<div class="step-num">${i+1}</div><div class="step-text">${s}</div>`;
      stepsEl.appendChild(row);
    });
  }
}
