    const N    = randInt(3, 12);
    const D    = diff * N;
    const more = randInt(0, 1) === 1;
    this._current = {
      nA: N, nameA: '個数', unitA: '個',
      _title: 'かいせつ（差集め算・単価差）',
      _steps: [
        `1個あたりの差：${b} − ${a} ＝ <em>${diff}円</em>`,
        `合計の差：${D}円 ÷ ${diff}円 ＝ <em>${N}個</em>`,
      ],
    };
    const actualPrice = more ? b : a;
    const estimPrice  = more ? a : b;
    const moreOrLess  = more ? '多く' : '少なく';
    return {
      text: `N個の品を買う予定。<br>1個 <span class="num">${estimPrice}</span>円 と見積もって用意したが、<br>実際は1個 <span class="num">${actualPrice}</span>円 で<br>合計 <span class="num">${D}</span>円 ${moreOrLess}かかった。<br>何個買う？`,
      inputs: [{ id: 'ans-A', label: '個数', unit: '個' }],
    };
  },

  // 間隔変更 → 全体長の差から枚数
  _tplTapeGap() {
    const a = randInt(3, 8);
    const b = a + randInt(1, 4);
    const N = randInt(4, 12);
    const D = (b - a) * (N - 1);
    this._current = {
      nA: N, nameA: '写真の枚数', unitA: '枚',
      _title: 'かいせつ（差集め算・間隔差）',
      _steps: [
        `枚数を N 枚とすると間の数 ＝ N − 1`,
        `1つの間の差：${b} − ${a} ＝ <em>${b - a}cm</em>`,
        `全体の差：(N − 1) × ${b - a} ＝ ${D}`,
        `N − 1 ＝ ${D} ÷ ${b - a} ＝ <em>${N - 1}</em>`,
        `N ＝ ${N - 1} ＋ 1 ＝ <em>${N}枚</em>`,
      ],
    };
    return {
      text: `写真を一列に等間隔で並べる。<br><span class="num">${a}</span>cm 間隔の予定を <span class="num">${b}</span>cm 間隔にしたら<br>全体が <span class="num">${D}</span>cm 長くなった。<br>写真は何枚？`,
      inputs: [{ id: 'ans-A', label: '写真の枚数', unit: '枚' }],
    };
  },

  // テープを何本かに切る → 1本あたりの長さ差から本数
  _tplCutDiff() {
    const a = randInt(20, 50);
    const b = a + randInt(5, 20);
    const N = randInt(3, 10);
    const D = (b - a) * N;
    this._current = {
      nA: N, nameA: '本数', unitA: '本',
      _title: 'かいせつ（差集め算・テープの切り分け）',
      _steps: [
        `1本あたりの差：${b} − ${a} ＝ <em>${b - a}cm</em>`,
        `本数：${D} ÷ ${b - a} ＝ <em>${N}本</em>`,
      ],
    };
    return {
      text: `テープを何本かに切り分ける。<br>1本 <span class="num">${a}</span>cm のつもりが <span class="num">${b}</span>cm にしたら<br>合計が <span class="num">${D}</span>cm 多くなった。<br>何本に切る？`,
      inputs: [{ id: 'ans-A', label: '本数', unit: '本' }],
    };
  },

  // 2グループの差集め → 人数と合計（2答）
  _tplTwoGroup() {
    let aRate, bRate, K, M, N, total;
    do {
      aRate = randInt(3, 8);
      bRate = aRate + randInt(2, 5);
      K     = randInt(2, 6);  // 余分に配る人数分の差
      N     = randInt(4, 10);
      M     = aRate * N + bRate * K;
      total = N + K;
    } while (M > 100 || total > 20);
    this._current = {
      nA: N, nB: M,
      nameA: 'A組の人数', unitA: '人',
      nameB: '配ったおはじきの合計', unitB: '個',
      _title: 'かいせつ（差集め算・2グループ）',
      _steps: [
        `全員に ${aRate}個ずつ配ったとしたら：${aRate} × ${total} ＝ <em>${aRate * total}個</em>`,
        `実際の差：${M} − ${aRate * total} ＝ <em>${M - aRate * total}個 多い</em>`,
        `1人を A組→B組 に変えると：${bRate - aRate}個 増える`,
        `B組の人数：${M - aRate * total} ÷ ${bRate - aRate} ＝ <em>${K}人</em>`,
        `A組の人数：${total} − ${K} ＝ <em>${N}人</em>`,
      ],
    };
    return {
      text: `A組とB組に合わせて <span class="num">${total}</span>人。<br>A組には <span class="num">${aRate}</span>個ずつ、<br>B組には <span class="num">${bRate}</span>個ずつ おはじきを配ったら<br>合計 <span class="num">${M}</span>個 だった。<br>A組の人数と合計個数は？`,
      inputs: [
        { id: 'ans-A', label: 'A組の人数', unit: '人' },
        { id: 'ans-B', label: 'おはじきの合計', unit: '個' },
      ],
    };
  },

  // 差集め算 + 過不足算 融合（2答）
  _jTplCompound() {
    let a, b, N, r1, r2, M;
    do {
      a  = randInt(4, 8);
      b  = a + randInt(2, 4);
      r1 = randInt(2, 8);
      r2 = randInt(2, 8);
      N  = (r1 + r2) / (b - a);
      M  = a * N + r1;
    } while (!Number.isInteger(N) || N < 4 || M > 100);
    const diff = b - a;
    this._current = {
      nA: N, nB: M,
      nameA: '子供の人数', unitA: '人',
      nameB: 'お菓子の数', unitB: '個',
      _title: 'かいせつ（差集め算・発展）',
      _steps: [
        `1人あたり ${a}個から ${b}個に増やすと差は ${diff}個/人`,
        `差が積み重なった合計：${r1} ＋ ${r2} ＝ <em>${r1 + r2}個</em>`,
        `人数：${r1 + r2} ÷ ${diff} ＝ <em>${N}人</em>`,
        `お菓子の数：${a} × ${N} ＋ ${r1} ＝ <em>${M}個</em>`,
      ],
    };
    return {
      text: `子供にお菓子を配る。<br>1人に <span class="num">${a}</span>個ずつ配ると <span class="num">${r1}</span>個 余り、<br>1人に <span class="num">${b}</span>個ずつ配ると <span class="num">${r2}</span>個 足りない。<br>子供の人数とお菓子の数は？`,
      inputs: [
        { id: 'ans-A', label: '子供の人数', unit: '人' },
        { id: 'ans-B', label: 'お菓子の数', unit: '個' },
      ],
    };
  },

  // 単価比を使う差集め算（2答）
  _jTplRatioDiff() {
    let pA, pB, nA, nB, S, diff;
    do {
      pA = randInt(3, 8) * 10;
      pB = pA + randInt(2, 6) * 10;
      nA = randInt(3, 8);
      nB = randInt(3, 8);
      S  = pA * nA + pB * nB;
      diff = pB - pA;
    } while (S > 500 || diff < 10);
    // Suppose all bought at pA → hypo = pA*(nA+nB), actual diff = pB*nB - pA*nB = diff*nB
    const total = nA + nB;
    const hypo  = pA * total;
    const excess = S - hypo;
    this._current = {
      nA, nB,
      nameA: 'A商品の個数', unitA: '個',
      nameB: 'B商品の個数', unitB: '個',
      _title: 'かいせつ（差集め算・単価比）',
      _steps: [
        `全部 ${pA}円と仮定：${pA} × ${total} ＝ <em>${hypo}円</em>`,
        `実際との差：${S} − ${hypo} ＝ <em>${excess}円 多い</em>`,
        `1個をA→Bに替えると：${pB} − ${pA} ＝ ${diff}円 増える`,
        `B商品の数：${excess} ÷ ${diff} ＝ <em>${nB}個</em>`,
        `A商品の数：${total} − ${nB} ＝ <em>${nA}個</em>`,
      ],
    };
    return {
      text: `A商品（<span class="num">${pA}</span>円）と B商品（<span class="num">${pB}</span>円）を<br>合わせて <span class="num">${total}</span>個 買ったら <span class="num">${S}</span>円 だった。<br>A商品とB商品はそれぞれ何個？`,
      inputs: [
        { id: 'ans-A', label: 'A商品の個数', unit: '個' },
        { id: 'ans-B', label: 'B商品の個数', unit: '個' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const cur = this._current;
    if (cur.nB !== undefined) {
      const b = parseInt(document.getElementById('ans-B').value, 10);
      return { correct: a === cur.nA && b === cur.nB, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}` };
    }
    return { correct: a === cur.nA, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}` };
  },

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'steps', title: 'かいせつ', steps: [] };
  },
});

let activeSection = null;
let activeModule = null;

// ============================================================
//  NAVIGATION
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goTop() {
  destroyCharts();
  activeModule = null;
  activeSection = null;
  showScreen('top-screen');
}

function goSection() {
  destroyCharts();
  activeModule = null;
  if (activeSection) {
    showScreen('section-screen');
  } else {
    goTop();
  }
}

function showSection(sectionId) {
  activeSection = sections.find(s => s.id === sectionId);
  if (!activeSection) return;
  renderSection();
  showScreen('section-screen');
}

function renderTop() {
  const list = document.getElementById('categories-list');
  list.innerHTML = '';
  sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.borderLeftColor = sec.color;
    card.innerHTML = `
      <div class="cat-icon">${sec.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${sec.name}</div>
        <div class="cat-desc">${sec.desc}</div>
      </div>
      <div class="cat-arrow">›</div>`;
    card.onclick = () => showSection(sec.id);
    list.appendChild(card);
  });
}

function renderQCountBar() {
  const bar = document.getElementById('qcount-bar');
  if (!bar) return;
  bar.innerHTML = '';
  [1, 3, 5, 10].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'qcount-btn' + (n === qCount ? ' active' : '');
    btn.textContent = n + '問';
    btn.onclick = () => { qCount = n; renderQCountBar(); };
    bar.appendChild(btn);
  });
}

function renderSection() {
  if (!activeSection) return;

  const header = document.getElementById('section-header');
  header.style.background = activeSection.color;
  document.getElementById('section-title').textContent = activeSection.name;
  renderQCountBar();

  const sectionModules = activeSection.moduleIds.map(id => modules.find(m => m.id === id)).filter(Boolean);
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';
  sectionModules.forEach(mod => {
    const tile = document.createElement('div');
    tile.className = 'module-tile ' + (mod.unlocked ? 'unlocked' : 'locked');
    const hasRef = !!REF_CONTENT[mod.id];
    tile.innerHTML = `
      <span class="tile-icon">${mod.icon}</span>
      <div class="tile-name">${mod.name}</div>
      <span class="tile-badge ${mod.unlocked ? 'badge-open' : 'badge-soon'}">
        ${mod.unlocked ? 'れんしゅうする' : 'きんじつ公開'}
      </span>
      ${mod.unlocked && hasRef ? `<div class="tile-ref-btn" data-id="${mod.id}">📖 きほんをかくにん</div>` : ''}`;
    if (mod.unlocked) {
      tile.onclick = e => {
        if (e.target.closest('.tile-ref-btn')) return;
        startModule(mod.id);
      };
      const refBtn = tile.querySelector('.tile-ref-btn');
      if (refBtn) refBtn.onclick = e => { e.stopPropagation(); showReference(mod.id); };
    }
    grid.appendChild(tile);
  });
}

function startModule(id) {
  activeModule = modules.find(m => m.id === id);
  if (!activeModule) return;
  document.getElementById('quiz-title').textContent = activeModule.name;
  if (activeModule._level !== undefined) activeModule._level = 'basic';
  document.getElementById('btn-basic').classList.add('active');
  document.getElementById('btn-applied').classList.remove('active');
  const jukenBtn   = document.getElementById('btn-juken');
  const gosankeBtn = document.getElementById('btn-gosanke');
  jukenBtn.classList.remove('active');
  gosankeBtn.classList.remove('active');
  const hasJuken   = typeof activeModule._genJuken   === 'function';
  const hasGosanke = typeof activeModule._genGosanke === 'function';
  jukenBtn.classList.toggle('hidden', !hasJuken);
  gosankeBtn.classList.toggle('hidden', !hasGosanke);
  const sw = document.querySelector('.level-switcher');
  sw.classList.toggle('three-col', hasJuken && !hasGosanke);
  initSession();
  showScreen('quiz-screen');
  loadQuestion();
}

function setLevel(level) {
  if (!activeModule) return;
  activeModule._level = level;
  document.getElementById('btn-basic').classList.toggle('active', level === 'basic');
  document.getElementById('btn-applied').classList.toggle('active', level === 'applied');
  document.getElementById('btn-juken').classList.toggle('active', level === 'juken');
  document.getElementById('btn-gosanke').classList.toggle('active', level === 'gosanke');
  initSession();
  loadQuestion();
}

function initSession() {
  sessionAnswered = 0;
  sessionCorrect  = 0;
  document.getElementById('session-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('btn-retry').textContent = 'もういちど（' + qCount + '問）';
}

function updateProgress() {
  document.getElementById('q-num').textContent =
    (sessionAnswered + 1) + '問め / ' + qCount + '問';
  document.getElementById('q-correct').textContent = sessionCorrect + '問正解';
  document.getElementById('progress-fill').style.width =
    (sessionAnswered / qCount * 100) + '%';
}

// ============================================================
//  QUIZ FLOW
// ============================================================
function loadQuestion() {
  updateProgress();
  const q = activeModule.generate();
  document.getElementById('question-text').innerHTML = q.text;

  const card = document.getElementById('answer-card');
  card.innerHTML = '';
  q.inputs.forEach(inp => {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `
      <span class="answer-label">${inp.label}</span>
      <input id="${inp.id}" class="answer-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="?">
      <span class="answer-unit">${inp.unit}</span>`;
    card.appendChild(row);
  });
  setTimeout(() => { const f = card.querySelector('input'); if (f) f.focus(); }, 300);

  document.getElementById('submit-btn').classList.remove('hidden');
  document.getElementById('result-card').classList.add('hidden');
  document.getElementById('explanation-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
}

function checkAnswer() {
  const result = activeModule.checkAnswer();

  const icon  = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const ans   = document.getElementById('result-answer');

  if (result.correct) {
    icon.textContent  = '⭕';
    label.textContent = 'せいかい！';
    label.className   = 'result-label correct';
    ans.textContent   = result.explanation;
  } else {
    icon.textContent  = '❌';
    label.textContent = 'もういちど！';
    label.className   = 'result-label wrong';
    ans.textContent   = 'こたえ：' + result.explanation;
  }

  sessionAnswered++;
  if (result.correct) sessionCorrect++;
  updateProgress();

  document.getElementById('submit-btn').classList.add('hidden');
  document.getElementById('result-card').classList.remove('hidden');

  if (activeModule.explain) {
    const expData = activeModule.explain();
    renderExplanation(expData, 'area-diagram', 'steps-list', 'explanation-title');
    document.getElementById('explanation-card').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('explanation-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  }

  if (sessionAnswered >= qCount) {
    saveSessionRecord(activeModule.id, activeModule._level || 'basic', qCount, sessionCorrect);
    setTimeout(showSessionResult, 500);
  } else {
    document.getElementById('next-btn').classList.remove('hidden');
  }
}

function nextQuestion() { loadQuestion(); }

function showSessionResult() {
  const pct = Math.round(sessionCorrect / qCount * 100);
  const icon  = pct === 100 ? '🎉' : pct >= 70 ? '😊' : '💪';
  const cls   = pct === 100 ? 'great' : pct >= 70 ? 'ok' : 'retry';
  const title = pct === 100 ? 'パーフェクト！' : pct >= 70 ? 'よくできました！' : 'もういちどチャレンジ！';

// ---- Save / Load ----
function loadLocalRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}

function parseTheme(theme) {
  // "sansu:gcd:basic" → { moduleId: 'gcd', level: 'basic' }
  const parts = theme.replace(THEME_PREFIX, '').split(':');
  return { moduleId: parts[0] || '', level: parts[1] || 'basic' };
}

async function loadRecords() {
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      const { data, error } = await sbClient
        .from('drill_records')
        .select('played_at, score, theme, total_q')
        .eq('user_id', nickname)
        .like('theme', THEME_PREFIX + '%')
        .order('played_at', { ascending: true });
      if (!error && data && data.length > 0) {
        const recs = data.map(r => {
          const { moduleId, level } = parseTheme(r.theme);
          const total   = r.total_q || 1;
          const correct = Math.round((r.score / 100) * total);
          return { date: r.played_at, moduleId, level, total, correct, score: r.score };
        });
        try { localStorage.setItem(RECORDS_KEY, JSON.stringify(recs)); } catch(e) {}
        return { data: recs, fallback: false };
      }
    } catch(e) { console.warn('Supabase load failed', e); }
  }
  return { data: loadLocalRecords(), fallback: true };
}

async function saveSessionRecord(moduleId, level, total, correct) {
  const score = Math.round(correct / total * 100);
  const date  = new Date().toISOString();
  const rec   = { date, moduleId, level, total, correct, score };

  // update localStorage cache immediately
  const local = loadLocalRecords();
  local.push(rec);
  try { localStorage.setItem(RECORDS_KEY, JSON.stringify(local)); } catch(e) {}

  // push to Supabase
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      await sbClient.from('drill_records').insert({
        user_id:   nickname,
        score,
        theme:     THEME_PREFIX + moduleId + ':' + level,
        played_at: date,
        total_q:   total,
      });
    } catch(e) { console.warn('Supabase save failed', e); }
  }
}

// compute total/correct handling both legacy (boolean) and new (number) records
function recStats(recs) {
  let total = 0, correct = 0;
  recs.forEach(r => {
    if (typeof r.total === 'number') {
      total   += r.total;
      correct += r.correct;
    } else {
      total   += 1;
      correct += r.correct ? 1 : 0;
    }
  });
  return { total, correct, pct: total ? Math.round(correct / total * 100) : null };
}

function recScore(r) {
  if (typeof r.score === 'number') return r.score;
  if (typeof r.total === 'number') return Math.round(r.correct / r.total * 100);
  return r.correct ? 100 : 0;
}

// --- Area diagram (鶴亀算) ---
function buildSVGDiagram({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff   = N * valB - S;
  const spread = valB - valA;

  const PAD_L = 58, PAD_R = 12, PAD_T = 14, PAD_B = 42;
  const W = 300, H = 120;
  const vbW = PAD_L + W + PAD_R, vbH = PAD_T + H + PAD_B;
  const unitW = W / N, unitH = H / valB;
  const x0 = PAD_L, y0 = PAD_T;
  const aW = nA * unitW, bW = nB * unitW;
  const aX = x0, bX = x0 + aW;

  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_RED = '#E24B4A';
  const COL_GRID = '#dde3ea', COL_TEXT = '#2c3e50', COL_MUTED = '#7f8c8d';

  const aFillH = valA * unitH, aFillY = y0 + H - aFillH;
  const redH = spread * unitH, redY = y0;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">
  <defs><pattern id="dp" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#fde8e8"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="${COL_RED}" stroke-width="0.8" opacity="0.5"/>
  </pattern></defs>`;

  svg += `<rect x="${bX}" y="${y0}" width="${bW}" height="${H}" fill="${COL_B}" opacity="0.75" rx="2"/>`;
  svg += `<rect x="${aX}" y="${aFillY}" width="${aW}" height="${aFillH}" fill="${COL_A}" opacity="0.82" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="url(#dp)" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="none" stroke="${COL_RED}" stroke-width="1.5" stroke-dasharray="4 3" rx="2"/>`;

  [0, valA, valB].forEach(v => {
    const gy = y0 + H - v * unitH;
    svg += `<line x1="${x0}" y1="${gy}" x2="${x0+W}" y2="${gy}" stroke="${COL_GRID}" stroke-width="${v===0||v===valB?1.5:0.7}"/>`;
  });
  svg += `<line x1="${bX}" y1="${y0}" x2="${bX}" y2="${y0+H}" stroke="${COL_GRID}" stroke-width="1.2" stroke-dasharray="3 2"/>`;
  svg += `<line x1="${x0}" y1="${y0}" x2="${x0}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `<text x="${x0-5}" y="${y0+H}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">0</text>`;
  svg += `<text x="${x0-5}" y="${y0+H-aFillH}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valA}${unitS}</text>`;
  svg += `<text x="${x0-5}" y="${y0}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valB}${unitS}</text>`;

  if (aW > 22) svg += `<text x="${aX+aW/2}" y="${aFillY+aFillH/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameA}</text>`;
  if (bW > 22) svg += `<text x="${bX+bW/2}" y="${y0+H/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameB}</text>`;
  if (aW > 30) svg += `<text x="${aX+aW/2}" y="${redY+redH/2}" text-anchor="middle" font-size="10" font-weight="bold" fill="${COL_RED}" dominant-baseline="middle">${diff}${unitS}へらす</text>`;

  const labelY = y0 + H + 16;
  svg += `<text x="${aX+aW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_A}" font-weight="bold">${nameA} ${nA}${unitA}</text>`;
  svg += `<text x="${bX+bW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_B}" font-weight="bold">${nameB} ${nB}${unitB}</text>`;
  svg += `<line x1="${x0}" y1="${y0+H}" x2="${x0+W}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `</svg>`;
  return svg;
}

function buildStepItems({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff = N * valB - S, allB = N * valB, spread = valB - valA;
  return [
    `ぜんぶ <span class="green">${nameB}</span> だとすると…<br><em>${N}</em> × <em>${valB}</em> = <em>${allB}</em>${unitS}`,
    `じっさいは <em>${S}</em>${unitS}。ちがいは<br><em>${allB}</em> − <em>${S}</em> = <span class="red">${diff}</span>${unitS}`,
    `${nameA}1つで <em>${spread}</em>${unitS}へる<br><span class="red">${diff}</span> ÷ <em>${spread}</em> = <em>${nA}</em>　→　${nameA} <em>${nA}</em>${unitA}`,
    `${nameB}は <em>${N}</em> − <em>${nA}</em> = <em>${nB}</em>　→　${nameB} <em>${nB}</em>${unitB}`,
  ];
}

// --- GCD visual ---
function buildGCDVisual(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const commonSet = new Set(fA.filter(f => fB.includes(f)));
  function chips(factors) {
    return factors.map(f => {
      let cls = 'factor-chip';
      if (f === g) cls += ' factor-max';
      else if (commonSet.has(f)) cls += ' common';
      return `<span class="${cls}">${f}</span>`;
    }).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の約数</span><div class="factor-chips">${chips(fA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の約数</span><div class="factor-chips">${chips(fB)}</div></div>
    <div class="factor-answer">最大公約数 → <strong>${g}</strong></div>
  </div>`;
}

function buildGCDSteps(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const common = fA.filter(f => fB.includes(f));
  return [
    `<em>${a}</em> の約数：${fA.join('、')}`,
    `<em>${b}</em> の約数：${fB.join('、')}`,
    `共通の約数：<em>${common.join('、')}</em>`,
    `いちばん大きい共通の約数 = <em>${g}</em>`,
  ];
}

// --- LCM visual ---
function buildLCMVisual(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  function chips(mults) {
    return mults.map(m => `<span class="factor-chip${m === l ? ' lcm-match' : ''}">${m}</span>`).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の倍数</span><div class="factor-chips">${chips(mA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の倍数</span><div class="factor-chips">${chips(mB)}</div></div>
    <div class="factor-answer">最小公倍数 → <strong>${l}</strong></div>
  </div>`;
}

function buildLCMSteps(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  return [
    `<em>${a}</em> の倍数：${mA.join('、')}、…`,
    `<em>${b}</em> の倍数：${mB.join('、')}、…`,
    `最初に共通する数 = <em>${l}</em>`,
    `<em>${l}</em> ÷ <em>${a}</em> = <em>${l/a}</em>、<em>${l}</em> ÷ <em>${b}</em> = <em>${l/b}</em>（割り切れる ✓）`,
  ];
}

// --- Arithmetic visual ---
function buildSeqVisual(a, d, n) {
  const count = Math.min(n, 6);
  const terms = Array.from({ length: count }, (_, i) => a + i * d);
  let html = '<div class="seq-visual">';
  terms.forEach((t, i) => {
    html += `<div class="seq-item"><div class="seq-val">${t}</div><div class="seq-idx">第${i+1}項</div></div>`;
    if (i < count - 1) html += `<div class="seq-arrow">+${d}</div>`;
  });
  if (n > count) html += `<div class="seq-ellipsis">…</div>`;
  html += '</div>';
  return html;
}

function buildArithmeticSteps({ a, d, n, answer, subtype, last }) {
  if (subtype === 'nth') {
    return [
      `初項（はじめの数） = <em>${a}</em>、公差（増え方） = <em>${d}</em>`,
      `第 <em>${n}</em> 項 = 初項 + (項数 − 1) × 公差`,
      `= <em>${a}</em> + (<em>${n}</em> − 1) × <em>${d}</em>`,
      `= <em>${a}</em> + <em>${(n-1)*d}</em> = <em>${answer}</em>`,
    ];
  } else if (subtype === 'count') {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>`,
      `<em>${last}</em> は第何項か → (末項 − 初項) ÷ 公差 + 1`,
      `= (<em>${last}</em> − <em>${a}</em>) ÷ <em>${d}</em> + 1`,
      `= <em>${last - a}</em> ÷ <em>${d}</em> + 1 = <em>${answer}</em>項め`,
    ];
  } else {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>、<em>${n}</em> 項まで`,
      `末項（第${n}項） = <em>${a}</em> + (<em>${n}</em>−1) × <em>${d}</em> = <em>${last}</em>`,
      `合計 = (初項 + 末項) × 項数 ÷ 2`,
      `= (<em>${a}</em> + <em>${last}</em>) × <em>${n}</em> ÷ 2 = <em>${answer}</em>`,
    ];
  }
}

// --- Dispatcher ---
function buildWassanVisual({ sum, diff, big, small, nameA, nameB, unitA, unitB }) {
  const W = 280, PAD_L = 52, PAD_R = 20, PAD_T = 16, PAD_B = 16;
  const ROW_H = 34, GAP = 18;
  const vbW = PAD_L + W + PAD_R;
  const vbH = PAD_T + ROW_H + GAP + ROW_H + PAD_B + 40;
  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_DIFF = '#E24B4A';
  const x0 = PAD_L, y0 = PAD_T;
  const bigW  = W;
  const smallW = Math.round(W * small / big);
  const diffW  = bigW - smallW;
  const yA = y0, yB = y0 + ROW_H + GAP;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">`;

  // Row A (big)
  svg += `<rect x="${x0}" y="${yA}" width="${bigW}" height="${ROW_H}" fill="${COL_A}" opacity="0.8" rx="4"/>`;
  svg += `<text x="${x0 + smallW/2}" y="${yA + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="white">${nameA}（${big}${unitA}）</text>`;

  // Row B (small) — same left edge
  svg += `<rect x="${x0}" y="${yB}" width="${smallW}" height="${ROW_H}" fill="${COL_B}" opacity="0.8" rx="4"/>`;
  svg += `<text x="${x0 + smallW/2}" y="${yB + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="bold" fill="white">${nameB}（${small}${unitB}）</text>`;

  // Diff bracket on Row A
  svg += `<rect x="${x0 + smallW}" y="${yA}" width="${diffW}" height="${ROW_H}" fill="${COL_DIFF}" opacity="0.18" rx="0"/>`;
  svg += `<rect x="${x0 + smallW}" y="${yA}" width="${diffW}" height="${ROW_H}" fill="none" stroke="${COL_DIFF}" stroke-width="2" stroke-dasharray="5 3" rx="0"/>`;
  if (diffW > 18) svg += `<text x="${x0 + smallW + diffW/2}" y="${yA + ROW_H/2}" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="bold" fill="${COL_DIFF}">差${diff}${unitA}</text>`;

  // Sum brace under Row A
  const braceY = yA + ROW_H + 6;
  svg += `<line x1="${x0}" y1="${braceY}" x2="${x0+bigW}" y2="${braceY}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<line x1="${x0}" y1="${braceY}" x2="${x0}" y2="${braceY+5}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<line x1="${x0+bigW}" y1="${braceY}" x2="${x0+bigW}" y2="${braceY+5}" stroke="#888" stroke-width="1.2"/>`;
  svg += `<text x="${x0 + bigW/2}" y="${braceY + 14}" text-anchor="middle" font-size="10" fill="#555">和 = ${sum}${unitA}</text>`;

  // Left labels
  svg += `<text x="${x0-4}" y="${yA + ROW_H/2}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="${COL_A}" font-weight="bold">${nameA}</text>`;
  svg += `<text x="${x0-4}" y="${yB + ROW_H/2}" text-anchor="end" dominant-baseline="middle" font-size="10" fill="${COL_B}" font-weight="bold">${nameB}</text>`;

  // Align tick on right of B
  svg += `<line x1="${x0+smallW}" y1="${yB}" x2="${x0+smallW}" y2="${yB+ROW_H}" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2"/>`;

  svg += `</svg>`;
  return svg;
}

function buildWassanSteps({ sum, diff, big, small, nameA, nameB, unitA }) {
  const sumPlusDiff = sum + diff;
  const sumMinusDiff = sum - diff;
  return [
    `和と差をたす：<em>${sum}</em> + <em>${diff}</em> = <em>${sumPlusDiff}</em>`,
    `大きい数 = <em>${sumPlusDiff}</em> ÷ 2 = <span class="green">${big}${unitA}</span>`,
    `和と差をひく：<em>${sum}</em> − <em>${diff}</em> = <em>${sumMinusDiff}</em>`,
    `小さい数 = <em>${sumMinusDiff}</em> ÷ 2 = <span class="green">${small}${unitA}</span>`,
  ];
}

function renderExplanation(data, diagramId, stepsId, titleId) {
  const diagramEl = document.getElementById(diagramId);
  const stepsEl   = document.getElementById(stepsId);
  const titleEl   = titleId ? document.getElementById(titleId) : null;

  let diagramHTML = '';
  let steps = [];
  let title = 'かいせつ';

  if (data.type === 'area') {
    title = 'かいせつ（面積図）';
    diagramHTML = buildSVGDiagram(data);
    steps = buildStepItems(data);
  } else if (data.type === 'gcd') {
    title = 'かいせつ（約数をしらべよう）';
    diagramHTML = buildGCDVisual(data.a, data.b, data.g);
    steps = buildGCDSteps(data.a, data.b, data.g);
  } else if (data.type === 'lcm') {
    title = 'かいせつ（倍数をしらべよう）';
    diagramHTML = buildLCMVisual(data.a, data.b, data.l);
    steps = buildLCMSteps(data.a, data.b, data.l);
  } else if (data.type === 'arithmetic') {
    title = 'かいせつ（等差数列）';
    diagramHTML = buildSeqVisual(data.a, data.d, data.n);
    steps = buildArithmeticSteps(data);
  } else if (data.type === 'wassan') {
    title = 'かいせつ（線分図）';
    diagramHTML = buildWassanVisual(data);
    steps = buildWassanSteps(data);
  } else if (data.type === 'steps') {
    title = data.title || 'かいせつ';
    steps = data.steps || [];
  }

  if (titleEl) titleEl.textContent = title;
  if (diagramEl) diagramEl.innerHTML = diagramHTML;
  if (stepsEl) {
    stepsEl.innerHTML = '';
    steps.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<div class="step-num">${i+1}</div><div class="step-text">${s}</div>`;
      stepsEl.appendChild(row);
    });
  }
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
  // SW が更新されたらページをリロードして最新版を表示する
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data && e.data.type === 'SW_UPDATED') location.reload();
  });
  // SW の制御が切り替わったとき（別タブで更新済みの場合など）もリロード
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    location.reload();
  });
}
