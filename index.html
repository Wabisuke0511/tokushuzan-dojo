<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>算数道場</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="算数道場">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4a90d9;
      --primary-dark: #2d6fb0;
      --accent: #f5a623;
      --success: #27ae60;
      --error: #e74c3c;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --locked: #b0bec5;
      --radius: 16px;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ===== TOP SCREEN ===== */
    #top-screen { padding: 0 0 40px; }

    .top-header {
      background: var(--primary);
      color: white;
      padding: 48px 24px 32px;
      text-align: center;
    }

    .top-header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .top-header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .categories-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px 16px;
    }

    .category-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .category-card:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-icon { font-size: 2.4rem; flex-shrink: 0; }

    .cat-info { flex: 1; }

    .cat-name {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .cat-desc {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .cat-arrow {
      font-size: 1.2rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ===== SECTION SCREEN ===== */
    #section-screen { padding: 0 0 40px; }

    .section-header {
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-header h2 { font-size: 1.25rem; font-weight: 800; }

    /* ===== MODULE GRID (shared by section screen) ===== */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 24px 16px 8px;
    }

    .module-tile {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 12px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .module-tile:active:not(.locked) {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .module-tile.unlocked { border-color: var(--primary); }
    .module-tile.locked { cursor: default; opacity: 0.65; }

    .tile-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    .tile-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tile-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .badge-open { background: #e8f4fd; color: var(--primary-dark); }
    .badge-soon { background: #eceff1; color: var(--locked); }

    .tile-ref-btn {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e8f4fd;
      color: var(--primary-dark);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HOME ACTIONS ===== */
    .home-actions {
      padding: 0 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-action-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .home-action-btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-graph { background: #2d6fb0; color: white; }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { padding: 0 0 48px; }

    .quiz-header {
      background: var(--primary);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.7; }

    .quiz-header h2 { font-size: 1.25rem; font-weight: 800; }

    .quiz-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .question-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 1.2rem;
      line-height: 1.75;
      font-weight: 600;
    }

    .question-text span.num {
      color: var(--primary-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .answer-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .answer-row:last-of-type { margin-bottom: 0; }

    .answer-label {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .answer-input {
      flex: 1;
      min-width: 0;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      padding: 12px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .answer-input:focus { border-color: var(--primary); }

    .answer-unit {
      font-size: 1rem;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .submit-btn:active { transform: scale(0.97); background: var(--primary-dark); }

    /* ===== RESULT ===== */
    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
    .result-label { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .result-label.correct { color: var(--success); }
    .result-label.wrong { color: var(--error); }
    .result-answer { font-size: 0.95rem; color: var(--muted); line-height: 1.7; }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .next-btn:active { transform: scale(0.97); opacity: 0.85; }

    .hidden { display: none !important; }

    /* ===== LEVEL SWITCHER ===== */
    .level-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .level-btn {
      flex: 1 1 calc(50% - 9px);
      min-width: 0;
      padding: 9px 4px;
      font-size: 0.82rem;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .level-switcher.three-col .level-btn { flex: 1 1 0; }

    .level-btn.active { background: var(--primary); color: white; }
    .level-btn.active.gosanke { background: #9b2c2c; }

    /* ===== EXPLANATION ===== */
    .explanation-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .explanation-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .area-diagram {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
    }

    .steps-list { display: flex; flex-direction: column; gap: 10px; }

    .step-row { display: flex; gap: 12px; align-items: flex-start; }

    .step-num {
      background: var(--primary);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text { font-size: 1rem; line-height: 1.65; font-weight: 600; }
    .step-text em { font-style: normal; color: var(--primary-dark); font-weight: 900; }
    .step-text .red { color: #e24b4a; font-weight: 900; }
    .step-text .green { color: #639922; font-weight: 900; }

    /* ===== GRAPH SCREEN ===== */
    #graph-screen { padding: 0 0 48px; }

    .graph-header {
      background: #2d6fb0;
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .graph-header h2 { font-size: 1.25rem; font-weight: 800; }

    .graph-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .stat-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .graph-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .graph-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .dots-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .result-dot { font-size: 1.4rem; line-height: 1; }
    .no-records { font-size: 0.9rem; color: var(--muted); }

    .reset-btn {
      width: 100%;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      border: 2px solid var(--error);
      border-radius: var(--radius);
      background: white;
      color: var(--error);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { background: #fdf0f0; }

    /* ===== REFERENCE SCREEN ===== */
    #ref-screen { padding: 0 0 48px; }

    .ref-header {
      background: var(--accent);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-header h2 { font-size: 1.15rem; font-weight: 800; }

    .ref-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ref-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ref-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .ref-concept-text { font-size: 1.05rem; line-height: 1.8; font-weight: 600; }

    .ref-method-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
      background: #eef6ff;
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      border-radius: 0 10px 10px 0;
    }

    .ref-example-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .ref-q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.75;
      margin-bottom: 14px;
    }

    /* ===== FACTOR VISUAL (GCD / LCM) ===== */
    .factor-visual {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .factor-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .factor-row:last-of-type { margin-bottom: 0; }

    .factor-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 4px;
      min-width: 64px;
    }

    .factor-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .factor-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      background: #e9edf1;
      color: var(--muted);
    }

    .factor-chip.common { background: #d4edff; color: var(--primary-dark); }
    .factor-chip.factor-max { background: var(--primary); color: white; }
    .factor-chip.lcm-match { background: #27ae60; color: white; }

    .factor-answer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #dde3ea;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .factor-answer strong { color: var(--primary); font-size: 1.2rem; }

    /* ===== SEQUENCE VISUAL (等差数列) ===== */
    .seq-visual {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .seq-item { text-align: center; }

    .seq-val {
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seq-idx {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
    }

    .seq-arrow {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      padding-bottom: 16px;
    }

    .seq-ellipsis {
      font-size: 1.2rem;
      color: var(--muted);
      padding-bottom: 14px;
    }

    /* ===== NICKNAME ===== */
    .nickname-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px 0;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }

    .nickname-name {
      font-weight: 800;
      color: white;
    }

    .nickname-change-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .nickname-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 24px;
    }

    .nickname-overlay.hidden { display: none; }

    .nickname-modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .nickname-modal h3 {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .nickname-modal p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .nickname-input {
      width: 100%;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      padding: 14px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .nickname-input:focus { border-color: var(--primary); }

    .nickname-ok-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    /* ===== TOP ACTIONS ===== */
    .top-actions {
      padding: 0 16px 32px;
    }

    /* ===== QUESTION COUNT SELECTOR ===== */
    .qcount-section {
      padding: 0 16px 4px;
    }

    .qcount-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .qcount-bar {
      display: flex;
      gap: 8px;
    }

    .qcount-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 0.95rem;
      font-weight: 800;
      border: 2px solid #dde3ea;
      border-radius: 10px;
      background: white;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .qcount-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .qcount-btn:active { opacity: 0.8; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .progress-track {
      background: #dde3ea;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* ===== SESSION RESULT CARD ===== */
    .session-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 20px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .session-icon { font-size: 3.5rem; margin-bottom: 12px; }

      padding: 14px;
      font-size: 1rem;

      width: 100%;

      font-size: 0.85rem;
    }

    .hist-table th {

      color: var(--muted);
      font-weight: 700;
      padding: 8px 6px 6px;
      border-bottom: 1px solid #eee;
      text-align: left;

    .hist-high { color: var(--success); font-weight: 800; }
    .hist-mid  { color: var(--accent);  font-weight: 800; }
    .hist-low  { color: var(--error);   font-weight: 800; }
  </style>
</head>

<script>
// ============================================================
//  SESSION STATE
// ============================================================
let qCount = 5;
let sessionAnswered = 0;
let sessionCorrect  = 0;

// ============================================================
//  UTILS
// ============================================================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gcdCalc(a, b) {
  while (b) { const t = b; b = a % b; a = t; }
  return a;
}

function lcmCalc(a, b) {
  return a / gcdCalc(a, b) * b;
}

function getFactors(n) {
  const f = [];
  for (let i = 1; i <= n; i++) { if (n % i === 0) f.push(i); }
  return f;
}

// ============================================================
//  MODULE REGISTRY
// ============================================================
const modules = [];
function registerModule(mod) { modules.push(mod); }

// ============================================================
//  和差算 MODULE
// ============================================================
registerModule({
  id: 'wassan',
  name: '和差算',
  icon: '⚖️',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')   return this._genJuken();
    if (this._level === 'gosanke') return this._genGosanke();
    return this._level === 'basic' ? this._genBasic() : this._genApplied();
  },

  _makeValid(sumMin, sumMax, diffMin, diffMax) {
    let sum, diff;
    do {
      sum  = randInt(sumMin, sumMax);
      diff = randInt(diffMin, diffMax);
    } while ((sum + diff) % 2 !== 0 || diff >= sum);
    const big   = (sum + diff) / 2;
    const small = (sum - diff) / 2;
    return { sum, diff, big, small };
  },

  _genBasic() {
    const { sum, diff, big, small } = this._makeValid(10, 30, 2, 12);
    this._current = { sum, diff, big, small, nameA: '大きい数', nameB: '小さい数', unitA: '', unitB: '' };
    return {
      text: `2つの数の 和は <span class="num">${sum}</span>、<br>差は <span class="num">${diff}</span> です。<br>それぞれの数は？`,
      inputs: [
        { id: 'ans-A', label: '大きい数', unit: '' },
        { id: 'ans-B', label: '小さい数', unit: '' },
      ],
    };
  },

  _genApplied() {
    const tpls = [this._tplAllowance, this._tplRibbon, this._tplAge, this._tplCards];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplAllowance() {
    const { sum, diff, big, small } = this._makeValid(400, 1200, 50, 400);
    this._current = { sum, diff, big, small, nameA: '兄', nameB: '弟', unitA: '円', unitB: '円' };
    return {
      text: `兄と弟のおこづかいを あわせると <span class="num">${sum}</span>円。<br>兄の方が <span class="num">${diff}</span>円 多い。<br>それぞれ 何円？`,
      inputs: [
        { id: 'ans-A', label: '兄のおこづかい', unit: '円' },
        { id: 'ans-B', label: '弟のおこづかい', unit: '円' },
      ],
    };
  },

  _tplRibbon() {
    const { sum, diff, big, small } = this._makeValid(20, 80, 4, 20);
    this._current = { sum, diff, big, small, nameA: '赤', nameB: '青', unitA: 'cm', unitB: 'cm' };
    return {
      text: `赤と青のリボンをつなぐと <span class="num">${sum}</span>cm。<br>赤の方が <span class="num">${diff}</span>cm 長い。<br>それぞれ 何cm？`,
      inputs: [
        { id: 'ans-A', label: '赤のリボン', unit: 'cm' },
        { id: 'ans-B', label: '青のリボン', unit: 'cm' },
      ],
    };
  },

  _tplAge() {
    const { sum, diff, big, small } = this._makeValid(20, 60, 2, 16);
    this._current = { sum, diff, big, small, nameA: '父', nameB: '子', unitA: '歳', unitB: '歳' };
    return {
      text: `父と子の年れいの和は <span class="num">${sum}</span>歳。<br>父の方が <span class="num">${diff}</span>歳 年上。<br>それぞれ 何歳？`,
      inputs: [
        { id: 'ans-A', label: '父の年れい', unit: '歳' },
        { id: 'ans-B', label: '子の年れい', unit: '歳' },
      ],
    };
  },

  _tplCards() {
    const { sum, diff, big, small } = this._makeValid(20, 60, 2, 20);
    this._current = { sum, diff, big, small, nameA: 'A', nameB: 'B', unitA: 'まい', unitB: 'まい' };
    return {
      text: `AとBのカードをあわせると <span class="num">${sum}</span>まい。<br>Aの方が <span class="num">${diff}</span>まい 多い。<br>それぞれ 何まい？`,
      inputs: [
        { id: 'ans-A', label: 'Aのカード', unit: 'まい' },
        { id: 'ans-B', label: 'Bのカード', unit: 'まい' },
      ],
    };
  },

  _genJuken() {
    const tpls = [this._jTplChain, this._jTplDistribute, this._jTplKafusoku, this._jTplBaibai];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【中学受験】倍数差の連鎖（A=kB-r, B=C+d, 合計S）
  _jTplChain() {
    let k, r, d, C, B, A, S;
    do {
      k = randInt(2, 3);
      d = randInt(1, 5) * 200;
      r = randInt(1, 4) * 200;
      C = randInt(2, 8) * 200;
      B = C + d;
      A = k * B - r;
      S = A + B + C;
    } while (A <= 0 || S > 20000 || S % 200 !== 0);
    const pairs = [['A','B','C','円'], ['太郎','次郎','三郎','円'], ['兄','弟','妹','円']];
    const [nA, nB, nC, unit] = pairs[randInt(0, pairs.length - 1)];
    const _kd = k * d;
    this._current = { nA: A, nB: B, nC: C, nameA: nA, nameB: nB, nameC: nC, unitA: unit, unitB: unit, unitC: unit,
      _title: 'かいせつ（置き換え法）',
      _steps: [
        `${nC}の金額を <em>□</em> とおく`,
        `${nB} ＝ □ ＋ ${d}${unit}`,
        `${nA} ＝ ${k} × (□ ＋ ${d}) − ${r} ＝ ${k}□ ＋ ${_kd - r}${unit}`,
        `合計：□ ＋ (□＋${d}) ＋ (${k}□＋${_kd - r}) ＝ ${S}<br><em>${k+2}</em>□ ＝ ${S} − ${d + _kd - r} ＝ ${S - d - _kd + r}`,
        `□ ＝ ${S - d - _kd + r} ÷ ${k+2} ＝ <em>${C}${unit}</em>（${nC}）`,
        `${nB} ＝ ${C}＋${d} ＝ <em>${B}${unit}</em>、${nA} ＝ ${k}×${B}−${r} ＝ <em>${A}${unit}</em>`,
      ],
    };
    return {
      text: `${nA}・${nB}・${nC} 3人の所持金の合計は <span class="num">${S}</span>${unit}。<br>${nA}は${nB}の <span class="num">${k}</span>倍より <span class="num">${r}</span>${unit} 少なく、<br>${nB}は${nC}より <span class="num">${d}</span>${unit} 多い。<br>それぞれ 何${unit}？`,
      inputs: [
        { id: 'ans-A', label: `${nA}の所持金`, unit },
        { id: 'ans-B', label: `${nB}の所持金`, unit },
        { id: 'ans-C', label: `${nC}の所持金`, unit },
      ],
    };
  },

  // 【中学受験】分配＋比の和差（CはAとBの合計の1/n）
  _jTplDistribute() {
    let A, B, C, S, d, n, m;
    do {
      n = randInt(2, 4);
      m = randInt(3, 12) * 200;
      d = randInt(1, 5) * 200;
      if ((m * n + d) % 2 !== 0) continue;
      A = (m * n + d) / 2;
      B = A - d;
      C = m;
      S = A + B + C;
    } while (B <= 0 || C <= 0 || S > 40000 || S % 200 !== 0);
    const AB = A + B;
    this._current = { nA: A, nB: B, nC: C, nameA: '長男', nameB: '次男', nameC: '三男', unitA: '円', unitB: '円', unitC: '円',
      _title: 'かいせつ（比と和差）',
      _steps: [
        `三男の受け取りは 長男＋次男の 1/${n} なので<br>長男＋次男＋三男 ＝ 長男＋次男の ${n+1}/${n} 倍`,
        `長男＋次男 ＝ ${S} × ${n}/${n+1} ＝ <em>${AB}円</em>`,
        `長男は次男より ${d}円 多いので<br>長男 ＝ (${AB}＋${d}) ÷ 2 ＝ <em>${A}円</em>`,
        `次男 ＝ ${AB} − ${A} ＝ <em>${B}円</em>`,
        `三男 ＝ ${AB} ÷ ${n} ＝ <em>${C}円</em>`,
      ],
    };
    return {
      text: `<span class="num">${S}</span>円を長男・次男・三男の3人で分ける。<br>長男は次男より <span class="num">${d}</span>円 多く、<br>三男は長男と次男の合計の <span class="num">1/${n}</span>。<br>それぞれ 何円？`,
      inputs: [
        { id: 'ans-A', label: '長男の金額', unit: '円' },
        { id: 'ans-B', label: '次男の金額', unit: '円' },
        { id: 'ans-C', label: '三男の金額', unit: '円' },
      ],
    };
  },

  // 【中学受験】過不足算（最後の1人が少ない型）
  // a個ずつ→r1個余り、b個ずつ→最後の1人だけr2個（他はb個）→ N=(b+r1-r2)/(b-a)
  _jTplKafusoku() {
    let a, b, r1, r2, N, M;
    do {
      a  = randInt(3, 7);
      b  = a + randInt(2, 4);
      r1 = randInt(2, 10);
      r2 = randInt(1, b - 1);
      if ((b + r1 - r2) % (b - a) !== 0) continue;
      N = (b + r1 - r2) / (b - a);
      M = a * N + r1;
    } while (N < 5 || N > 30 || M > 250);
    this._current = { nA: N, nB: M, nameA: '子供の人数', nameB: 'お菓子の数', unitA: '人', unitB: '個',
      _title: 'かいせつ（過不足算）',
      _steps: [
        `${a}個ずつ配ると ${r1}個 余る：M ＝ ${a}×N ＋ ${r1} ……①`,
        `${b}個ずつ配ると 最後の1人が ${r2}個：M ＝ ${b}×(N−1) ＋ ${r2} ……②`,
        `①＝② より：${a}N ＋ ${r1} ＝ ${b}N − ${b} ＋ ${r2}`,
        `(${b}−${a})×N ＝ ${b} ＋ ${r1} − ${r2} ＝ <em>${b + r1 - r2}</em>`,
        `N ＝ ${b + r1 - r2} ÷ ${b - a} ＝ <em>${N}人</em>`,
        `M ＝ ${a}×${N} ＋ ${r1} ＝ <em>${M}個</em>`,
      ],
    };
    return {
      text: `子供にお菓子を配る。<br>1人に <span class="num">${a}</span>個ずつ配ると <span class="num">${r1}</span>個 余る。<br>1人に <span class="num">${b}</span>個ずつ配ると<br>最後の1人だけ <span class="num">${r2}</span>個 になる。<br>子供の人数とお菓子の数は？`,
      inputs: [
        { id: 'ans-A', label: '子供の人数', unit: '人' },
        { id: 'ans-B', label: 'お菓子の数', unit: '個' },
      ],
    };
  },

  // 【中学受験】売買和差（定価×割引×合計金額）
  // A品定価vA、B品定価vBを2割引で購入。合計N個、合計S円。
  _jTplBaibai() {
    let vA, vB, nA, nB, N, S;
    do {
      vA = randInt(4, 10) * 100;
      vB = randInt(3, 8) * 100;
      if (vA === vB) continue;
      nA = randInt(3, 10); nB = randInt(3, 10);
      N = nA + nB;
      S = vA * nA + vB * 0.8 * nB;
    } while (!Number.isInteger(S) || S > 20000 || N > 20);
    const bPrice = vB * 0.8;
    const hypo = vA * N;
    const diffAmt = hypo - S;
    const perSwap = vA - bPrice;
    this._current = { N, nA, nB, valA: vA, valB: vB, S,
      nameA: 'A品', unitA: '個', nameB: 'B品', unitB: '個',
      _title: 'かいせつ（仮定算）',
      _steps: [
        `全部A品(${vA}円)と仮定：${vA}×${N} ＝ <em>${hypo}円</em>`,
        `実際は${S}円。差は <em>${Math.abs(diffAmt)}円</em>${diffAmt > 0 ? '多い' : '少ない'}`,
        `A品1個をB品の2割引(${bPrice}円)に替えると<br>${Math.abs(perSwap)}円 ${diffAmt > 0 ? 'へる' : 'ふえる'}`,
        `B品の数：${Math.abs(diffAmt)} ÷ ${Math.abs(perSwap)} ＝ <em>${nB}個</em>`,
        `A品：${N} − ${nB} ＝ <em>${nA}個</em>`,
      ],
    };
    return {
      text: `定価 <span class="num">${vA}</span>円のA品と<br>定価 <span class="num">${vB}</span>円のB品を合わせて <span class="num">${N}</span>個 買った。<br>B品を2割引きで買ったら合計 <span class="num">${S}</span>円。<br>A品とB品は それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A品の個数', unit: '個' },
        { id: 'ans-B', label: 'B品の個数', unit: '個' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const b = parseInt(document.getElementById('ans-B').value, 10);
    const cur = this._current;
    if (cur.nC !== undefined) {
      const c = parseInt(document.getElementById('ans-C')?.value, 10);
      return {
        correct: a === cur.nA && b === cur.nB && c === cur.nC,
        explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}、${cur.nameC} ${cur.nC}${cur.unitC}`,
      };
    }
    if (cur.futureA !== undefined) {
      return {
        correct: a === cur.futureA && b === cur.futureB,
        explanation: `${cur.nameA} ${cur.futureA}${cur.unitA}、${cur.nameB} ${cur.futureB}${cur.unitB}`,
      };
    }
    const ansA = cur.nA !== undefined ? cur.nA : cur.big;
    const ansB = cur.nB !== undefined ? cur.nB : cur.small;
    return {
      correct: a === ansA && b === ansB,
      explanation: `${cur.nameA} ${ansA}${cur.unitA}、${cur.nameB} ${ansB}${cur.unitB}`,
    };
  },

  _genGosanke() {
    const tpls = [this._gWAgeRatio, this._gWOverUnder, this._gWDivision, this._gWCirculate];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【御三家】比の変化（年齢算）: 現在 p:q、y年後 r:1 → A=pk, k=y(r-1)/(p-rq)
  _gWAgeRatio() {
    const combos = [
      {p:7,q:2,r:3,y:4},{p:5,q:2,r:2,y:6},{p:4,q:1,r:3,y:3},
      {p:8,q:3,r:2,y:6},{p:9,q:4,r:2,y:4},{p:5,q:1,r:4,y:5},
      {p:7,q:3,r:2,y:3},{p:11,q:4,r:3,y:8},{p:6,q:1,r:5,y:4},
    ];
    const {p, q, r, y} = combos[randInt(0, combos.length - 1)];
    const k = y * (r - 1) / (p - r * q);
    const A = p * k, B = q * k;
    const pairs = [['父','子'],['兄','弟'],['姉','妹']];
    const [nA, nB] = pairs[randInt(0, pairs.length - 1)];
    this._current = { nA: A, nB: B, nameA: nA, nameB: nB, unitA: '歳', unitB: '歳',
      _title: 'かいせつ（年齢比の変化）',
      _steps: [
        `現在の比が ${p}:${q} なので、${nA}＝${p}□歳、${nB}＝${q}□歳 とおく`,
        `${y}年後の比が ${r}:1 なので<br>${p}□＋${y} ＝ ${r}×(${q}□＋${y})`,
        `${p}□＋${y} ＝ ${r*q}□＋${r*y}`,
        `(${p}−${r*q})×□ ＝ ${r*y}−${y} ＝ <em>${(r-1)*y}</em>`,
        `□ ＝ ${(r-1)*y} ÷ ${p - r*q} ＝ <em>${k}</em>`,
        `${nA} ＝ ${p}×${k} ＝ <em>${A}歳</em>、${nB} ＝ ${q}×${k} ＝ <em>${B}歳</em>`,
      ],
    };
    return {
      text: `現在、${nA}と${nB}の年齢の比は <span class="num">${p}</span>：<span class="num">${q}</span>。<br><span class="num">${y}</span>年後の比は <span class="num">${r}</span>：1 になる。<br>現在の${nA}と${nB}の年齢は？`,
      inputs: [
        { id: 'ans-A', label: `${nA}の年齢`, unit: '歳' },
        { id: 'ans-B', label: `${nB}の年齢`, unit: '歳' },
      ],
    };
  },

  // 【御三家】過不足算: N人にa冊→b冊余り、c冊→d冊不足 → N=(b+d)/(c-a)
  _gWOverUnder() {
    let a, c, b, d, N, total;
    do {
      a = randInt(3, 7); c = a + randInt(2, 4);
      b = randInt(2, 8); d = randInt(2, 10);
      N = (b + d) / (c - a);
      total = a * N + b;
    } while (!Number.isInteger(N) || N < 5 || N > 30 || total > 250);
    this._current = { nA: N, nB: total, nameA: '生徒の人数', nameB: 'ノートの冊数', unitA: '人', unitB: '冊',
      _title: 'かいせつ（過不足算）',
      _steps: [
        `${a}冊ずつ配ると ${b}冊 余る：M ＝ ${a}×N ＋ ${b} ……①`,
        `${c}冊ずつ配ると ${d}冊 不足：M ＝ ${c}×N − ${d} ……②`,
        `①＝② より：${a}N ＋ ${b} ＝ ${c}N − ${d}`,
        `(${c}−${a})×N ＝ ${b}＋${d} ＝ <em>${b+d}</em>`,
        `N ＝ ${b+d} ÷ ${c-a} ＝ <em>${N}人</em>`,
        `M ＝ ${a}×${N} ＋ ${b} ＝ <em>${total}冊</em>`,
      ],
    };
    return {
      text: `生徒にノートを配る。<br>1人に <span class="num">${a}</span>冊ずつ配ると <span class="num">${b}</span>冊 余り、<br>1人に <span class="num">${c}</span>冊ずつ配ると <span class="num">${d}</span>冊 足りない。<br>生徒の人数とノートの冊数は？`,
      inputs: [
        { id: 'ans-A', label: '生徒の人数', unit: '人' },
        { id: 'ans-B', label: 'ノートの冊数', unit: '冊' },
      ],
    };
  },

  // 【御三家】割り算の商と余り: big=Q*small+R, big+small=S → small=(S-R)/(Q+1)
  _gWDivision() {
    let Q, R, small, big, S;
    do {
      Q = randInt(2, 5); R = randInt(1, Q - 1);
      small = randInt(R + 2, 18);
      big = Q * small + R; S = big + small;
    } while (S > 180 || big > 130);
    this._current = { nA: big, nB: small, nameA: '大きい数', nameB: '小さい数', unitA: '', unitB: '',
      _title: 'かいせつ（商と余りの利用）',
      _steps: [
        `大きい数 ＝ ${Q} × 小さい数 ＋ ${R} ……①（割り算の定義）`,
        `大きい数 ＋ 小さい数 ＝ ${S} ……②`,
        `①を②に代入：${Q}×小＋${R}＋小 ＝ ${S}`,
        `(${Q}＋1)×小 ＝ ${S}−${R} ＝ <em>${S-R}</em>`,
        `小さい数 ＝ ${S-R} ÷ ${Q+1} ＝ <em>${small}</em>`,
        `大きい数 ＝ ${Q}×${small}＋${R} ＝ <em>${big}</em>`,
      ],
    };
    return {
      text: `2つの整数がある。<br>大きい方を小さい方で割ると<br>商 <span class="num">${Q}</span>、余り <span class="num">${R}</span>。<br>2つの数の和は <span class="num">${S}</span>。<br>2つの数はそれぞれ いくつ？`,
      inputs: [
        { id: 'ans-A', label: '大きい数', unit: '' },
        { id: 'ans-B', label: '小さい数', unit: '' },
      ],
    };
  },

  // 【御三家】3人の循環移動で全員等額: A=11k, B=7k, C=6k (total=24k)
  // AがBに「Bの持っている額と同じだけ」→ BがCに → CがAに → 全員 total/3
  _gWCirculate() {
    const k = randInt(1, 4) * 100;
    const total = 24 * k;
    const A = 11 * k, B = 7 * k, C = 6 * k;
    const P = total / 3;
    this._current = {
      nA: A, nB: B, nC: C,
      nameA: 'A', nameB: 'B', nameC: 'C',
      unitA: '円', unitB: '円', unitC: '円',
      _title: 'かいせつ（逆算・終わりから戻す）',
      _steps: [
        `③の後：3人とも <em>${P}円</em>（合計 ${total}円）`,
        `③を逆にたどる（CがAに「Aの額と同じ」渡した）<br>③前のA ＝ ${P}÷2 ＝ ${P/2}円、C ＝ ${P}＋${P/2} ＝ <em>${P*3/2}円</em>`,
        `②を逆にたどる（BがCに「Cの額と同じ」渡した）<br>②前のC ＝ ${P*3/2}÷2 ＝ ${P*3/4}円、B ＝ ${P}＋${P*3/4} ＝ <em>${P*7/4}円</em>`,
        `①を逆にたどる（AがBに「Bの額と同じ」渡した）<br>①前のB ＝ ${P*7/4}÷2 ＝ ${P*7/8}円、A ＝ ${P/2}＋${P*7/8} ＝ <em>${P*11/8}円</em>`,
        `はじめ：A ＝ <em>${A}円</em>、B ＝ <em>${B}円</em>、C ＝ <em>${C}円</em>`,
      ],
    };
    return {
      text: `A・B・Cの3人がお金を持っている。<br>①AがBに「Bの持っている額と同じだけ」渡した。<br>②BがCに「Cの持っている額と同じだけ」渡した。<br>③CがAに「Aの持っている額と同じだけ」渡したら<br>3人とも <span class="num">${total / 3}</span>円 になった。<br>はじめ それぞれ 何円だったか？`,
      inputs: [
        { id: 'ans-A', label: 'A のはじめの額', unit: '円' },
        { id: 'ans-B', label: 'B のはじめの額', unit: '円' },
        { id: 'ans-C', label: 'C のはじめの額', unit: '円' },
      ],
    };
  },

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'wassan', ...c };
  },
});

// ============================================================

registerModule({
  id: 'tsurukame',
  name: '鶴亀算',
  icon: '🐢',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')   return this._genJuken();
    if (this._level === 'gosanke') return this._genGosanke();
    return this._level === 'basic' ? this._genBasic() : this._genApplied();
  },

  _genBasic() {
    const N = randInt(6, 18), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 2, valB = 4, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'つる', unitA: 'わ', nameB: 'かめ', unitB: 'ひき', unitS: '本' };
    return {
      text: `つると かめが あわせて <span class="num">${N}</span>ひき、<br>あしは あわせて <span class="num">${S}</span>本。<br>それぞれ 何びき？`,
      inputs: [
        { id: 'ans-A', label: 'つるの数', unit: 'わ' },
        { id: 'ans-B', label: 'かめの数', unit: 'ひき' },
      ],
    };
  },

  _genApplied() {
    const tpls = [this._tplBike, this._tplCoins, this._tplStationery];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplBike() {
    const N = randInt(5, 14), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 2, valB = 3, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'じてんしゃ', unitA: 'だい', nameB: 'さんりんしゃ', unitB: 'だい', unitS: '本' };
    return {
      text: `じてんしゃと さんりんしゃが あわせて <span class="num">${N}</span>だい、<br>タイヤは あわせて <span class="num">${S}</span>本。<br>それぞれ 何だい？`,
      inputs: [
        { id: 'ans-A', label: 'じてんしゃ', unit: 'だい' },
        { id: 'ans-B', label: 'さんりんしゃ', unit: 'だい' },
      ],
    };
  },

  _tplCoins() {
    const N = randInt(5, 14), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 10, valB = 50, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: '10円玉', unitA: 'まい', nameB: '50円玉', unitB: 'まい', unitS: '円' };
    return {
      text: `10円玉と 50円玉が あわせて <span class="num">${N}</span>まい、<br>あわせて <span class="num">${S}</span>円。<br>それぞれ 何まい？`,
      inputs: [
        { id: 'ans-A', label: '10円玉', unit: 'まい' },
        { id: 'ans-B', label: '50円玉', unit: 'まい' },
      ],
    };
  },

  _tplStationery() {
    const pencilPrices = [30, 40, 50, 60, 70];
    const eraserPrices = [80, 90, 100, 120, 150];
    const valA = pencilPrices[randInt(0, pencilPrices.length - 1)];
    const valB = eraserPrices[randInt(0, eraserPrices.length - 1)];
    const N = randInt(5, 12), nA = randInt(1, N - 1), nB = N - nA;
    const S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'えんぴつ', unitA: '本', nameB: '消しゴム', unitB: 'こ', unitS: '円' };
    return {
      text: `1本 <span class="num">${valA}</span>円の えんぴつと、<br>1こ <span class="num">${valB}</span>円の 消しゴムを<br>あわせて <span class="num">${N}</span>こ かって <span class="num">${S}</span>円。<br>それぞれ 何こ？`,
      inputs: [
        { id: 'ans-A', label: 'えんぴつ', unit: '本' },
        { id: 'ans-B', label: '消しゴム', unit: 'こ' },
      ],
    };
  },

  _genJuken() {
    const tpls = [this._jTplSpeed, this._jTpl3Diff, this._jTplKaten, this._jTplAddChange];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【中学受験】速さの鶴亀（距離を2分割、時間合計から各距離を求める）
  _jTplSpeed() {
    let vW, vR, dW, dR, D, T;
    do {
      vW = randInt(4, 8) * 10;
      vR = (vW / 10 + randInt(3, 7)) * 10;
      dW = randInt(3, 12) * 100;
      dR = randInt(2, 10) * 100;
      D  = dW + dR;
      T  = dW / vW + dR / vR;
    } while (!Number.isInteger(T) || T > 60 || T < 8 || D > 3000);
    const hypoT = D / vW;
    const diffD = D - vW * T;
    const gainPerMin = vR - vW;
    this._current = { N: D, nA: dW, nB: dR,
      nameA: '歩いた道のり', unitA: 'm', nameB: '走った道のり', unitB: 'm',
      _title: 'かいせつ（速さの鶴亀算）',
      _steps: [
        `全部 分速${vW}m で歩いたとしたら：${D} ÷ ${vW} ＝ ${hypoT}分`,
        `実際は ${T}分。${hypoT > T ? hypoT - T + '分 速い' : T - hypoT + '分 遅い'}`,
        `1分を「歩き→走り」に替えると<br>進む距離が ${gainPerMin}m 増える`,
        `走った時間：${diffD} ÷ ${gainPerMin} ＝ <em>${dR / vR}分</em>`,
        `歩いた道のり：${vW}×${dW/vW} ＝ <em>${dW}m</em>`,
        `走った道のり：${vR}×${dR/vR} ＝ <em>${dR}m</em>`,
      ],
    };
    return {
      text: `分速 <span class="num">${vW}</span>m で歩き、<br>分速 <span class="num">${vR}</span>m で走って学校に着いた。<br>学校までの道のりは <span class="num">${D}</span>m、<br>かかった時間は <span class="num">${T}</span>分。<br>歩いた道のりと走った道のりは それぞれ 何m？`,
      inputs: [
        { id: 'ans-A', label: '歩いた道のり', unit: 'm' },
        { id: 'ans-B', label: '走った道のり', unit: 'm' },
      ],
    };
  },

  // 【中学受験】3種類+差の条件（AはBよりd個多い）→ 消去して鶴亀
  _jTpl3Diff() {
    let nA, nB, nC, N, S, vA, vB, vC, d;
    for (let i = 0; i < 300; i++) {
      vA = randInt(5, 14) * 10;
      vB = randInt(3, 10) * 10;
      vC = randInt(8, 18) * 10;
      if (vA === vB || vA === vC || vB === vC) continue;
      d  = randInt(1, 5);
      nB = randInt(2, 8); nC = randInt(2, 8);
      nA = nB + d;
      N  = nA + nB + nC;
      S  = vA * nA + vB * nB + vC * nC;
      if (N < 8 || N > 25 || S > 5000 || S % 10 !== 0) continue;
      break;
    }
    const remN = N - d;
    const remS = S - vA * d;
    const coeff = vA + vB - 2 * vC;
    const constTerm = remS - vC * remN;
    this._current = { nA, nB, nC, N, S,
      nameA: 'りんご', unitA: '個', nameB: 'みかん', unitB: '個', nameC: 'かき', unitC: '個',
      _title: 'かいせつ（置き換え・消去法）',
      _steps: [
        `りんご ＝ みかん ＋ ${d} なので<br>みかんを □ とおくとりんごは □＋${d}`,
        `かき ＝ ${N} − (□＋${d}) − □ ＝ ${remN} − 2□`,
        `金額の式：${vA}(□＋${d}) ＋ ${vB}□ ＋ ${vC}(${remN}−2□) ＝ ${S}`,
        `(${vA}＋${vB}−2×${vC})□ ＝ ${S} − ${vA*d} − ${vC*remN}<br><em>${coeff}</em>□ ＝ <em>${constTerm}</em>`,
        `みかん □ ＝ ${constTerm} ÷ ${coeff} ＝ <em>${nB}個</em>`,
        `りんご ＝ ${nB}＋${d} ＝ <em>${nA}個</em>、かき ＝ ${remN}−2×${nB} ＝ <em>${nC}個</em>`,
      ],
    };
    return {
      text: `<span class="num">${vA}</span>円のりんご、<span class="num">${vB}</span>円のみかん、<span class="num">${vC}</span>円のかきを<br>合わせて <span class="num">${N}</span>個 買うと <span class="num">${S}</span>円。<br>りんごはみかんより <span class="num">${d}</span>個 多い。<br>りんご・みかん・かき それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'りんごの個数', unit: '個' },
        { id: 'ans-B', label: 'みかんの個数', unit: '個' },
        { id: 'ans-C', label: 'かきの個数', unit: '個' },
      ],
    };
  },

  // 【中学受験】仮定算・得点型（正解+p点、不正解-q点）
  _jTplKaten() {
    let N, p, q, correct, wrong, T;
    do {
      N       = randInt(10, 20);
      p       = randInt(2, 5);
      q       = randInt(1, 3);
      correct = randInt(Math.ceil(N * 0.55), N - 2);
      wrong   = N - correct;
      T       = p * correct - q * wrong;
    } while (T <= 0 || T > N * p - 10);
    const hypoScore = N * p;
    const diffScore = hypoScore - T;
    this._current = { N, nA: correct, nB: wrong,
      nameA: '正解', unitA: '問', nameB: '不正解', unitB: '問',
      _title: 'かいせつ（仮定算）',
      _steps: [
        `全問正解と仮定：${N}×${p} ＝ <em>${hypoScore}点</em>`,
        `実際は ${T}点。差は <em>${diffScore}点</em> 多い`,
        `1問を「正解→不正解」に替えると<br>正解の${p}点がなくなり、さらに${q}点引かれる → ${p+q}点 へる`,
        `不正解の数：${diffScore} ÷ ${p+q} ＝ <em>${wrong}問</em>`,
        `正解：${N} − ${wrong} ＝ <em>${correct}問</em>`,
      ],
    };
    return {
      text: `<span class="num">${N}</span>問のテスト。<br>正解は1問 <span class="num">${p}</span>点、<br>不正解は1問 <span class="num">${q}</span>点 引かれる。<br>合計 <span class="num">${T}</span>点 だったとき、<br>正解と不正解は それぞれ 何問？`,
      inputs: [
        { id: 'ans-A', label: '正解の問数', unit: '問' },
        { id: 'ans-B', label: '不正解の問数', unit: '問' },
      ],
    };
  },

  // 【中学受験】個数変化型（M個追加するとAはBのk倍になる）
  _jTplAddChange() {
    let N, M, k, nA, nB;
    do {
      k = randInt(2, 4);
      M = randInt(2, 12);
      N = randInt(10, 35);
      if ((k * N - M) % (k + 1) !== 0) continue;
      nA = (k * N - M) / (k + 1);
      nB = N - nA;
    } while (nA <= 0 || nB <= 0 || nA + M > N * k);
    this._current = { N, nA, nB, nameA: 'A', unitA: '個', nameB: 'B', unitB: '個',
      _title: 'かいせつ（連立・置き換え）',
      _steps: [
        `はじめの A を □、B を △ とする`,
        `□ ＋ △ ＝ ${N} ……①`,
        `□ ＋ ${M} ＝ ${k}×△ → □ ＝ ${k}△ − ${M} ……②`,
        `②を①に代入：${k}△ − ${M} ＋ △ ＝ ${N}<br>(${k}＋1)△ ＝ ${N+M}`,
        `△ ＝ ${N+M} ÷ ${k+1} ＝ <em>${nB}個</em>（B）`,
        `□ ＝ ${N} − ${nB} ＝ <em>${nA}個</em>（A）`,
      ],
    };
    return {
      text: `AとBが合わせて <span class="num">${N}</span>個 ある。<br>Aを <span class="num">${M}</span>個 追加すると、<br>AはBの <span class="num">${k}</span>倍 になった。<br>はじめ、AとBは それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A の個数', unit: '個' },
        { id: 'ans-B', label: 'B の個数', unit: '個' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const b = parseInt(document.getElementById('ans-B').value, 10);
    const cur = this._current;
    if (cur.nC !== undefined && document.getElementById('ans-C')) {
      const c = parseInt(document.getElementById('ans-C').value, 10);
      return {
        correct: a === cur.nA && b === cur.nB && c === cur.nC,
        explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}、${cur.nameC} ${cur.nC}${cur.unitC}`,
      };
    }
    if (cur.nAC !== undefined) {
      return {
        correct: a === cur.nA && b === cur.nC,
        explanation: `自転車 ${cur.nA}台、三輪車 ${cur.nB}台、自動車 ${cur.nC}台`,
      };
    }
    return {
      correct: a === cur.nA && b === cur.nB,
      explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}`,
    };
  },

  _genGosanke() {
    const tpls = [this._gTSpeed, this._gTAlligation, this._gTProfit2, this._gTEliminate];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 【御三家】速さへの応用（旅人算×鶴亀）
  // 歩きvW m/分 + 走りvR m/分、合計T分、距離D m → 各時間を求める
  _gTSpeed() {
    let vW, vR, tW, tR, T, D;
    do {
      vW = randInt(5, 9) * 10;
      vR = (vW / 10 + randInt(3, 6)) * 10;
      tW = randInt(5, 20); tR = randInt(3, 15);
      T = tW + tR; D = vW * tW + vR * tR;
    } while (D % 10 !== 0 || D > 4000 || T > 40);
    const hypoD = vW * T;
    const gainD = D - hypoD;
    const gainPerMin = vR - vW;
    this._current = { N: T, nA: tW, nB: tR, valA: vW, valB: vR, S: D,
      nameA: '歩き', unitA: '分', nameB: '走り', unitB: '分', unitS: 'm',
      _title: 'かいせつ（速さの鶴亀算）',
      _steps: [
        `全部 分速${vW}m で歩いたとしたら：${vW}×${T} ＝ <em>${hypoD}m</em>`,
        `実際は ${D}m。差は <em>${gainD}m</em> 多い`,
        `1分を「歩き→走り」に替えると：${gainPerMin}m 増える`,
        `走った時間：${gainD} ÷ ${gainPerMin} ＝ <em>${tR}分</em>`,
        `歩いた時間：${T} − ${tR} ＝ <em>${tW}分</em>`,
      ],
    };
    return {
      text: `太郎は分速 <span class="num">${vW}</span>m で歩き、<br>分速 <span class="num">${vR}</span>m で走って学校へ行った。<br>合計 <span class="num">${T}</span>分 かかり、距離は <span class="num">${D}</span>m。<br>歩いた時間と走った時間は それぞれ 何分？`,
      inputs: [
        { id: 'ans-A', label: '歩いた時間', unit: '分' },
        { id: 'ans-B', label: '走った時間', unit: '分' },
      ],
    };
  },

  // 【御三家】混合平均（アレガション）
  // A組平均Ma、B組平均Mb、合計N人の全体平均M → 各クラスの人数
  // nA*(Ma-M) = nB*(M-Mb) かつ nA+nB=N
  _gTAlligation() {
    let Ma, Mb, M, N, nA, nB;
    for (let i = 0; i < 200; i++) {
      Mb = randInt(5, 8) * 10;
      Ma = Mb + randInt(1, 4) * 10;
      const p = randInt(1, 4), q = randInt(1, 4);
      const Mc = (Ma * p + Mb * q) / (p + q);
      if (!Number.isInteger(Mc)) continue;
      M = Mc;
      const base = randInt(2, 6);
      nA = p * base; nB = q * base; N = nA + nB;
      if (N < 6 || N > 50 || nA < 2 || nB < 2) continue;
      break;
    }
    const totalScore = M * N;
    const diffMa = Ma - Mb;
    const rhs = totalScore - Mb * N;
    this._current = { N, nA, nB, valA: Ma, valB: Mb, S: totalScore,
      nameA: 'A組', unitA: '人', nameB: 'B組', unitB: '人', unitS: '点',
      _title: 'かいせつ（混合平均・鶴亀算）',
      _steps: [
        `A組をX人とすると、B組 ＝ ${N}−X 人`,
        `A組の合計：${Ma}×X`,
        `B組の合計：${Mb}×(${N}−X)`,
        `2組合わせた合計：${Ma}X ＋ ${Mb}(${N}−X) ＝ ${M}×${N} ＝ <em>${totalScore}</em>`,
        `(${Ma}−${Mb})×X ＝ ${totalScore} − ${Mb}×${N} ＝ <em>${rhs}</em>`,
        `X ＝ ${rhs} ÷ ${diffMa} ＝ <em>${nA}人</em>（A組）、B組 ＝ <em>${nB}人</em>`,
      ],
    };
    return {
      text: `A組とB組が合同でテストを受けた。<br>A組の平均は <span class="num">${Ma}</span>点、B組の平均は <span class="num">${Mb}</span>点。<br>2組合わせた平均は <span class="num">${M}</span>点、合計 <span class="num">${N}</span>人。<br>A組と B組は それぞれ 何人？`,
      inputs: [
        { id: 'ans-A', label: 'A組の人数', unit: '人' },
        { id: 'ans-B', label: 'B組の人数', unit: '人' },
      ],
    };
  },

  // 【御三家】損益算（利益率と損失率の組み合わせ）
  // A品: 原価vA、rA%利益; B品: 原価vB、rB%損失; nA+nB=N
  // 全体の利益 P = vA*(rA/100)*nA - vB*(rB/100)*nB
  // → nA = (P*100 + vB*rB*N) / (vA*rA + vB*rB)
  _gTProfit2() {
    let nA, nB, vA, vB, rA, rB, N, P;
    for (let i = 0; i < 200; i++) {
      rA = randInt(1, 4) * 10; rB = randInt(1, 3) * 10;
      vA = randInt(2, 8) * 100; vB = randInt(2, 8) * 100;
      nA = randInt(3, 12); nB = randInt(3, 12); N = nA + nB;
      P = vA * rA * nA / 100 - vB * rB * nB / 100;
      if (!Number.isInteger(P) || Math.abs(P) > 20000 || Math.abs(P) < 100) continue;
      const check = (P * 100 + vB * rB * N) / (vA * rA + vB * rB);
      if (!Number.isInteger(check) || check !== nA) continue;
      break;
    }
    const profitLabel = P >= 0
      ? `<span class="num">${P}</span>円 の 利益`
      : `<span class="num">${-P}</span>円 の 損失`;
    const profitPerA = vA * rA / 100;
    const lossPerB  = vB * rB / 100;
    const hypoAllA  = profitPerA * N;
    const perSwapP  = profitPerA + lossPerB;
    const diffP     = hypoAllA - P;
    this._current = { N, nA, nB, valA: vA, valB: vB, S: 0,
      nameA: 'A品', unitA: '個', nameB: 'B品', unitB: '個', unitS: '円',
      _title: 'かいせつ（損益算・仮定算）',
      _steps: [
        `A品1個の利益：${vA}×${rA}% ＝ <em>${profitPerA}円</em>`,
        `B品1個の損失：${vB}×${rB}% ＝ <em>${lossPerB}円</em>`,
        `全部A品と仮定：利益 ${profitPerA}×${N} ＝ <em>${hypoAllA}円</em>`,
        `実際の全体損益は${P >= 0 ? '利益' : '損失'} <em>${Math.abs(P)}円</em>。差は <em>${Math.abs(diffP)}円</em>`,
        `A品1個をB品に替えると：${profitPerA}＋${lossPerB} ＝ <em>${perSwapP}円</em> へる`,
        `B品の数：${Math.abs(diffP)} ÷ ${perSwapP} ＝ <em>${nB}個</em>、A品 ＝ <em>${nA}個</em>`,
      ],
    };
    return {
      text: `原価 <span class="num">${vA}</span>円の A品に <span class="num">${rA}</span>% の利益を乗せ、<br>原価 <span class="num">${vB}</span>円の B品を <span class="num">${rB}</span>% 引きで 売った。<br>合わせて <span class="num">${N}</span>個 売り、全体で ${profitLabel}。<br>A品と B品は それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A品の個数', unit: '個' },
        { id: 'ans-B', label: 'B品の個数', unit: '個' },
      ],
    };
  },

  // 【御三家】3種類の消去（2段階推論）
  // A(vA円)、B(vB円)、C(vC円)、合計N個でS円、A+B=Q個
  // → まずC=N-Qと決め、残りをA・Bで鶴亀
  _gTEliminate() {
    let nA, nB, nC, N, Q, vA, vB, vC, S;
    for (let i = 0; i < 300; i++) {
      vA = randInt(3, 9) * 10; vB = randInt(2, 7) * 10; vC = randInt(5, 15) * 10;
      if (vA === vB) continue;
      nA = randInt(3, 10); nB = randInt(3, 10); nC = randInt(2, 8);
      N = nA + nB + nC; Q = nA + nB;
      S = vA * nA + vB * nB + vC * nC;
      if (S > 6000 || S % 10 !== 0 || N > 25) continue;
      const rem = S - vC * nC;
      const check = (rem - vB * Q) / (vA - vB);
      if (!Number.isInteger(check) || check !== nA || check <= 0) continue;
      break;
    }
    const remS2  = S - vC * nC;
    const hypoB  = vB * Q;
    const diffAB = remS2 - hypoB;
    const perSwapAB = vA - vB;
    this._current = {
      nA, nB, nC, N, S,
      nameA: 'A', unitA: '個', nameB: 'B', unitB: '個', nameC: 'C', unitC: '個',
      _title: 'かいせつ（消去→鶴亀）',
      _steps: [
        `A＋B ＝ ${Q}個 なので C ＝ ${N}−${Q} ＝ <em>${nC}個</em>`,
        `Cの合計金額：${vC}×${nC} ＝ ${vC*nC}円`,
        `残りA＋Bで ${remS2}円、${Q}個の鶴亀算`,
        `全部B(${vB}円)と仮定：${vB}×${Q} ＝ ${hypoB}円`,
        `差 ${diffAB}円、A1個をBに替えると ${Math.abs(perSwapAB)}円${diffAB>0?'ふえる':'へる'}`,
        `A ＝ ${Math.abs(diffAB)} ÷ ${Math.abs(perSwapAB)} ＝ <em>${nA}個</em>、B ＝ ${Q}−${nA} ＝ <em>${nB}個</em>`,
      ],
    };
    return {
      text: `1個 <span class="num">${vA}</span>円 の A、<span class="num">${vB}</span>円 の B、<span class="num">${vC}</span>円 の C を<br>合わせて <span class="num">${N}</span>個 買うと <span class="num">${S}</span>円。<br>A と B を合わせると <span class="num">${Q}</span>個 だった。<br>A・B・C それぞれ 何個？`,
      inputs: [
        { id: 'ans-A', label: 'A の個数', unit: '個' },
        { id: 'ans-B', label: 'B の個数', unit: '個' },
        { id: 'ans-C', label: 'C の個数', unit: '個' },
      ],
    };
  },

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'area', ...c };
  },
});

registerModule({
  id: 'tabibito',
  name: '旅人算',
  icon: '🚶',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')  return this._genJuken();
    if (this._level === 'applied') return this._genApplied();
    return this._genBasic();
  },

  _genBasic() {
    const tpls = [this._tplMeet, this._tplMeetPlace];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _genApplied() {
    const tpls = [this._tplChase, this._tplPond];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _genJuken() {
    const tpls = [this._jTplSpeedChange, this._jTplThree];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 向かい合い → 出会い時間
  _tplMeet() {
    let vA, vB, D, T;
    do {
      vA = randInt(3, 9) * 10;
      vB = randInt(3, 9) * 10;
      D  = randInt(4, 14) * (vA + vB);
    } while ((D % (vA + vB)) !== 0);
    T = D / (vA + vB);
    this._current = {
      nA: T, nameA: '出会うまでの時間', unitA: '分',
      _title: 'かいせつ（向かい合い旅人算）',
      _steps: [
        `2人が 1分間に近づく距離：${vA} ＋ ${vB} ＝ <em>${vA + vB}m</em>`,
        `出会うまでの時間：${D} ÷ ${vA + vB} ＝ <em>${T}分</em>`,
      ],
    };
    return {
      text: `AとBが <span class="num">${D}</span>m 離れた地点から<br>向かい合って歩き始めた。<br>Aは分速 <span class="num">${vA}</span>m、Bは分速 <span class="num">${vB}</span>m。<br>何分後に出会う？`,
      inputs: [{ id: 'ans-A', label: '出会うまでの時間', unit: '分' }],
    };
  },

  // 向かい合い → 出会い地点（Aから何m）
  _tplMeetPlace() {
    let vA, vB, D, T, dA;
    do {
      vA = randInt(3, 9) * 10;
      vB = randInt(3, 9) * 10;
      D  = randInt(4, 14) * (vA + vB);
    } while ((D % (vA + vB)) !== 0);
    T  = D / (vA + vB);
    dA = vA * T;
    this._current = {
      nA: dA, nameA: 'Aから出会い地点まで', unitA: 'm',
      _title: 'かいせつ（出会い地点）',
      _steps: [
        `出会うまでの時間：${D} ÷ (${vA}＋${vB}) ＝ <em>${T}分</em>`,
        `Aが進んだ距離：${vA} × ${T} ＝ <em>${dA}m</em>`,
      ],
    };
    return {
      text: `AとBが <span class="num">${D}</span>m 離れた地点から<br>向かい合って歩き始めた。<br>Aは分速 <span class="num">${vA}</span>m、Bは分速 <span class="num">${vB}</span>m。<br>出会い地点はAから何m？`,
      inputs: [{ id: 'ans-A', label: 'Aから出会い地点まで', unit: 'm' }],
    };
  },

  // 追いかけ算
  _tplChase() {
    let vA, vB, lead, T;
    do {
      vA   = randInt(4, 8) * 10;
      vB   = randInt(3, 6) * 10 + vA;
      lead = randInt(3, 10) * (vB - vA);
    } while (lead > 1500);
    T = lead / (vB - vA);
    this._current = {
      nA: T, nameA: '追いつくまでの時間', unitA: '分',
      _title: 'かいせつ（追いかけ旅人算）',
      _steps: [
        `1分間に縮まる差：${vB} − ${vA} ＝ <em>${vB - vA}m</em>`,
        `追いつくまでの時間：${lead} ÷ ${vB - vA} ＝ <em>${T}分</em>`,
      ],
    };
    return {
      text: `Aは <span class="num">${lead}</span>m 先を分速 <span class="num">${vA}</span>m で歩いている。<br>Bが分速 <span class="num">${vB}</span>m でAを追いかける。<br>何分後に追いつく？`,
      inputs: [{ id: 'ans-A', label: '追いつくまでの時間', unit: '分' }],
    };
  },

  // 池の周回
  _tplPond() {
    let vA, vB, L, T;
    const opposite = randInt(0, 1) === 1;
    do {
      vA = randInt(4, 9) * 10;
      vB = randInt(4, 9) * 10;
      if (opposite) {
        L = randInt(3, 10) * (vA + vB);
      } else {
        if (vA === vB) vB += 10;
        const diff = Math.abs(vA - vB);
        L = randInt(3, 10) * diff;
      }
    } while (L > 3000 || L < 100);
    T = opposite ? L / (vA + vB) : L / Math.abs(vA - vB);
    const dir = opposite ? '反対方向' : '同じ方向';
    const desc = opposite ? '初めて出会う' : '初めて追いつく';
    this._current = {
      nA: T, nameA: desc + 'までの時間', unitA: '分',
      _title: `かいせつ（池の周回・${dir}）`,
      _steps: opposite
        ? [
            `反対方向なので 1分に縮まる差：${vA} ＋ ${vB} ＝ <em>${vA + vB}m</em>`,
            `出会うまでの時間：${L} ÷ ${vA + vB} ＝ <em>${T}分</em>`,
          ]
        : [
            `同じ方向なので 1分に縮まる差：|${vA} − ${vB}| ＝ <em>${Math.abs(vA - vB)}m</em>`,
            `追いつくまでの時間：${L} ÷ ${Math.abs(vA - vB)} ＝ <em>${T}分</em>`,
          ],
    };
    return {
      text: `周囲 <span class="num">${L}</span>m の池の周りを<br>同じ地点から <span class="num">${dir}</span> に<br>Aは分速 <span class="num">${vA}</span>m、Bは分速 <span class="num">${vB}</span>m で進む。<br>${desc}のは何分後？`,
      inputs: [{ id: 'ans-A', label: `${desc}まで`, unit: '分' }],
    };
  },

  // 途中で速度変化 → 速度を上げたとき残り何m
  _jTplSpeedChange() {
    let vA1, vA2, C, D, T, t1, t2, rem;
    do {
      vA1 = randInt(5, 9) * 10;
      vA2 = vA1 + randInt(2, 5) * 10;
      t1  = randInt(3, 8);
      t2  = randInt(3, 8);
      C   = vA1 * t1;
      D   = C + vA2 * t2;
      T   = t1 + t2;
      rem = D - C;
    } while (D > 3000 || rem % 10 !== 0);
    this._current = {
      nA: rem, nameA: '速度を上げたとき残りの距離', unitA: 'm',
      _title: 'かいせつ（速度変化）',
      _steps: [
        `最初の ${t1}分で進んだ距離：${vA1} × ${t1} ＝ <em>${C}m</em>`,
        `残りの距離：${D} − ${C} ＝ <em>${rem}m</em>`,
      ],
    };
    return {
      text: `Aは <span class="num">${D}</span>m の道を歩く。<br>最初は分速 <span class="num">${vA1}</span>m で <span class="num">${t1}</span>分 歩いた後、<br>分速 <span class="num">${vA2}</span>m に速度を上げた。<br>速度を上げたとき、残りは何m？`,
      inputs: [{ id: 'ans-A', label: '残りの距離', unit: 'm' }],
    };
  },

  // 3人問題：AとBが向かい合い出会い → その後CとBが出会うまで
  _jTplThree() {
    let vA, vB, vC, D, T_AB, dA, dB, dC_at_meet, remBC, T_BC;
    do {
      vA = randInt(4, 8) * 10;
      vB = randInt(4, 8) * 10;
      vC = randInt(3, 7) * 10;
      const sumAB = vA + vB;
      D  = randInt(4, 10) * sumAB;
      T_AB = D / sumAB;
      dA   = vA * T_AB;
      dB   = D - dA;
      // C starts at same point as A, heading toward B
      dC_at_meet = vC * T_AB;
      remBC = dA - dC_at_meet; // distance between C and B's current position... wait
      // At time T_AB: B is at position D - dB = dA from A's start
      // C is at position dC_at_meet from A's start (same direction as A)
      // B is at position dA from A's start, moving toward A (so now away from B's start)
      // Actually B was moving toward A, so at meet point they're at dA from A's start
      // After meeting, B continues in same direction (past meeting point)?
      // Standard problem: B keeps walking, C is still walking toward B's original start
      // Distance between C and B at meeting time = dA - dC_at_meet (C hasn't reached meet point yet)
      // After T_AB, C and B are approaching each other: C at dC_at_meet heading right, B at dA heading left (back toward B's start)
      // They close at rate vC + vB
      remBC = dA - dC_at_meet;
      if (remBC <= 0) continue;
      T_BC = remBC / (vC + vB);
    } while (!Number.isInteger(T_BC) || T_BC <= 0 || T_BC > 20 || D > 3000);
    this._current = {
      nA: T_BC, nameA: 'AとBが出会った後、CとBが出会うまでの時間', unitA: '分',
      _title: 'かいせつ（3人旅人算）',
      _steps: [
        `AとBが出会うまでの時間：${D} ÷ (${vA}＋${vB}) ＝ <em>${T_AB}分</em>`,
        `その時点でCは：${vC} × ${T_AB} ＝ <em>${dC_at_meet}m</em> 進んでいる`,
        `出会い地点とCとの距離：${dA} − ${dC_at_meet} ＝ <em>${remBC}m</em>`,
        `CとBが近づく速さ：${vC} ＋ ${vB} ＝ <em>${vC + vB}m/分</em>`,
        `CとBが出会うまで：${remBC} ÷ ${vC + vB} ＝ <em>${T_BC}分</em>`,
      ],
    };
    return {
      text: `A・B・Cが <span class="num">${D}</span>m 離れた場所から同時に出発。<br>AとBは向かい合い（Aは分速 <span class="num">${vA}</span>m、Bは分速 <span class="num">${vB}</span>m）、<br>CはAの地点からBに向かって分速 <span class="num">${vC}</span>m で進む。<br>AとBが出会ってから何分後にCとBが出会う？`,
      inputs: [{ id: 'ans-A', label: 'AとBが出会った後', unit: '分' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const cur = this._current;
    if (cur.nB !== undefined) {
      const b = parseInt(document.getElementById('ans-B').value, 10);
      return { correct: a === cur.nA && b === cur.nB, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}` };
    }
    return { correct: a === cur.nA, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}` };
  },

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'steps', title: 'かいせつ', steps: [] };
  },
});

// --- 植木算 ---
registerModule({
  id: 'ueki',
  name: '植木算',
  icon: '🌳',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')  return this._genJuken();
    if (this._level === 'applied') return this._genApplied();

  _genJuken() {
    const tpls = [this._jTplRect, this._jTplDoubleRow];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 両端あり → 本数
  _tplLineTrees() {

      nA: n, nameA: '必要な木の本数', unitA: '本',
      _title: 'かいせつ（植木算・両端あり）',
      _steps: [
        `両端あり：間の数 ＝ 本数 − 1`,
        `間の数：${L} ÷ ${d} ＝ <em>${n - 1}</em>`,
        `本数：${n - 1} ＋ 1 ＝ <em>${n}本</em>`,
      ],

    return {
      text: `<span class="num">${L}</span>m の道に、両端を含め<br><span class="num">${d}</span>m おきに木を植える。<br>何本必要？`,
      inputs: [{ id: 'ans-A', label: '木の本数', unit: '本' }],
    };

  // 両端あり → 長さ
  _tplLineLength() {

    const n = randInt(4, 12);
    const L = d * (n - 1);
    this._current = {
      nA: L, nameA: '道の長さ', unitA: 'm',

      _title: 'かいせつ（植木算・輪）',
      _steps: [
        `輪（円）の場合：間の数 ＝ 本数（端がないため）`,

      ],
    };

      text: `周囲 <span class="num">${L}</span>m の池の周りに<br><span class="num">${n}</span>本 の木を等間隔に植える。<br>間隔は何m？`,
      inputs: [{ id: 'ans-A', label: '間隔', unit: 'm' }],
    };
  },

  // 片端のみ → 本数
  _tplOneEnd() {
    const d = randInt(3, 10);
    const n = randInt(4, 12);
    const L = d * n;
    this._current = {
      nA: n, nameA: '木の本数', unitA: '本',
      _title: 'かいせつ（植木算・片端あり）',
      _steps: [
        `片端あり：間の数 ＝ 本数`,
        `本数：${L} ÷ ${d} ＝ <em>${n}本</em>`,

    };

  // 長方形周囲 → 最大間隔(gcd)と最小本数（2答）
  _jTplRect() {
    function gcdCalc(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }
    let a, b, g, minN;
    do {
      a = randInt(2, 8) * 10;
      b = randInt(2, 8) * 10;
      if (a === b) b += 10;
      g = gcdCalc(a, b);
      minN = 2 * (a / g + b / g);
    } while (minN > 40 || g < 2);
    this._current = {
      nA: g, nB: minN,
      nameA: '最大の間隔', unitA: 'm',
      nameB: '最小の本数', unitB: '本',
      _title: 'かいせつ（長方形の植木算）',
      _steps: [
        `4つの角には必ず木を植えるので、間隔は縦・横の公約数`,
        `縦 ${a}m と横 ${b}m の最大公約数：<em>${g}m</em>（最大間隔）`,
        `縦の木の数：${a} ÷ ${g} ＝ ${a / g}本の間 → 木は ${a / g}本（角共有）`,
        `横の木の数：${b} ÷ ${g} ＝ ${b / g}本の間 → 木は ${b / g}本（角共有）`,
        `合計：2 × (${a / g} ＋ ${b / g}) ＝ <em>${minN}本</em>（最小本数）`,
      ],
    };
    return {
      text: `縦 <span class="num">${a}</span>m、横 <span class="num">${b}</span>m の長方形の<br>周囲に等間隔で木を植える。<br>4つの角には必ず植える。<br>最大の間隔は何m？<br>そのとき最小で何本必要？`,
      inputs: [
        { id: 'ans-A', label: '最大の間隔', unit: 'm' },
        { id: 'ans-B', label: '最小の本数', unit: '本' },
      ],
    };
  },

  // 道の両側に別間隔 → 合計本数（1答）
  _jTplDoubleRow() {
    const dA = randInt(3, 8);
    let dB = randInt(3, 8);
    if (dB === dA) dB++;
    const nOpts = [20, 30, 40, 60];
    let L;
    do { L = nOpts[randInt(0, nOpts.length - 1)]; } while (L % dA !== 0 || L % dB !== 0);
    const nA = L / dA + 1;
    const nB = L / dB + 1;
    const total = nA + nB;
    this._current = {
      nA: total, nameA: '2列合わせた木の総本数', unitA: '本',
      _title: 'かいせつ（両側植木算）',
      _steps: [
        `左側：${L} ÷ ${dA} ＋ 1 ＝ <em>${nA}本</em>`,
        `右側：${L} ÷ ${dB} ＋ 1 ＝ <em>${nB}本</em>`,
        `合計：${nA} ＋ ${nB} ＝ <em>${total}本</em>`,
      ],
    };
    return {
      text: `<span class="num">${L}</span>m の道の両側に木を植える（両端あり）。<br>左側は <span class="num">${dA}</span>m おき、<br>右側は <span class="num">${dB}</span>m おき。<br>2列合わせて何本必要？`,
      inputs: [{ id: 'ans-A', label: '合計の本数', unit: '本' }],
    };

  checkAnswer() {

    }
    return { correct: a === cur.nA, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}` };

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'steps', title: 'かいせつ', steps: [] };
  },
});

// --- 流水算 ---
registerModule({
  id: 'ryusui',
  name: '流水算',
  icon: '🌊',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() {
    if (this._level === 'juken')  return this._genJuken();
    if (this._level === 'applied') return this._genApplied();
    return this._genBasic();
  },

  _genBasic() {
    const tpls = [this._tplFindTime, this._tplFindDist];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _genApplied() {
    const tpls = [this._tplFindSpeed, this._tplRoundTrip];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _genJuken() {
    const tpls = [this._jTplFindBothSpeed, this._jTplTimeRatio];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  // 静水速v、流速r、距離D → 上り/下り時間（2答）
  _tplFindTime() {
    let v, r, D, tUp, tDown;
    do {
      r = randInt(1, 4);
      v = r + randInt(2, 5);
      tUp   = randInt(2, 6);
      tDown = randInt(1, tUp - 1);
      D = (v - r) * tUp;
    } while (D !== (v + r) * tDown || D > 60);
    this._current = {
      nA: tUp, nB: tDown,
      nameA: '上りの時間', unitA: '時間',
      nameB: '下りの時間', unitB: '時間',
      _title: 'かいせつ（流水算・時間を求める）',
      _steps: [
        `上りの速さ：${v} − ${r} ＝ <em>${v - r}km/h</em>`,
        `下りの速さ：${v} ＋ ${r} ＝ <em>${v + r}km/h</em>`,
        `上りの時間：${D} ÷ ${v - r} ＝ <em>${tUp}時間</em>`,
        `下りの時間：${D} ÷ ${v + r} ＝ <em>${tDown}時間</em>`,
      ],
    };
    return {
      text: `静水時の速さ <span class="num">${v}</span>km/h の船、<br>川の流れは <span class="num">${r}</span>km/h。<br><span class="num">${D}</span>km の区間を<br>上りと下りにかかる時間はそれぞれ何時間？`,
      inputs: [
        { id: 'ans-A', label: '上りの時間', unit: '時間' },
        { id: 'ans-B', label: '下りの時間', unit: '時間' },
      ],
    };
  },

  // 静水速v、流速r、上りT1時間・下りT2時間 → 距離（2答）
  _tplFindDist() {
    let v, r, T1, T2;
    do {
      r  = randInt(1, 4);
      v  = r + randInt(2, 6);
      T1 = randInt(2, 5);
      T2 = randInt(1, 4);
    } while ((v + r) * T2 > 60 || (v - r) * T1 > 60);
    const dUp   = (v - r) * T1;
    const dDown = (v + r) * T2;
    this._current = {
      nA: dUp, nB: dDown,
      nameA: '上りの距離', unitA: 'km',
      nameB: '下りの距離', unitB: 'km',
      _title: 'かいせつ（流水算・距離を求める）',
      _steps: [
        `上りの速さ：${v} − ${r} ＝ <em>${v - r}km/h</em>`,
        `下りの速さ：${v} ＋ ${r} ＝ <em>${v + r}km/h</em>`,
        `上りの距離：${v - r} × ${T1} ＝ <em>${dUp}km</em>`,
        `下りの距離：${v + r} × ${T2} ＝ <em>${dDown}km</em>`,
      ],
    };
    return {
      text: `静水時の速さ <span class="num">${v}</span>km/h の船、<br>川の流れは <span class="num">${r}</span>km/h。<br>上りに <span class="num">${T1}</span>時間、下りに <span class="num">${T2}</span>時間 かかった。<br>それぞれ何km？`,
      inputs: [
        { id: 'ans-A', label: '上りの距離', unit: 'km' },
        { id: 'ans-B', label: '下りの距離', unit: 'km' },
      ],
    };
  },

  // 上りT1・下りT2・距離D → 静水速と流速（2答）
  _tplFindSpeed() {
    let T1, T2, up, down, v, r;
    do {
      T1 = randInt(2, 5);
      T2 = randInt(1, T1 - 1);
      up = randInt(2, 8);
      down = up + randInt(2, 6);
      v = (up + down) / 2;
      r = (down - up) / 2;
    } while (!Number.isInteger(v) || !Number.isInteger(r) || r < 1 || v > 20);
    const D = up * T1;
    this._current = {
      nA: v, nB: r,
      nameA: '静水時の速さ', unitA: 'km/h',
      nameB: '川の流れの速さ', unitB: 'km/h',
      _title: 'かいせつ（流水算・速さを求める）',
      _steps: [
        `上りの速さ：${D} ÷ ${T1} ＝ <em>${up}km/h</em>`,
        `下りの速さ：${D} ÷ ${T2} ＝ <em>${down}km/h</em>`,
        `静水時の速さ：(${up} ＋ ${down}) ÷ 2 ＝ <em>${v}km/h</em>`,
        `流れの速さ：(${down} − ${up}) ÷ 2 ＝ <em>${r}km/h</em>`,
      ],
    };
    return {
      text: `ある区間 <span class="num">${D}</span>km を<br>上りに <span class="num">${T1}</span>時間、下りに <span class="num">${T2}</span>時間 かかった。<br>静水時の速さと川の流速は？`,
      inputs: [
        { id: 'ans-A', label: '静水時の速さ', unit: 'km/h' },
        { id: 'ans-B', label: '川の流速', unit: 'km/h' },
      ],
    };
  },

  // 往復T時間 → 片道距離（1答）
  _tplRoundTrip() {
    let v, r, T, D;
    do {
      r = randInt(1, 3);
      v = r + randInt(3, 7);
      T = randInt(3, 10);
      // D/(v-r) + D/(v+r) = T → D * 2v / (v²-r²) = T → D = T*(v²-r²)/(2v)
      const num = T * (v * v - r * r);
      if (num % (2 * v) !== 0) continue;
      D = num / (2 * v);
    } while (!D || D > 60 || D < 3);
    const tUp   = D / (v - r);
    const tDown = D / (v + r);
    this._current = {
      nA: D, nameA: '片道の距離', unitA: 'km',
      _title: 'かいせつ（流水算・往復）',
      _steps: [
        `上りの速さ：${v} − ${r} ＝ <em>${v - r}km/h</em>`,
        `下りの速さ：${v} ＋ ${r} ＝ <em>${v + r}km/h</em>`,
        `距離を□kmとする：□÷${v - r} ＋ □÷${v + r} ＝ ${T}`,
        `□ × (1/${v - r} ＋ 1/${v + r}) ＝ ${T}`,
        `□ × ${2 * v} ÷ ${(v - r) * (v + r)} ＝ ${T}`,
        `□ ＝ ${T} × ${(v - r) * (v + r)} ÷ ${2 * v} ＝ <em>${D}km</em>`,
      ],
    };
    return {
      text: `静水時の速さ <span class="num">${v}</span>km/h の船、<br>川の流れは <span class="num">${r}</span>km/h。<br>ある区間を往復したら <span class="num">${T}</span>時間 かかった。<br>片道は何km？`,
      inputs: [{ id: 'ans-A', label: '片道の距離', unit: 'km' }],
    };
  },

  // 上りD1km/T1h・下りD2km/T2h（D1≠D2）→ 静水速と流速
  _jTplFindBothSpeed() {
    let up, down, v, r, T1, T2, D1, D2;
    do {
      up = randInt(3, 8);
      down = up + randInt(2, 6);
      v = (up + down) / 2;
      r = (down - up) / 2;
      T1 = randInt(2, 5);
      T2 = randInt(2, 5);
      D1 = up * T1;
      D2 = down * T2;
    } while (!Number.isInteger(v) || !Number.isInteger(r) || r < 1 || D1 === D2 || D1 > 60 || D2 > 60);
    this._current = {
      nA: v, nB: r,
      nameA: '静水時の速さ', unitA: 'km/h',
      nameB: '川の流れの速さ', unitB: 'km/h',
      _title: 'かいせつ（流水算・異なる距離）',
      _steps: [
        `上りの速さ：${D1} ÷ ${T1} ＝ <em>${up}km/h</em>`,
        `下りの速さ：${D2} ÷ ${T2} ＝ <em>${down}km/h</em>`,
        `静水時の速さ：(${up} ＋ ${down}) ÷ 2 ＝ <em>${v}km/h</em>`,
        `流れの速さ：(${down} − ${up}) ÷ 2 ＝ <em>${r}km/h</em>`,
      ],
    };
    return {
      text: `川を上るとき <span class="num">${D1}</span>km を <span class="num">${T1}</span>時間、<br>下るとき <span class="num">${D2}</span>km を <span class="num">${T2}</span>時間 かかった。<br>静水時の速さと川の流速は？`,
      inputs: [
        { id: 'ans-A', label: '静水時の速さ', unit: 'km/h' },
        { id: 'ans-B', label: '川の流速', unit: 'km/h' },
      ],
    };
  },

  // 上り下り時間の比 p:q、静水速v → 流速（1答）
  _jTplTimeRatio() {
    // timeUp/timeDown = (v+r)/(v-r) = p/q → p*(v-r) = q*(v+r) → r = v*(p-q)/(p+q)
    let p, q, v, r;
    do {
      p = randInt(2, 5);
      q = randInt(1, p - 1);
      v = randInt(4, 12);
      // r = v*(p-q)/(p+q)
      const num = v * (p - q);
      const den = p + q;
      if (num % den !== 0) continue;
      r = num / den;
    } while (!r || r < 1 || r >= v);
    this._current = {
      nA: r, nameA: '川の流れの速さ', unitA: 'km/h',
      _title: 'かいせつ（時間の比から流速を求める）',
      _steps: [
        `上り時間 : 下り時間 ＝ ${p} : ${q}`,
        `距離が同じなら 時間の比 ＝ 速さの逆比`,
        `上りの速さ : 下りの速さ ＝ ${q} : ${p}`,
        `上りの速さ ＝ v − r ＝ <em>${v - r}km/h</em>、下りの速さ ＝ v ＋ r ＝ <em>${v + r}km/h</em>`,
        `(v − r) : (v ＋ r) ＝ ${q} : ${p} から<br>${p}(${v} − r) ＝ ${q}(${v} ＋ r)`,
        `流速 r ＝ ${v} × (${p} − ${q}) ÷ (${p} ＋ ${q}) ＝ <em>${r}km/h</em>`,
      ],
    };
    return {
      text: `静水時の速さ <span class="num">${v}</span>km/h の船。<br>同じ区間を上りと下りで行くと<br>時間の比は <span class="num">${p}</span>：<span class="num">${q}</span>。<br>川の流速は何km/h？`,
      inputs: [{ id: 'ans-A', label: '川の流速', unit: 'km/h' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const cur = this._current;
    if (cur.nB !== undefined) {
      const b = parseInt(document.getElementById('ans-B').value, 10);
      return { correct: a === cur.nA && b === cur.nB, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}、${cur.nameB} ${cur.nB}${cur.unitB}` };
    }
    return { correct: a === cur.nA, explanation: `${cur.nameA} ${cur.nA}${cur.unitA}` };
  },

  explain() {
    const c = this._current;
    if (c && c._steps) return { type: 'steps', title: c._title || 'かいせつ', steps: c._steps };
    return { type: 'steps', title: 'かいせつ', steps: [] };
  },
});
