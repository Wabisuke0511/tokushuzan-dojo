<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>算数道場</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="算数道場">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4a90d9;
      --primary-dark: #2d6fb0;
      --accent: #f5a623;
      --success: #27ae60;
      --error: #e74c3c;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --locked: #b0bec5;
      --radius: 16px;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; flex-direction: column; }

    /* ===== TOP SCREEN ===== */
    #top-screen { padding: 0 0 40px; }

    .top-header {
      background: var(--primary);
      color: white;
      padding: 48px 24px 32px;
      text-align: center;
    }

    .top-header h1 {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .top-header p {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .categories-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 24px 16px;
    }

    .category-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .category-card:active { transform: scale(0.97); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .cat-icon { font-size: 2.4rem; flex-shrink: 0; }

    .cat-info { flex: 1; }

    .cat-name {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .cat-desc {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    .cat-arrow {
      font-size: 1.2rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ===== SECTION SCREEN ===== */
    #section-screen { padding: 0 0 40px; }

    .section-header {
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-header h2 { font-size: 1.25rem; font-weight: 800; }

    /* ===== MODULE GRID (shared by section screen) ===== */
    .modules-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 24px 16px 8px;
    }

    .module-tile {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 12px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 2px solid transparent;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .module-tile:active:not(.locked) {
      transform: scale(0.96);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .module-tile.unlocked { border-color: var(--primary); }
    .module-tile.locked { cursor: default; opacity: 0.65; }

    .tile-icon { font-size: 2.4rem; margin-bottom: 10px; display: block; }

    .tile-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .tile-badge {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 20px;
      margin-top: 6px;
    }

    .badge-open { background: #e8f4fd; color: var(--primary-dark); }
    .badge-soon { background: #eceff1; color: var(--locked); }

    .tile-ref-btn {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      background: #e8f4fd;
      color: var(--primary-dark);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== HOME ACTIONS ===== */
    .home-actions {
      padding: 0 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-action-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }

    .home-action-btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-graph { background: #2d6fb0; color: white; }

    /* ===== QUIZ SCREEN ===== */
    #quiz-screen { padding: 0 0 48px; }

    .quiz-header {
      background: var(--primary);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .back-btn:active { opacity: 0.7; }

    .quiz-header h2 { font-size: 1.25rem; font-weight: 800; }

    .quiz-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .question-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .question-text {
      font-size: 1.2rem;
      line-height: 1.75;
      font-weight: 600;
    }

    .question-text span.num {
      color: var(--primary-dark);
      font-size: 1.35rem;
      font-weight: 900;
    }

    .answer-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .answer-row:last-of-type { margin-bottom: 0; }

    .answer-label {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .answer-input {
      flex: 1;
      min-width: 0;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      padding: 12px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--text);
      -webkit-appearance: none;
      -moz-appearance: textfield;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .answer-input::-webkit-outer-spin-button,
    .answer-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .answer-input:focus { border-color: var(--primary); }

    .answer-unit {
      font-size: 1rem;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .submit-btn:active { transform: scale(0.97); background: var(--primary-dark); }

    /* ===== RESULT ===== */
    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .result-icon { font-size: 3.5rem; margin-bottom: 10px; }
    .result-label { font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .result-label.correct { color: var(--success); }
    .result-label.wrong { color: var(--error); }
    .result-answer { font-size: 0.95rem; color: var(--muted); line-height: 1.7; }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .next-btn:active { transform: scale(0.97); opacity: 0.85; }

    .hidden { display: none !important; }

    /* ===== LEVEL SWITCHER ===== */
    .level-switcher {
      display: flex;
      gap: 8px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .level-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .level-btn.active { background: var(--primary); color: white; }

    /* ===== EXPLANATION ===== */
    .explanation-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 16px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .explanation-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .area-diagram {
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
    }

    .steps-list { display: flex; flex-direction: column; gap: 10px; }

    .step-row { display: flex; gap: 12px; align-items: flex-start; }

    .step-num {
      background: var(--primary);
      color: white;
      font-size: 0.78rem;
      font-weight: 800;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text { font-size: 1rem; line-height: 1.65; font-weight: 600; }
    .step-text em { font-style: normal; color: var(--primary-dark); font-weight: 900; }
    .step-text .red { color: #e24b4a; font-weight: 900; }
    .step-text .green { color: #639922; font-weight: 900; }

    /* ===== GRAPH SCREEN ===== */
    #graph-screen { padding: 0 0 48px; }

    .graph-header {
      background: #2d6fb0;
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .graph-header h2 { font-size: 1.25rem; font-weight: 800; }

    .graph-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .stat-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--primary); line-height: 1.1; }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    .graph-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .graph-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    .dots-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .result-dot { font-size: 1.4rem; line-height: 1; }
    .no-records { font-size: 0.9rem; color: var(--muted); }

    .reset-btn {
      width: 100%;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      border: 2px solid var(--error);
      border-radius: var(--radius);
      background: white;
      color: var(--error);
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { background: #fdf0f0; }

    /* ===== REFERENCE SCREEN ===== */
    #ref-screen { padding: 0 0 48px; }

    .ref-header {
      background: var(--accent);
      color: white;
      padding: 48px 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ref-header h2 { font-size: 1.15rem; font-weight: 800; }

    .ref-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ref-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ref-card-title {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .ref-concept-text { font-size: 1.05rem; line-height: 1.8; font-weight: 600; }

    .ref-method-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
      background: #eef6ff;
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      border-radius: 0 10px 10px 0;
    }

    .ref-example-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .ref-q-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.75;
      margin-bottom: 14px;
    }

    /* ===== FACTOR VISUAL (GCD / LCM) ===== */
    .factor-visual {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .factor-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .factor-row:last-of-type { margin-bottom: 0; }

    .factor-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 4px;
      min-width: 64px;
    }

    .factor-chips { display: flex; flex-wrap: wrap; gap: 6px; }

    .factor-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      background: #e9edf1;
      color: var(--muted);
    }

    .factor-chip.common { background: #d4edff; color: var(--primary-dark); }
    .factor-chip.factor-max { background: var(--primary); color: white; }
    .factor-chip.lcm-match { background: #27ae60; color: white; }

    .factor-answer {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #dde3ea;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .factor-answer strong { color: var(--primary); font-size: 1.2rem; }

    /* ===== SEQUENCE VISUAL (等差数列) ===== */
    .seq-visual {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 12px;
      margin-bottom: 20px;
    }

    .seq-item { text-align: center; }

    .seq-val {
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 800;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .seq-idx {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 600;
    }

    .seq-arrow {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      padding-bottom: 16px;
    }

    .seq-ellipsis {
      font-size: 1.2rem;
      color: var(--muted);
      padding-bottom: 14px;
    }

    /* ===== NICKNAME ===== */
    .nickname-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px 0;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }

    .nickname-name {
      font-weight: 800;
      color: white;
    }

    .nickname-change-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }

    .nickname-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 24px;
    }

    .nickname-overlay.hidden { display: none; }

    .nickname-modal {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .nickname-modal h3 {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .nickname-modal p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .nickname-input {
      width: 100%;
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      padding: 14px;
      border: 2px solid #dde3ea;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      margin-bottom: 16px;
    }

    .nickname-input:focus { border-color: var(--primary); }

    .nickname-ok-btn {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-family: inherit;
    }

    /* ===== TOP ACTIONS ===== */
    .top-actions {
      padding: 0 16px 32px;
    }

    /* ===== QUESTION COUNT SELECTOR ===== */
    .qcount-section {
      padding: 0 16px 4px;
    }

    .qcount-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .qcount-bar {
      display: flex;
      gap: 8px;
    }

    .qcount-btn {
      flex: 1;
      padding: 10px 6px;
      font-size: 0.95rem;
      font-weight: 800;
      border: 2px solid #dde3ea;
      border-radius: 10px;
      background: white;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .qcount-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    .qcount-btn:active { opacity: 0.8; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .progress-track {
      background: #dde3ea;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* ===== SESSION RESULT CARD ===== */
    .session-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 20px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .session-icon { font-size: 3.5rem; margin-bottom: 12px; }

    .session-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    .session-title.great  { color: var(--success); }
    .session-title.ok     { color: var(--accent); }
    .session-title.retry  { color: var(--error); }

    .hist-mid  { color: var(--accent);  font-weight: 800; }

  </style>
</head>

<script>
// ============================================================
//  SESSION STATE
// ============================================================
let qCount = 5;
let sessionAnswered = 0;
let sessionCorrect  = 0;

// ============================================================
//  UTILS
// ============================================================
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gcdCalc(a, b) {
  while (b) { const t = b; b = a % b; a = t; }
  return a;
}

function lcmCalc(a, b) {
  return a / gcdCalc(a, b) * b;
}

function getFactors(n) {
  const f = [];
  for (let i = 1; i <= n; i++) { if (n % i === 0) f.push(i); }
  return f;
}

// ============================================================
//  MODULE REGISTRY
// ============================================================
const modules = [];
function registerModule(mod) { modules.push(mod); }

// ============================================================
//  鶴亀算 MODULE
// ============================================================
registerModule({
  id: 'tsurukame',
  name: '鶴亀算',
  icon: '🐢',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const N = randInt(6, 18), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 2, valB = 4, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'つる', unitA: 'わ', nameB: 'かめ', unitB: 'ひき', unitS: '本' };
    return {
      text: `つると かめが あわせて <span class="num">${N}</span>ひき、<br>あしは あわせて <span class="num">${S}</span>本。<br>それぞれ 何びき？`,
      inputs: [
        { id: 'ans-A', label: 'つるの数', unit: 'わ' },
        { id: 'ans-B', label: 'かめの数', unit: 'ひき' },
      ],
    };
  },

  _genApplied() {
    const tpls = [this._tplBike, this._tplCoins, this._tplStationery];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplBike() {
    const N = randInt(5, 14), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 2, valB = 3, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'じてんしゃ', unitA: 'だい', nameB: 'さんりんしゃ', unitB: 'だい', unitS: '本' };
    return {
      text: `じてんしゃと さんりんしゃが あわせて <span class="num">${N}</span>だい、<br>タイヤは あわせて <span class="num">${S}</span>本。<br>それぞれ 何だい？`,
      inputs: [
        { id: 'ans-A', label: 'じてんしゃ', unit: 'だい' },
        { id: 'ans-B', label: 'さんりんしゃ', unit: 'だい' },
      ],
    };
  },

  _tplCoins() {
    const N = randInt(5, 14), nA = randInt(1, N - 1), nB = N - nA;
    const valA = 10, valB = 50, S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: '10円玉', unitA: 'まい', nameB: '50円玉', unitB: 'まい', unitS: '円' };
    return {
      text: `10円玉と 50円玉が あわせて <span class="num">${N}</span>まい、<br>あわせて <span class="num">${S}</span>円。<br>それぞれ 何まい？`,
      inputs: [
        { id: 'ans-A', label: '10円玉', unit: 'まい' },
        { id: 'ans-B', label: '50円玉', unit: 'まい' },
      ],
    };
  },

  _tplStationery() {
    const pencilPrices = [30, 40, 50, 60, 70];
    const eraserPrices = [80, 90, 100, 120, 150];
    const valA = pencilPrices[randInt(0, pencilPrices.length - 1)];
    const valB = eraserPrices[randInt(0, eraserPrices.length - 1)];
    const N = randInt(5, 12), nA = randInt(1, N - 1), nB = N - nA;
    const S = nA * valA + nB * valB;
    this._current = { N, nA, nB, valA, valB, S,
      nameA: 'えんぴつ', unitA: '本', nameB: '消しゴム', unitB: 'こ', unitS: '円' };
    return {
      text: `1本 <span class="num">${valA}</span>円の えんぴつと、<br>1こ <span class="num">${valB}</span>円の 消しゴムを<br>あわせて <span class="num">${N}</span>こ かって <span class="num">${S}</span>円。<br>それぞれ 何こ？`,
      inputs: [
        { id: 'ans-A', label: 'えんぴつ', unit: '本' },
        { id: 'ans-B', label: '消しゴム', unit: 'こ' },
      ],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    const b = parseInt(document.getElementById('ans-B').value, 10);
    const { nA, nB, nameA, unitA, nameB, unitB } = this._current;
    return {
      correct: a === nA && b === nB,
      explanation: `${nameA} ${nA}${unitA}、${nameB} ${nB}${unitB}`,
    };
  },

  explain() { return { type: 'area', ...this._current }; },
});

// ============================================================
//  最大公約数 MODULE
// ============================================================
registerModule({
  id: 'gcd',
  name: '最大公約数',
  icon: '🔵',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const gList = [2,3,4,5,6,7,8,9,10,12];
    const g = gList[randInt(0, gList.length - 1)];
    const coprimes = [[1,2],[1,3],[2,3],[1,4],[3,4],[1,5],[2,5],[3,5],[1,6],[5,6],[2,7],[3,7]];
    const [p, q] = coprimes[randInt(0, coprimes.length - 1)];
    const a = g * p, b = g * q;
    this._current = { a, b, g };
    return {
      text: `<span class="num">${a}</span> と <span class="num">${b}</span> の<br>最大公約数は？`,
      inputs: [{ id: 'ans-A', label: '最大公約数', unit: '' }],
    };
  },

  _genApplied() {
    const tpls = [this._tplBag, this._tplTape];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplBag() {
    const g = randInt(2, 8);
    const coprimes = [[2,3],[3,4],[2,5],[3,5],[4,5],[3,7],[2,7],[5,7]];
    const [p, q] = coprimes[randInt(0, coprimes.length - 1)];
    const a = g * p, b = g * q;
    this._current = { a, b, g };
    return {
      text: `みかんが <span class="num">${a}</span>個、りんごが <span class="num">${b}</span>個あります。<br>あまりが出ないよう同じ数ずつ袋に入れるとき、<br>最多で何袋に分けられますか？`,
      inputs: [{ id: 'ans-A', label: '袋の数', unit: '袋' }],
    };
  },

  _tplTape() {
    const g = randInt(3, 12);
    const coprimes = [[2,3],[3,4],[2,5],[3,5],[4,5],[3,7],[2,7]];
    const [p, q] = coprimes[randInt(0, coprimes.length - 1)];
    const a = g * p, b = g * q;
    this._current = { a, b, g };
    return {
      text: `赤いテープが <span class="num">${a}</span>cm、<br>青いテープが <span class="num">${b}</span>cmあります。<br>同じ長さに切るとき、最長は何cmですか？`,
      inputs: [{ id: 'ans-A', label: '長さ', unit: 'cm' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    return { correct: a === this._current.g, explanation: `最大公約数 = ${this._current.g}` };
  },

  explain() { return { type: 'gcd', ...this._current }; },
});

// ============================================================
//  最小公倍数 MODULE
// ============================================================
registerModule({
  id: 'lcm',
  name: '最小公倍数',
  icon: '🟢',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const pairs = [[2,3],[3,4],[4,6],[2,5],[3,5],[4,5],[5,6],[6,8],[4,9],[6,9],[3,8],[8,12]];
    const [a, b] = pairs[randInt(0, pairs.length - 1)];
    const l = lcmCalc(a, b);
    this._current = { a, b, l };
    return {
      text: `<span class="num">${a}</span> と <span class="num">${b}</span> の<br>最小公倍数は？`,
      inputs: [{ id: 'ans-A', label: '最小公倍数', unit: '' }],
    };
  },

  _genApplied() {
    const tpls = [this._tplLibrary, this._tplLight];
    return tpls[randInt(0, tpls.length - 1)].call(this);
  },

  _tplLibrary() {
    const pairs = [[2,3],[3,4],[4,6],[2,5],[3,5],[4,5],[5,6],[6,8],[4,9],[6,9],[3,8]];
    const [a, b] = pairs[randInt(0, pairs.length - 1)];
    const l = lcmCalc(a, b);
    this._current = { a, b, l };
    return {
      text: `Aくんは <span class="num">${a}</span>日ごと、Bくんは <span class="num">${b}</span>日ごとに<br>図書館に来ます。今日いっしょに来たとき、<br>次にいっしょになるのは何日後ですか？`,
      inputs: [{ id: 'ans-A', label: '日数', unit: '日後' }],
    };
  },

  _tplLight() {
    const pairs = [[2,3],[3,4],[4,6],[2,5],[3,5],[4,5],[5,6],[6,8],[4,9],[6,9],[3,8]];
    const [a, b] = pairs[randInt(0, pairs.length - 1)];
    const l = lcmCalc(a, b);
    this._current = { a, b, l };
    return {
      text: `赤ランプは <span class="num">${a}</span>秒ごと、<br>青ランプは <span class="num">${b}</span>秒ごとに点滅します。<br>同時に点滅した後、次に同時になるのは何秒後？`,
      inputs: [{ id: 'ans-A', label: '秒数', unit: '秒後' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    return { correct: a === this._current.l, explanation: `最小公倍数 = ${this._current.l}` };
  },

  explain() { return { type: 'lcm', ...this._current }; },
});

// ============================================================
//  等差数列 MODULE
// ============================================================
registerModule({
  id: 'arithmetic',
  name: '等差数列',
  icon: '📈',
  unlocked: true,
  _level: 'basic',
  _current: null,

  generate() { return this._level === 'basic' ? this._genBasic() : this._genApplied(); },

  _genBasic() {
    const a = randInt(1, 15), d = randInt(2, 8), n = randInt(4, 10);
    const answer = a + (n - 1) * d;
    this._current = { a, d, n, answer, subtype: 'nth' };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br>第 <span class="num">${n}</span> 項はいくつですか？`,
      inputs: [{ id: 'ans-A', label: `第${n}項`, unit: '' }],
    };
  },

  _genApplied() {
    return randInt(0, 1) === 0 ? this._tplCount() : this._tplSum();
  },

  _tplCount() {
    const a = randInt(1, 10), d = randInt(2, 7), count = randInt(4, 10);
    const last = a + (count - 1) * d;
    this._current = { a, d, n: count, answer: count, subtype: 'count', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列があります。<br><span class="num">${last}</span> は第何項ですか？`,
      inputs: [{ id: 'ans-A', label: '何項め', unit: '項め' }],
    };
  },

  _tplSum() {
    const a = randInt(1, 10), d = randInt(2, 6), n = randInt(4, 8);
    const last = a + (n - 1) * d;
    const answer = n * (a + last) / 2;
    this._current = { a, d, n, answer, subtype: 'sum', last };
    return {
      text: `はじめの数が <span class="num">${a}</span> で、<span class="num">${d}</span> ずつ増える<br>数列の、第 <span class="num">${n}</span> 項までの<br>合計はいくつですか？`,
      inputs: [{ id: 'ans-A', label: '合計', unit: '' }],
    };
  },

  checkAnswer() {
    const a = parseInt(document.getElementById('ans-A').value, 10);
    return { correct: a === this._current.answer, explanation: `こたえ = ${this._current.answer}` };
  },

  explain() { return { type: 'arithmetic', ...this._current }; },
});

// ============================================================
//  COMING SOON (特殊算)
// ============================================================
[
  { id: 'tabibito', name: '旅人算',   icon: '🚶' },
  { id: 'ueki',     name: '植木算',   icon: '🌳' },
  { id: 'ryusui',   name: '流水算',   icon: '🌊' },
  { id: 'sasume',   name: '差集め算', icon: '📐' },
  { id: 'kafusoku', name: '過不足算', icon: '⚖️' },
].forEach(m => registerModule({ ...m, unlocked: false, generate: null, checkAnswer: null }));

// ============================================================
//  SECTIONS
// ============================================================
const sections = [
  {
    id: 'baisu-yakusu',
    name: '倍数・約数',
    icon: '🔢',
    color: '#7b4ea0',

function showScreen(id) {

function goTop() {
  destroyCharts();
  activeModule = null;
  activeSection = null;
  showScreen('top-screen');
}

function goSection() {
  destroyCharts();
  activeModule = null;
  if (activeSection) {
    showScreen('section-screen');
  } else {

  }

function showSection(sectionId) {
  activeSection = sections.find(s => s.id === sectionId);
  if (!activeSection) return;
  renderSection();
  showScreen('section-screen');
}

function renderTop() {
  const list = document.getElementById('categories-list');
  list.innerHTML = '';
  sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.borderLeftColor = sec.color;
    card.innerHTML = `
      <div class="cat-icon">${sec.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${sec.name}</div>
        <div class="cat-desc">${sec.desc}</div>

function renderQCountBar() {
  const bar = document.getElementById('qcount-bar');
  if (!bar) return;
  bar.innerHTML = '';
  [1, 3, 5, 10].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'qcount-btn' + (n === qCount ? ' active' : '');
    btn.textContent = n + '問';
    btn.onclick = () => { qCount = n; renderQCountBar(); };
    bar.appendChild(btn);
  });
}

function renderSection() {
  if (!activeSection) return;

  const header = document.getElementById('section-header');
  header.style.background = activeSection.color;
  document.getElementById('section-title').textContent = activeSection.name;
  renderQCountBar();

  const sectionModules = activeSection.moduleIds.map(id => modules.find(m => m.id === id)).filter(Boolean);
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';
  sectionModules.forEach(mod => {
    const tile = document.createElement('div');
    tile.className = 'module-tile ' + (mod.unlocked ? 'unlocked' : 'locked');
    const hasRef = !!REF_CONTENT[mod.id];
    tile.innerHTML = `
      <span class="tile-icon">${mod.icon}</span>
      <div class="tile-name">${mod.name}</div>
      <span class="tile-badge ${mod.unlocked ? 'badge-open' : 'badge-soon'}">
        ${mod.unlocked ? 'れんしゅうする' : 'きんじつ公開'}
      </span>
      ${mod.unlocked && hasRef ? `<div class="tile-ref-btn" data-id="${mod.id}">📖 きほんをかくにん</div>` : ''}`;
    if (mod.unlocked) {
      tile.onclick = e => {
        if (e.target.closest('.tile-ref-btn')) return;
        startModule(mod.id);
      };
      const refBtn = tile.querySelector('.tile-ref-btn');
      if (refBtn) refBtn.onclick = e => { e.stopPropagation(); showReference(mod.id); };
    }
    grid.appendChild(tile);
  });
}

function startModule(id) {
  activeModule = modules.find(m => m.id === id);
  if (!activeModule) return;
  document.getElementById('quiz-title').textContent = activeModule.name;
  if (activeModule._level !== undefined) activeModule._level = 'basic';
  document.getElementById('btn-basic').classList.add('active');
  document.getElementById('btn-applied').classList.remove('active');
  initSession();
  showScreen('quiz-screen');
  loadQuestion();
}

  activeModule._level = level;

function initSession() {
  sessionAnswered = 0;
  sessionCorrect  = 0;
  document.getElementById('session-card').classList.add('hidden');
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('btn-retry').textContent = 'もういちど（' + qCount + '問）';
}

function updateProgress() {
  document.getElementById('q-num').textContent =
    (sessionAnswered + 1) + '問め / ' + qCount + '問';
  document.getElementById('q-correct').textContent = sessionCorrect + '問正解';
  document.getElementById('progress-fill').style.width =
    (sessionAnswered / qCount * 100) + '%';
}

//  QUIZ FLOW
// ============================================================
function loadQuestion() {
  updateProgress();
  const q = activeModule.generate();
  document.getElementById('question-text').innerHTML = q.text;

  const card = document.getElementById('answer-card');
  card.innerHTML = '';
  q.inputs.forEach(inp => {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `
      <span class="answer-label">${inp.label}</span>
      <input id="${inp.id}" class="answer-input" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="?">
      <span class="answer-unit">${inp.unit}</span>`;
    card.appendChild(row);
  });
  setTimeout(() => { const f = card.querySelector('input'); if (f) f.focus(); }, 300);

  document.getElementById('submit-btn').classList.remove('hidden');
  document.getElementById('result-card').classList.add('hidden');
  document.getElementById('explanation-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
}

function checkAnswer() {
  const result = activeModule.checkAnswer();

  const icon  = document.getElementById('result-icon');
  const label = document.getElementById('result-label');
  const ans   = document.getElementById('result-answer');

  if (result.correct) {
    icon.textContent  = '⭕';
    label.textContent = 'せいかい！';
    label.className   = 'result-label correct';
    ans.textContent   = result.explanation;
  } else {
    icon.textContent  = '❌';
    label.textContent = 'もういちど！';
    label.className   = 'result-label wrong';
    ans.textContent   = 'こたえ：' + result.explanation;
  }

  sessionAnswered++;
  if (result.correct) sessionCorrect++;
  updateProgress();

  document.getElementById('submit-btn').classList.add('hidden');
  document.getElementById('result-card').classList.remove('hidden');

  if (activeModule.explain) {
    const expData = activeModule.explain();
    renderExplanation(expData, 'area-diagram', 'steps-list', 'explanation-title');
    document.getElementById('explanation-card').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('explanation-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  }

  if (sessionAnswered >= qCount) {
    saveSessionRecord(activeModule.id, activeModule._level || 'basic', qCount, sessionCorrect);
    setTimeout(showSessionResult, 500);
  } else {
    document.getElementById('next-btn').classList.remove('hidden');
  }
}

function nextQuestion() { loadQuestion(); }

function showSessionResult() {
  const pct = Math.round(sessionCorrect / qCount * 100);
  const icon  = pct === 100 ? '🎉' : pct >= 70 ? '😊' : '💪';
  const cls   = pct === 100 ? 'great' : pct >= 70 ? 'ok' : 'retry';
  const title = pct === 100 ? 'パーフェクト！' : pct >= 70 ? 'よくできました！' : 'もういちどチャレンジ！';

  document.getElementById('session-icon').textContent  = icon;
  const titleEl = document.getElementById('session-title');
  titleEl.textContent = title;
  titleEl.className   = 'session-title ' + cls;
  document.getElementById('session-detail').textContent =
    qCount + '問中 ' + sessionCorrect + '問正解　正答率 ' + pct + '%';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-num').textContent = qCount + '問 完了！';
  document.getElementById('session-card').classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('session-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

function restartSession() {

  loadQuestion();
}

// ---- Save / Load ----
function loadLocalRecords() {
  try { return JSON.parse(localStorage.getItem(RECORDS_KEY) || '[]'); }
  catch { return []; }
}

function parseTheme(theme) {
  // "sansu:gcd:basic" → { moduleId: 'gcd', level: 'basic' }
  const parts = theme.replace(THEME_PREFIX, '').split(':');
  return { moduleId: parts[0] || '', level: parts[1] || 'basic' };
}

async function loadRecords() {
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      const { data, error } = await sbClient
        .from('drill_records')
        .select('played_at, score, theme, total_q')
        .eq('user_id', nickname)
        .like('theme', THEME_PREFIX + '%')
        .order('played_at', { ascending: true });
      if (!error && data && data.length > 0) {
        const recs = data.map(r => {
          const { moduleId, level } = parseTheme(r.theme);
          const total   = r.total_q || 1;
          const correct = Math.round((r.score / 100) * total);
          return { date: r.played_at, moduleId, level, total, correct, score: r.score };
        });
        try { localStorage.setItem(RECORDS_KEY, JSON.stringify(recs)); } catch(e) {}
        return { data: recs, fallback: false };
      }
    } catch(e) { console.warn('Supabase load failed', e); }
  }
  return { data: loadLocalRecords(), fallback: true };
}

async function saveSessionRecord(moduleId, level, total, correct) {
  const score = Math.round(correct / total * 100);
  const date  = new Date().toISOString();
  const rec   = { date, moduleId, level, total, correct, score };

  // update localStorage cache immediately
  const local = loadLocalRecords();
  local.push(rec);
  try { localStorage.setItem(RECORDS_KEY, JSON.stringify(local)); } catch(e) {}

  // push to Supabase
  const nickname = getNickname();
  if (sbClient && nickname) {
    try {
      await sbClient.from('drill_records').insert({
        user_id:   nickname,
        score,
        theme:     THEME_PREFIX + moduleId + ':' + level,
        played_at: date,
        total_q:   total,
      });
    } catch(e) { console.warn('Supabase save failed', e); }
  }
}

// compute total/correct handling both legacy (boolean) and new (number) records
function recStats(recs) {
  let total = 0, correct = 0;
  recs.forEach(r => {
    if (typeof r.total === 'number') {
      total   += r.total;
      correct += r.correct;
    } else {
      total   += 1;
      correct += r.correct ? 1 : 0;
    }
  });
  return { total, correct, pct: total ? Math.round(correct / total * 100) : null };
}

function recScore(r) {
  if (typeof r.score === 'number') return r.score;
  if (typeof r.total === 'number') return Math.round(r.correct / r.total * 100);
  return r.correct ? 100 : 0;
}

async function renderGraph() {
  // show loading state
  document.getElementById('g-total').textContent    = '…';
  document.getElementById('g-accuracy').textContent = '…';
  document.getElementById('g-streak').textContent   = '…';

  const sectionModuleIds = activeSection ? new Set(activeSection.moduleIds) : null;
  const { data: allRecs, fallback } = await loadRecords();
  let recs = sectionModuleIds ? allRecs.filter(r => sectionModuleIds.has(r.moduleId)) : allRecs;
  if (sectionModuleIds) recs = recs.filter(r => sectionModuleIds.has(r.moduleId));

  const { total, correct, pct } = recStats(recs);

  // streak: consecutive sessions with 100%
  let streak = 0;
  for (let i = recs.length - 1; i >= 0; i--) {
    if (recScore(recs[i]) === 100) streak++; else break;
  }

  document.getElementById('g-total').textContent    = total + '問';
  document.getElementById('g-accuracy').textContent = pct !== null ? pct + '%' : '-%';
  document.getElementById('g-streak').textContent   = streak + '回';

  // recent dots (per session, newest first, up to 20)
  const recent = recs.slice(-20).reverse();
  const dotsEl = document.getElementById('g-dots');
  dotsEl.innerHTML = recent.length
    ? recent.map(r => {
        const s = recScore(r);
        return `<span class="result-dot">${s === 100 ? '🎉' : s >= 70 ? '⭕' : '❌'}</span>`;
      }).join('')
    : '<span class="no-records">まだ きろくがありません</span>';

  // per-module stats
  const sectionMods = (activeSection ? activeSection.moduleIds : modules.map(m => m.id))
    .map(id => modules.find(m => m.id === id))
    .filter(m => m && m.unlocked);

  const modLabels = sectionMods.map(m => m.name);
  const COLORS = ['rgba(74,144,217,0.85)', 'rgba(39,174,96,0.85)', 'rgba(245,166,35,0.85)',
                  'rgba(231,76,60,0.85)', 'rgba(142,68,173,0.85)', 'rgba(52,152,219,0.85)'];
  const colors = sectionMods.map((_, i) => COLORS[i % COLORS.length]);

  const modAcc    = sectionMods.map(m => { const s = recStats(recs.filter(r => r.moduleId === m.id)); return s.pct; });
  const modCounts = sectionMods.map(m => recStats(recs.filter(r => r.moduleId === m.id)).total);

  destroyCharts();

  const accEmptyEl  = document.getElementById('g-acc-empty');
  const cntEmptyEl  = document.getElementById('g-cnt-empty');
  const lineEmptyEl = document.getElementById('g-line-empty');
  const accCanvas   = document.getElementById('g-acc-chart');
  const cntCanvas   = document.getElementById('g-cnt-chart');
  const lineCanvas  = document.getElementById('g-line-chart');

  // history table
  const tbody = document.getElementById('g-history-body');
  const histEmpty = document.getElementById('g-history-empty');
  if (recs.length === 0) {
    accEmptyEl.classList.remove('hidden');  accCanvas.style.display  = 'none';
    cntEmptyEl.classList.remove('hidden');  cntCanvas.style.display  = 'none';
    lineEmptyEl.classList.remove('hidden'); lineCanvas.style.display = 'none';
    tbody.innerHTML = '';
    histEmpty.classList.remove('hidden');
    document.getElementById('g-history-table').style.display = 'none';
    return;
  }

  document.getElementById('g-history-table').style.display = '';
  histEmpty.classList.add('hidden');
  tbody.innerHTML = recs.slice().reverse().slice(0, 20).map(r => {
    const d  = new Date(r.date);
    const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const tot = typeof r.total === 'number' ? r.total : 1;
    const cor = typeof r.total === 'number' ? r.correct : (r.correct ? 1 : 0);
    const sc  = recScore(r);
    const cls = sc >= 80 ? 'hist-high' : sc >= 60 ? 'hist-mid' : 'hist-low';
    const mod = modules.find(m => m.id === r.moduleId);
    return `<tr>
      <td>${ds}</td>
      <td>${mod ? mod.name : r.moduleId}</td>
      <td>${tot}問中 <strong>${cor}問</strong></td>
      <td class="${cls}">${sc}%</td>
    </tr>`;
  }).join('');

  // accuracy bar chart
  accEmptyEl.classList.add('hidden'); accCanvas.style.display = '';
  accChart = new Chart(accCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: modLabels,
      datasets: [{ data: modAcc.map(v => v ?? 0), backgroundColor: colors, borderRadius: 10, borderSkipped: false }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { stepSize: 20, callback: v => v + '%' }, grid: { color: '#eee' } },
        x: { grid: { display: false }, ticks: { font: { size: 12, weight: 'bold' } } },
      },
    },
  });

  // question count bar chart
  cntEmptyEl.classList.add('hidden'); cntCanvas.style.display = '';
  cntChart = new Chart(cntCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: modLabels,
      datasets: [{ data: modCounts, backgroundColor: colors, borderRadius: 10, borderSkipped: false }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { precision: 0, stepSize: 1 }, grid: { color: '#eee' },
             title: { display: true, text: '問題数', font: { size: 11 }, color: '#888' } },
        x: { grid: { display: false }, ticks: { font: { size: 12, weight: 'bold' } } },
      },
    },
  });

  // line chart (score per session)
  lineEmptyEl.classList.add('hidden'); lineCanvas.style.display = '';
  const lineLabels = recs.map((r, i) => {
    const d = new Date(r.date);
    return `${d.getMonth()+1}/${d.getDate()} (${i+1})`;
  });
  const lineData = recs.map(r => recScore(r));
  const pointColors = lineData.map(v => v === 100 ? '#27ae60' : v >= 70 ? '#f5a623' : '#e74c3c');
  lineChart = new Chart(lineCanvas.getContext('2d'), {
    type: 'line',
    data: {
      labels: lineLabels,
      datasets: [{
        data: lineData,
        borderColor: '#4a90d9',
        backgroundColor: 'rgba(74,144,217,0.10)',
        borderWidth: 2.5,
        pointBackgroundColor: pointColors,
        pointBorderColor: pointColors,
        pointRadius: 6,
        pointHoverRadius: 8,
        tension: 0.3,
        fill: true,
      }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#eee' } },
        x: { ticks: { maxRotation: 45, font: { size: 10 } }, grid: { display: false } },
      },
    },
  });
}

  document.getElementById('ref-concept').innerHTML  = c.concept;
  document.getElementById('ref-method').innerHTML   = c.method;
  document.getElementById('ref-q').innerHTML        = c.exQ;
  renderExplanation(c.example, 'ref-diagram', 'ref-steps', null);
  showScreen('ref-screen');
}

// ============================================================
//  EXPLANATION RENDERERS
// ============================================================

// --- Area diagram (鶴亀算) ---
function buildSVGDiagram({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff   = N * valB - S;
  const spread = valB - valA;

  const PAD_L = 58, PAD_R = 12, PAD_T = 14, PAD_B = 42;
  const W = 300, H = 120;
  const vbW = PAD_L + W + PAD_R, vbH = PAD_T + H + PAD_B;
  const unitW = W / N, unitH = H / valB;
  const x0 = PAD_L, y0 = PAD_T;
  const aW = nA * unitW, bW = nB * unitW;
  const aX = x0, bX = x0 + aW;

  const COL_A = '#378ADD', COL_B = '#5a9e28', COL_RED = '#E24B4A';
  const COL_GRID = '#dde3ea', COL_TEXT = '#2c3e50', COL_MUTED = '#7f8c8d';

  const aFillH = valA * unitH, aFillY = y0 + H - aFillH;
  const redH = spread * unitH, redY = y0;

  let svg = `<svg viewBox="0 0 ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;background:#f8fafc;border-radius:10px;">
  <defs><pattern id="dp" width="6" height="6" patternUnits="userSpaceOnUse">
    <rect width="6" height="6" fill="#fde8e8"/>
    <line x1="0" y1="0" x2="6" y2="6" stroke="${COL_RED}" stroke-width="0.8" opacity="0.5"/>
  </pattern></defs>`;

  svg += `<rect x="${bX}" y="${y0}" width="${bW}" height="${H}" fill="${COL_B}" opacity="0.75" rx="2"/>`;
  svg += `<rect x="${aX}" y="${aFillY}" width="${aW}" height="${aFillH}" fill="${COL_A}" opacity="0.82" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="url(#dp)" rx="2"/>`;
  svg += `<rect x="${aX}" y="${redY}" width="${aW}" height="${redH}" fill="none" stroke="${COL_RED}" stroke-width="1.5" stroke-dasharray="4 3" rx="2"/>`;

  [0, valA, valB].forEach(v => {
    const gy = y0 + H - v * unitH;
    svg += `<line x1="${x0}" y1="${gy}" x2="${x0+W}" y2="${gy}" stroke="${COL_GRID}" stroke-width="${v===0||v===valB?1.5:0.7}"/>`;
  });
  svg += `<line x1="${bX}" y1="${y0}" x2="${bX}" y2="${y0+H}" stroke="${COL_GRID}" stroke-width="1.2" stroke-dasharray="3 2"/>`;
  svg += `<line x1="${x0}" y1="${y0}" x2="${x0}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `<text x="${x0-5}" y="${y0+H}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">0</text>`;
  svg += `<text x="${x0-5}" y="${y0+H-aFillH}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valA}${unitS}</text>`;
  svg += `<text x="${x0-5}" y="${y0}" text-anchor="end" font-size="9" fill="${COL_MUTED}" dominant-baseline="middle">${valB}${unitS}</text>`;

  if (aW > 22) svg += `<text x="${aX+aW/2}" y="${aFillY+aFillH/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameA}</text>`;
  if (bW > 22) svg += `<text x="${bX+bW/2}" y="${y0+H/2}" text-anchor="middle" font-size="11" font-weight="bold" fill="white" dominant-baseline="middle">${nameB}</text>`;
  if (aW > 30) svg += `<text x="${aX+aW/2}" y="${redY+redH/2}" text-anchor="middle" font-size="10" font-weight="bold" fill="${COL_RED}" dominant-baseline="middle">${diff}${unitS}へらす</text>`;

  const labelY = y0 + H + 16;
  svg += `<text x="${aX+aW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_A}" font-weight="bold">${nameA} ${nA}${unitA}</text>`;
  svg += `<text x="${bX+bW/2}" y="${labelY}" text-anchor="middle" font-size="11" fill="${COL_B}" font-weight="bold">${nameB} ${nB}${unitB}</text>`;
  svg += `<line x1="${x0}" y1="${y0+H}" x2="${x0+W}" y2="${y0+H}" stroke="${COL_TEXT}" stroke-width="1.5"/>`;
  svg += `</svg>`;
  return svg;
}

function buildStepItems({ N, nA, nB, valA, valB, S, nameA, unitA, nameB, unitB, unitS }) {
  const diff = N * valB - S, allB = N * valB, spread = valB - valA;
  return [
    `ぜんぶ <span class="green">${nameB}</span> だとすると…<br><em>${N}</em> × <em>${valB}</em> = <em>${allB}</em>${unitS}`,
    `じっさいは <em>${S}</em>${unitS}。ちがいは<br><em>${allB}</em> − <em>${S}</em> = <span class="red">${diff}</span>${unitS}`,
    `${nameA}1つで <em>${spread}</em>${unitS}へる<br><span class="red">${diff}</span> ÷ <em>${spread}</em> = <em>${nA}</em>　→　${nameA} <em>${nA}</em>${unitA}`,
    `${nameB}は <em>${N}</em> − <em>${nA}</em> = <em>${nB}</em>　→　${nameB} <em>${nB}</em>${unitB}`,
  ];
}

// --- GCD visual ---
function buildGCDVisual(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const commonSet = new Set(fA.filter(f => fB.includes(f)));
  function chips(factors) {
    return factors.map(f => {
      let cls = 'factor-chip';
      if (f === g) cls += ' factor-max';
      else if (commonSet.has(f)) cls += ' common';
      return `<span class="${cls}">${f}</span>`;
    }).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の約数</span><div class="factor-chips">${chips(fA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の約数</span><div class="factor-chips">${chips(fB)}</div></div>
    <div class="factor-answer">最大公約数 → <strong>${g}</strong></div>
  </div>`;
}

function buildGCDSteps(a, b, g) {
  const fA = getFactors(a), fB = getFactors(b);
  const common = fA.filter(f => fB.includes(f));
  return [
    `<em>${a}</em> の約数：${fA.join('、')}`,
    `<em>${b}</em> の約数：${fB.join('、')}`,
    `共通の約数：<em>${common.join('、')}</em>`,
    `いちばん大きい共通の約数 = <em>${g}</em>`,
  ];
}

// --- LCM visual ---
function buildLCMVisual(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  function chips(mults) {
    return mults.map(m => `<span class="factor-chip${m === l ? ' lcm-match' : ''}">${m}</span>`).join('');
  }
  return `<div class="factor-visual">
    <div class="factor-row"><span class="factor-label">${a}の倍数</span><div class="factor-chips">${chips(mA)}</div></div>
    <div class="factor-row"><span class="factor-label">${b}の倍数</span><div class="factor-chips">${chips(mB)}</div></div>
    <div class="factor-answer">最小公倍数 → <strong>${l}</strong></div>
  </div>`;
}

function buildLCMSteps(a, b, l) {
  const mA = [], mB = [];
  for (let i = 1; i * a <= l; i++) mA.push(i * a);
  for (let i = 1; i * b <= l; i++) mB.push(i * b);
  return [
    `<em>${a}</em> の倍数：${mA.join('、')}、…`,
    `<em>${b}</em> の倍数：${mB.join('、')}、…`,
    `最初に共通する数 = <em>${l}</em>`,
    `<em>${l}</em> ÷ <em>${a}</em> = <em>${l/a}</em>、<em>${l}</em> ÷ <em>${b}</em> = <em>${l/b}</em>（割り切れる ✓）`,
  ];
}

// --- Arithmetic visual ---
function buildSeqVisual(a, d, n) {
  const count = Math.min(n, 6);
  const terms = Array.from({ length: count }, (_, i) => a + i * d);
  let html = '<div class="seq-visual">';
  terms.forEach((t, i) => {
    html += `<div class="seq-item"><div class="seq-val">${t}</div><div class="seq-idx">第${i+1}項</div></div>`;
    if (i < count - 1) html += `<div class="seq-arrow">+${d}</div>`;
  });
  if (n > count) html += `<div class="seq-ellipsis">…</div>`;
  html += '</div>';
  return html;
}

function buildArithmeticSteps({ a, d, n, answer, subtype, last }) {
  if (subtype === 'nth') {
    return [
      `初項（はじめの数） = <em>${a}</em>、公差（増え方） = <em>${d}</em>`,
      `第 <em>${n}</em> 項 = 初項 + (項数 − 1) × 公差`,
      `= <em>${a}</em> + (<em>${n}</em> − 1) × <em>${d}</em>`,
      `= <em>${a}</em> + <em>${(n-1)*d}</em> = <em>${answer}</em>`,
    ];
  } else if (subtype === 'count') {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>`,
      `<em>${last}</em> は第何項か → (末項 − 初項) ÷ 公差 + 1`,
      `= (<em>${last}</em> − <em>${a}</em>) ÷ <em>${d}</em> + 1`,
      `= <em>${last - a}</em> ÷ <em>${d}</em> + 1 = <em>${answer}</em>項め`,
    ];
  } else {
    return [
      `初項 = <em>${a}</em>、公差 = <em>${d}</em>、<em>${n}</em> 項まで`,
      `末項（第${n}項） = <em>${a}</em> + (<em>${n}</em>−1) × <em>${d}</em> = <em>${last}</em>`,
      `合計 = (初項 + 末項) × 項数 ÷ 2`,
      `= (<em>${a}</em> + <em>${last}</em>) × <em>${n}</em> ÷ 2 = <em>${answer}</em>`,
    ];
  }
}

// --- Dispatcher ---
function renderExplanation(data, diagramId, stepsId, titleId) {
  const diagramEl = document.getElementById(diagramId);
  const stepsEl   = document.getElementById(stepsId);
  const titleEl   = titleId ? document.getElementById(titleId) : null;

  let diagramHTML = '';
  let steps = [];
  let title = 'かいせつ';

  if (data.type === 'area') {
    title = 'かいせつ（面積図）';
    diagramHTML = buildSVGDiagram(data);
    steps = buildStepItems(data);
  } else if (data.type === 'gcd') {
    title = 'かいせつ（約数をしらべよう）';
    diagramHTML = buildGCDVisual(data.a, data.b, data.g);
    steps = buildGCDSteps(data.a, data.b, data.g);
  } else if (data.type === 'lcm') {
    title = 'かいせつ（倍数をしらべよう）';
    diagramHTML = buildLCMVisual(data.a, data.b, data.l);
    steps = buildLCMSteps(data.a, data.b, data.l);
  } else if (data.type === 'arithmetic') {
    title = 'かいせつ（等差数列）';
    diagramHTML = buildSeqVisual(data.a, data.d, data.n);
    steps = buildArithmeticSteps(data);
  }

  if (titleEl) titleEl.textContent = title;
  if (diagramEl) diagramEl.innerHTML = diagramHTML;
  if (stepsEl) {
    stepsEl.innerHTML = '';
    steps.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'step-row';
      row.innerHTML = `<div class="step-num">${i+1}</div><div class="step-text">${s}</div>`;
      stepsEl.appendChild(row);
    });
  }
}
